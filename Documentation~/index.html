dManifest.xml\n- [ ] iOS info.plist có `SKAdNetworkItems` cho ads (Apple yêu cầu)\n- [ ] IAP product ID match với Google Play Console + App Store Connect\n- [ ] Restore Purchases button có trong Settings (iOS yêu cầu)\n- [ ] Analytics test events đã xuất hiện trong Firebase DebugView\n- [ ] Remote Config có defaults cho mọi key (offline vẫn chạy)\n- [ ] Test Mock vẫn build được khi remove SDK define (đề phòng dev mới clone không có SDK)\n", "ONBOARDING.md": "# Onboarding - Dev mới vào dự án\n\nĐọc file này nếu bạn vừa được add vào team. Mục tiêu: trong 1 buổi, hiểu kiến trúc và bắt đầu commit được.\n\n## Bước 1: Setup (30 phút)\n\nTheo `README.md` để clone + open project. Nếu Unity báo lỗi compile, đọc Console - thường là thiếu package, vào `Window → Package Manager` install lại.\n\n## Bước 2: Chạy game lần đầu (10 phút)\n\n- Mở scene `Bootstrap.unity`\n- Bấm Play\n- Quan sát Console - phải có log `[Bootstrap] All services registered.` và `[Scene] Loaded scene: MainMenu`\n- Nếu lỗi → check Inspector của GameBootstrap, các prefab AudioManager/UIManager đã gán chưa\n\n## Bước 3: Đọc ARCHITECTURE.md (20 phút)\n\nQuan trọng nhất. Đọc kỹ phần:\n- Bootstrap Pattern\n- Service Locator\n- Event Bus\n\nKhông cần nhớ chi tiết - cứ biết \"à, có cái này ở đó\" là đủ. Khi code sẽ tra lại.\n\n## Bước 4: Hands-on - viết 1 feature nhỏ (1-2 tiếng)\n\nBài tập làm quen: **Thêm tính năng \"Tap để nhảy + phát SFX + tăng score\".**\n\n### a. Thêm Event\n\n`Assets/_Project/Scripts/Gameplay/Events/GameplayEvents.cs`:\n\n```csharp\nusing GameTemplate.Core.Events;\n\nnamespace GameTemplate.Gameplay.Events\n{\n    public struct PlayerJumpedEvent : IGameEvent { }\n    public struct ScoreChangedEvent : IGameEvent { public int NewScore; }\n}\n```\n\n### b. Player Controller\n\n`Assets/_Project/Scripts/Gameplay/Player/PlayerController.cs`:\n\n```csharp\nusing UnityEngine;\nusing GameTemplate.Core.Events;\nusing GameTemplate.Gameplay.Events;\n\nnamespace GameTemplate.Gameplay.Player\n{\n    public class PlayerController : MonoBehaviour\n    {\n        private void Update()\n        {\n            if (Input.GetMouseButtonDown(0)) // tap\n            {\n                EventBus.Publish(new PlayerJumpedEvent());\n            }\n        }\n    }\n}\n```\n\n### c. Audio Reactor (sub event, không reference player)\n\n```csharp\nusing UnityEngine;\nusing GameTemplate.Core.DI;\nusing GameTemplate.Core.Events;\nusing GameTemplate.Core.Audio;\nusing GameTemplate.Gameplay.Events;\n\nnamespace GameTemplate.Gameplay.Audio\n{\n    public class GameplayAudioReactor : MonoBehaviour\n    {\n        [SerializeField] private AudioClip _jumpClip;\n\n        private void OnEnable()  => EventBus.Subscribe<PlayerJumpedEvent>(OnJump);\n        private void OnDisable() => EventBus.Unsubscribe<PlayerJumpedEvent>(OnJump);\n\n        private void OnJump(PlayerJumpedEvent _)\n        {\n            ServiceLocator.Get<IAudioService>().PlaySfx(_jumpClip);\n        }\n    }\n}\n```\n\n### d. Score Manager\n\n```csharp\nusing UnityEngine;\nusing GameTemplate.Core.Events;\nusing GameTemplate.Gameplay.Events;\n\nnamespace GameTemplate.Gameplay.Score\n{\n    public class ScoreManager : MonoBehaviour\n    {\n        private int _score;\n\n        private void OnEnable()  => EventBus.Subscribe<PlayerJumpedEvent>(OnJump);\n        private void OnDisable() => EventBus.Unsubscribe<PlayerJumpedEvent>(OnJump);\n\n        private void OnJump(PlayerJumpedEvent _)\n        {\n            _score++;\n            EventBus.Publish(new ScoreChangedEvent { NewScore = _score });\n        }\n    }\n}\n```\n\n### Quan sát\n\n- 3 file trên **không reference nhau** - chỉ qua Event và Service.\n- Thêm class mới (vd VfxReactor để spawn particle khi nhảy) không cần sửa code cũ.\n- Đây chính là **lý do dùng Event Bus** - tránh \"ai cũng gọi ai\".\n\n## Bước 5: Convention git (10 phút)\n\n- Branch: `feature/jump-mechanic`, `bugfix/audio-crash-android`\n- Commit message: `[Gameplay] Add player jump`, `[Core] Fix save corruption on iOS`\n- PR phải có:\n  - Mô tả ngắn\n  - Screenshot/video nếu là feature UI\n  - Reviewer trong team\n\n## Bước 6: Hỏi (mọi lúc)\n\nĐừng ngại hỏi. Một câu hỏi 30 giây có thể tiết kiệm 3 tiếng debug.\n\n## Checklist hoàn thành onboarding\n\n- [ ] Chạy được Bootstrap → MainMenu không lỗi\n- [ ] Hiểu được flow Service Locator + Event Bus\n- [ ] Làm xong bài tập \"Tap to jump\" và demo cho mentor\n- [ ] Biết folder nào đặt code gì\n- [ ] Đã commit ít nhất 1 PR đúng convention\n", "PATTERNS.md": "# Design Patterns - Khi nào dùng cái nào\n\nTemplate có sẵn 5 pattern. Mỗi pattern giải quyết 1 nhóm vấn đề khác nhau - đừng dùng tất cả cho mọi thứ.\n\n## 1. Reactive Property\n\n**Vấn đề:** Mỗi lần `score++` phải nhớ gọi `UpdateScoreUI()`. Quên 1 chỗ → UI lệch data. Có 5 UI khác nhau cần score → phải gọi 5 method.\n\n**Giải pháp:** `ReactiveProperty<int>` - UI subscribe vào, mỗi khi value đổi tự update.\n\n**Khi nào dùng:**\n- ✅ HP, MP, XP, Coins, Score, Level (data thay đổi liên tục, nhiều UI cần biết)\n- ✅ Inventory dùng `ReactiveCollection<Item>` để UI tự refresh khi add/remove\n- ❌ Data tĩnh load 1 lần (vd: tên player, ngày tạo account) - dùng property thường\n\n**Quy tắc:**\n- Subscribe trong `OnEnable`, Unsubscribe trong `OnDisable` (giống Event Bus)\n- Dùng `SubscribeWithInit` để vừa subscribe vừa init UI với value hiện tại\n- Khi load save dùng `SetSilent` để không trigger UI animation\n\n## 2. Factory + Builder\n\n**Vấn đề:** Spawn enemy có 20 loại, mỗi loại có prefab + stats khác nhau. Hard-code if/else theo type = code rối, designer không thêm enemy mới được.\n\n**Giải pháp:**\n- **Factory**: Designer tạo `EnemyData` ScriptableObject. Factory lookup theo Id, spawn từ pool.\n- **Builder**: Khi spawn cần nhiều tham số tùy chọn (level, modifier, loot) → chain method dễ đọc.\n\n**Khi nào dùng Factory:**\n- ✅ Có nhiều variant cùng base type (enemy, item, projectile, particle effect)\n- ✅ Data thay đổi theo balance design (designer chỉnh ScriptableObject, không cần coder)\n- ❌ 1-2 loại object → tạo trực tiếp, factory là overkill\n\n**Khi nào dùng Builder:**\n- ✅ Constructor có > 4 tham số tùy chọn\n- ✅ Object tạo qua nhiều bước (vd: spawn enemy + apply modifier + add loot table)\n- ❌ Object đơn giản → dùng constructor thường\n\n## 3. MVP (Model-View-Presenter)\n\n**Vấn đề:** UI script vừa fetch data, vừa update Text, vừa xử lý click button, vừa gọi Save... → 500 dòng trong 1 file, không test được, đổi UI là phải sửa logic.\n\n**Giải pháp:** Tách 3 phần:\n- **Model**: data + business logic (pure C#)\n- **View**: chỉ là MonoBehaviour với Text, Image, Button (không logic)\n- **Presenter**: cầu nối, chứa logic UI\n\n**Khi nào dùng:**\n- ✅ UI panel phức tạp: Inventory, Shop, Quest log, Settings, Character sheet\n- ✅ RPG có nhiều stat hiển thị nhiều nơi\n- ✅ UI cần test logic (vd: tính giá item sau discount) mà không cần Unity Editor\n- ❌ HUD đơn giản (1-2 field score, time) → overkill, dùng MonoBehaviour + ReactiveProperty\n- ❌ Hyper-casual UI rất đơn giản → bỏ qua MVP\n\n**Quy tắc:**\n- View **không** import data class. View chỉ nhận lệnh `SetLabel(string)`, `SetFill(float)`.\n- Presenter là pure C#, không kế thừa MonoBehaviour → test bằng NUnit dễ.\n- Bind Presenter ↔ Model qua ReactiveProperty.\n\n## 4. Singleton (an toàn)\n\n**Vấn đề:** Cần truy cập GameManager từ mọi nơi nhưng `FindObjectOfType` chậm.\n\n**Giải pháp:** `MonoSingleton<T>` - lazy, thread-safe, auto find/create, tránh ghost khi quit.\n\n**Khi nào dùng:**\n- ✅ Service không có interface rõ ràng, không có nhiều implementation\n- ✅ Static context cần truy cập (vd: GameManager.Instance.Pause() từ pause button)\n- ❌ **Trong template này ưu tiên ServiceLocator hơn Singleton** vì:\n  - ServiceLocator có interface → dễ mock, dễ test\n  - Singleton coupling cứng vào class cụ thể\n  - Mỗi Singleton thêm = 1 điểm khó test\n\n**Quy tắc:**\n- Đừng tạo > 3 Singleton trong project. Quá nhiều = code spaghetti.\n- Nếu lưỡng lự giữa Singleton và ServiceLocator → chọn ServiceLocator.\n\n## 5. Async helpers (AsyncOp + Sequence)\n\n**Vấn đề:** Coroutine dài dòng, khó chain, không return value, không xử lý exception tốt.\n\n**Giải pháp:** `async/await` với `AsyncOp` wrapper. Sequence builder để chain animation tuần tự.\n\n**Khi nào dùng:**\n- ✅ Cutscene, tutorial sequence (chain nhiều bước có delay)\n- ✅ UI animation fade in -> wait -> fade out\n- ✅ Đợi điều kiện (vd: WaitUntil player chạm điểm)\n- ✅ Load resources async, gọi API async\n- ❌ Trong Update mỗi frame → vẫn dùng Update thường\n\n**Lưu ý mobile:**\n- `Task.Yield()` an toàn cho mobile vì Unity Task chạy trên main thread\n- Đừng dùng `Task.Run` cho code đụng GameObject (crash)\n- Nếu cần performance hơn → migrate sang **UniTask** (api gần như giống y chang)\n\n## Bảng quyết định nhanh\n\n| Tình huống | Pattern dùng |\n|---|---|\n| HP, score, coin đổi liên tục, nhiều UI hiển thị | ReactiveProperty |\n| Spawn nhiều loại enemy có data khác nhau | Factory với ScriptableObject |\n| Tạo object nhiều tham số tùy chọn | Builder |\n| UI panel có logic phức tạp (inventory, shop) | MVP |\n| HUD đơn giản 1-2 field | MonoBehaviour + ReactiveProperty (không cần MVP) |\n| Truy cập GameManager từ mọi nơi | ServiceLocator (ưu tiên) hoặc MonoSingleton |\n| Tutorial chain \"highlight -> wait click -> next\" | Sequence |\n| Fade UI animation | AsyncOp.Tween |\n| Network call, load asset | async/await + AsyncOp.WaitUntil |\n\n## Module sẽ thêm sau (FSM / Command / Strategy)\n\nMỗi cái sẽ là 1 folder riêng trong `Scripts/Core/Patterns/` khi cần:\n\n- **FSM**: enemy AI, game state, puzzle state. Tạo khi có game đầu tiên cần AI behavior.\n- **Command**: undo/redo, replay. Tạo khi làm puzzle có undo hoặc turn-based RPG.\n- **Strategy**: weapon behavior, AI difficulty. Tạo khi có game cần swap behavior runtime.\n\nPattern không có sẵn = ép mình suy nghĩ kỹ trước khi thêm. Đừng thêm pattern \"phòng khi cần\" - chỉ thêm khi đã thấy rõ use case.\n", "README.md": "# Unity Mobile Game Template\n\nTemplate Unity cho game mobile (hyper-casual, puzzle, RPG) - team 2-5 người.\n\n## Yêu cầu\n\n- Unity 2022.3 LTS trở lên (recommend 2022.3 hoặc 6000.x LTS)\n- Module: Android Build Support + iOS Build Support\n- IDE: Visual Studio, Rider hoặc VSCode\n\n## Setup lần đầu\n\n1. Clone repo\n2. Mở Unity Hub → Add project → chọn folder vừa clone\n3. Mở Unity, đợi import xong (lần đầu sẽ lâu ~5-10 phút)\n4. Mở scene **`Assets/_Project/Scenes/Bootstrap.unity`** (chưa có - đọc Documentation/ONBOARDING.md để tạo)\n5. File → Build Settings → kéo Bootstrap lên đầu (index 0)\n6. Bấm Play - game phải tự load từ Bootstrap → MainMenu\n\n## Cấu trúc nhanh\n\n```\nAssets/_Project/      ← Tất cả code/asset của game\n├── Scripts/Core/     ← Framework tái dùng (KHÔNG sửa khi làm game mới)\n├── Scripts/Gameplay/ ← Code game cụ thể\n├── Scenes/           ← Bootstrap + MainMenu + các level\n├── Prefabs/Systems/  ← AudioManager, UIManager prefab\n└── Settings/         ← ScriptableObject config\n\nDocumentation~/       ← Đọc trước khi code (dấu ~ để Unity bỏ qua)\n├── ARCHITECTURE.md   ← Cách các hệ thống nối với nhau\n├── ONBOARDING.md     ← Bắt đầu từ đâu\n└── CODING_STANDARDS.md ← Quy tắc code chung\n```\n\n## Tạo game mới từ template này\n\n1. Clone repo này thành repo mới (đổi remote)\n2. Xóa nội dung (giữ folder + .gitkeep):\n   - `Assets/_Project/Scripts/Gameplay/`\n   - `Assets/_Project/Art/`\n   - `Assets/_Project/Scenes/Gameplay/`\n3. Đổi `Edit → Project Settings → Player`:\n   - Company Name, Product Name, Package Name, Version\n4. Đổi namespace `GameTemplate` → tên game (vd `MyGame`) nếu muốn\n5. Bắt đầu code trong `Scripts/Gameplay/`\n\n## Các lệnh quan trọng\n\n- **Play từ Bootstrap mọi lúc**: bật `Edit → Preferences → SceneAutoLoader` (cần plugin) hoặc tạo menu item tự load.\n- **Bật log dev**: Project Settings → Player → Scripting Define Symbols → thêm `ENABLE_GAME_LOG`. Bỏ ra khi build release.\n- **Build mobile**: File → Build Settings → Android/iOS → Player Settings checklist trong `Documentation~/BUILD_CHECKLIST.md`.\n\n## Documentation\n\nĐọc theo thứ tự nếu mới vào dự án:\n1. `Documentation~/ONBOARDING.md` - bắt đầu từ đâu (~15 phút)\n2. `Documentation~/ARCHITECTURE.md` - hiểu các hệ thống\n3. `Documentation~/CODING_STANDARDS.md` - quy tắc code\n\n## Hỏi ai\n\n- Architecture/Core: [Tech Lead]\n- Gameplay: [Game Designer + lead programmer]\n- Art pipeline: [Art Lead]\n"};
  const MARKDOWN_CONTENT = window.__MARKDOWN_CONTENT__;

  // ==================== Init libraries ====================
  // Custom renderer: tự sinh id cho heading (khớp với GitHub algorithm)
  //
  // Thuật toán slugify của GitHub (verify với source code Jekyll/Gollum):
  //   1. Lowercase
  //   2. Bỏ HTML tags
  //   3. Bỏ ký tự đặc biệt (chấm, ngoặc, slash, +, etc.) - KHÔNG thay bằng dash
  //   4. Space (khoảng trắng) -> dash
  //   5. KHÔNG gộp dash liên tiếp
  //   6. KHÔNG trim dash đầu/cuối
  //
  // Vd: "2b. Bật/tắt âm thanh (mute on/off) - không cần slider"
  //   → bỏ chấm, slash, ngoặc → "2b bậttắt âm thanh mute onoff - không cần slider"
  //   → space→dash → "2b-bậttắt-âm-thanh-mute-onoff---không-cần-slider"
  //   (3 dash giữa "onoff" và "không" vì space-dash-space)
  function slugify(text) {
    return text
      .toString()
      .toLowerCase()
      .trim()
      // Bỏ HTML tags nếu có
      .replace(/<[^>]+>/g, '')
      // Bỏ ký tự đặc biệt: KHÔNG thay bằng dash, chỉ xóa.
      // Giữ: letter (unicode), digit, space, dash, underscore
      .replace(/[^\p{L}\p{N}\s\-_]/gu, '')
      // Space -> dash (sau bước xóa ký tự đặc biệt)
      .replace(/\s/g, '-');
    // KHÔNG gộp dash liên tiếp - GitHub giữ nguyên
    // KHÔNG trim dash đầu/cuối
  }

  const renderer = new marked.Renderer();
  renderer.heading = function(text, level) {
    const slug = slugify(text);
    return `<h${level} id="${slug}">${text}</h${level}>\n`;
  };

  marked.setOptions({
    renderer: renderer,
    highlight: function(code, lang) {
      if (lang && hljs.getLanguage(lang)) {
        try { return hljs.highlight(code, { language: lang }).value; }
        catch (e) {}
      }
      return hljs.highlightAuto(code).value;
    },
    breaks: false,
    gfm: true,
  });

  // Mermaid dark theme để khớp với UI
  mermaid.initialize({
    startOnLoad: false,
    theme: 'dark',
    themeVariables: {
      darkMode: true,
      background: '#161b22',
      primaryColor: '#1f6feb',
      primaryTextColor: '#e6edf3',
      primaryBorderColor: '#30363d',
      lineColor: '#7d8590',
      secondaryColor: '#21262d',
      tertiaryColor: '#161b22',
    }
  });

  // ==================== Build sidebar ====================
  function buildSidebar() {
    const nav = document.getElementById("nav");
    docs.forEach(group => {
      const groupLabel = document.createElement("div");
      groupLabel.className = "group-label";
      groupLabel.textContent = group.group;
      nav.appendChild(groupLabel);

      group.items.forEach(item => {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = item.label;
        a.dataset.file = item.file;
        a.onclick = () => loadDoc(item.file);
        li.appendChild(a);
        nav.appendChild(li);
      });
    });
  }

  // ==================== Load + render markdown ====================
  function loadDoc(fileName) {
    document.querySelectorAll("#nav a").forEach(a => a.classList.remove("active"));
    const active = document.querySelector(`#nav a[data-file="${fileName}"]`);
    if (active) active.classList.add("active");

    const content = document.getElementById("content");
    const markdown = MARKDOWN_CONTENT[fileName];

    if (!markdown) {
      content.innerHTML = `
        <div class="empty">
          <h3>⚠️ Không tải được "${fileName}"</h3>
          <p>File chưa được build hoặc tên file không khớp.</p>
          <p>Trong Unity: <code>GameTemplate → Documentation → 🔨 Rebuild HTML Viewer</code></p>
        </div>`;
      return;
    }

    // Render markdown → HTML
    content.innerHTML = marked.parse(markdown);

    // Convert mermaid code blocks → mermaid div
    const mermaidBlocks = content.querySelectorAll("code.language-mermaid");
    mermaidBlocks.forEach((block, idx) => {
      const pre = block.parentElement;
      const div = document.createElement("div");
      div.className = "mermaid";
      div.id = `mermaid-${Date.now()}-${idx}`;
      div.textContent = block.textContent;
      pre.replaceWith(div);
    });

    // Render mermaid
    try {
      mermaid.run({ querySelector: ".mermaid" });
    } catch (e) {
      console.warn("Mermaid render error:", e);
    }

    // Highlight code blocks (cho block không có lang hint)
    content.querySelectorAll("pre code").forEach(block => {
      if (!block.classList.contains("hljs")) {
        hljs.highlightElement(block);
      }
    });

    // Intercept click vào anchor link nội bộ (#section) trong content
    // → smooth scroll thay vì để browser nhảy thô + bị che bởi toolbar sticky
    content.querySelectorAll('a[href^="#"]').forEach(link => {
      link.addEventListener('click', (e) => {
        const href = link.getAttribute('href');
        if (!href || href === '#') return;
        const targetId = decodeURIComponent(href.slice(1));
        const target = document.getElementById(targetId);
        if (target) {
          e.preventDefault();
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          // Highlight target ngắn để user biết đã nhảy đến đâu
          target.style.transition = 'background 0.3s';
          target.style.background = 'rgba(47, 129, 247, 0.2)';
          setTimeout(() => target.style.background = '', 1500);
        } else {
          console.warn(`[Docs] Không tìm thấy anchor: #${targetId}`);
        }
      });
    });

    // Scroll to top khi load doc mới (hoặc đến anchor nếu có trong URL hash)
    const hashParts = location.hash.slice(1).split('?');
    if (hashParts.length > 1) {
      // URL có dạng #FILE.md?anchor-name → scroll tới anchor
      const anchor = hashParts[1];
      const target = document.getElementById(decodeURIComponent(anchor));
      if (target) {
        setTimeout(() => target.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
      } else {
        window.scrollTo(0, 0);
      }
    } else {
      window.scrollTo(0, 0);
    }

    // Update URL hash để refresh nhớ vị trí
    history.replaceState(null, "", "#" + fileName);

    // Reset search nếu có
    document.getElementById("search").value = "";
  }

  // ==================== Search ====================
  document.getElementById("search").addEventListener("input", e => {
    const keyword = e.target.value.toLowerCase().trim();
    const content = document.getElementById("content");

    // Reset highlight cũ
    content.querySelectorAll(".search-hit").forEach(el => {
      const text = document.createTextNode(el.textContent);
      el.replaceWith(text);
    });

    if (keyword.length < 2) return;

    // Walk text nodes, highlight match
    const walker = document.createTreeWalker(
      content,
      NodeFilter.SHOW_TEXT,
      {
        acceptNode: node => {
          // Bỏ qua script, style, mermaid SVG nội bộ
          const parent = node.parentElement;
          if (!parent) return NodeFilter.FILTER_REJECT;
          const tag = parent.tagName.toLowerCase();
          if (['script', 'style'].includes(tag)) return NodeFilter.FILTER_REJECT;
          if (parent.closest('.mermaid')) return NodeFilter.FILTER_REJECT;
          if (!node.textContent.toLowerCase().includes(keyword)) return NodeFilter.FILTER_REJECT;
          return NodeFilter.FILTER_ACCEPT;
        }
      }
    );

    const matches = [];
    let node;
    while (node = walker.nextNode()) matches.push(node);

    matches.forEach(textNode => {
      const text = textNode.textContent;
      const regex = new RegExp(`(${keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
      const span = document.createElement('span');
      span.innerHTML = text.replace(regex, '<mark class="search-hit">$1</mark>');
      textNode.replaceWith(...span.childNodes);
    });

    // Jump to first match
    const first = content.querySelector(".search-hit");
    if (first) first.scrollIntoView({ behavior: "smooth", block: "center" });
  });

  // ==================== Init ====================
  buildSidebar();

  // Auto load từ URL hash hoặc default Cookbook
  const hashFile = location.hash.slice(1);
  if (hashFile && MARKDOWN_CONTENT[hashFile]) {
    loadDoc(hashFile);
  } else if (MARKDOWN_CONTENT["COOKBOOK.md"]) {
    loadDoc("COOKBOOK.md");
  }
</script>
</body>
