izeField] private SettingsPanel _settingsPanel;\n\n    private void Start()\n    {\n        // Wire button click → method async void\n        _settingsButton.onClick.AddListener(OnSettingsClicked);\n    }\n\n    public async void OnSettingsClicked()\n    {\n        Debug.Log(\"1. User vừa bấm button\");\n\n        await AsyncOp.Delay(0.5f);  // chờ animation button kết thúc\n\n        Debug.Log(\"2. Sau 0.5s - mở popup\");\n        ServiceLocator.Get<UIManager>().Push(_settingsPanel);\n    }\n}\n```\n\n3 cách gọi `async void` phổ biến:\n\n```csharp\n// 1. Wire vào Unity Button OnClick trong Inspector\n_button.onClick.AddListener(DoSomething);\n\n// 2. Gọi trực tiếp từ code khác\nDoSomething();  // fire and forget\n\n// 3. Từ Unity event lifecycle\nprivate void OnTriggerEnter(Collider other)\n{\n    if (other.CompareTag(\"Trap\"))\n        DelayedExplode();  // không đợi, code tiếp tục\n}\n\nprivate async void DelayedExplode()\n{\n    await AsyncOp.Delay(1f);\n    Explode();\n}\n```\n\n### `async void` vs `async Task` - khi nào dùng cái nào?\n\nC# có 2 kiểu method async. Khác biệt nằm ở **return type** và **cách caller xử lý**:\n\n| Đặc điểm | `async void` | `async Task` |\n|---|---|---|\n| **Return** | Không return gì | Return `Task` (hoặc `Task<T>` nếu có value) |\n| **Caller `await` được?** | ❌ Không | ✅ Có |\n| **Caller có thể đợi xong?** | ❌ Không | ✅ Có |\n| **Exception caller bắt được?** | ❌ Không - crash app | ✅ Try-catch như bình thường |\n| **Phù hợp cho** | Event handler (button click, Unity lifecycle) | Helper method, business logic |\n| **Convention tên** | `OnXxx`, `DoXxx` | `XxxAsync` (suffix `Async`) |\n\n#### Ví dụ `async Task`:\n\n```csharp\n// Helper method - tính toán async, return giá trị\nprivate async Task<int> CalculateRewardAsync(int level)\n{\n    await AsyncOp.Delay(0.3f);  // giả lập tính toán\n    return level * 100;\n}\n\n// Caller có thể await để đợi xong\npublic async void OnLevelComplete()\n{\n    int reward = await CalculateRewardAsync(currentLevel);\n    Debug.Log($\"Reward: {reward}\");\n}\n```\n\n#### Lỗi #1: Không `await` được `async void`\n\n```csharp\nprivate async void Bad() { /* ... */ }\nprivate async Task Good() { /* ... */ }\n\n// SAI: await không work với async void\nawait Bad();  // ❌ Compile error\n\n// ĐÚNG: dùng async Task\nawait Good();  // ✅\n```\n\n**Fix:** Nếu cần `await`, đổi return type thành `Task`:\n```csharp\nprivate async Task BadFixedAsync() { /* ... */ }\nawait BadFixedAsync();  // ✅\n```\n\n#### Lỗi #2: Exception trong `async void` crash game\n\n```csharp\n// ❌ NGUY HIỂM: exception không bắt được\nprivate async void Risky()\n{\n    await AsyncOp.Delay(1f);\n    throw new Exception(\"oops\");  // → Unity crash, không bắt được\n}\n\n// ✅ AN TOÀN: dùng async Task, caller try-catch được\nprivate async Task RiskyAsync()\n{\n    await AsyncOp.Delay(1f);\n    throw new Exception(\"oops\");\n}\n\n// Caller:\ntry\n{\n    await RiskyAsync();\n}\ncatch (Exception ex)\n{\n    Debug.LogError($\"Error: {ex.Message}\");\n}\n```\n\n**Quy tắc:** Nếu method có thể throw, luôn dùng `async Task`. Chỉ dùng `async void` cho event handler đơn giản (button click, animation callback).\n\n### Quy ước team\n\n| Loại method | Pattern | Tên method |\n|---|---|---|\n| Event handler (UI click, Unity lifecycle, listener) | `public async void` | `OnXxx`, `OnXxxClicked` |\n| Helper method, business logic, có thể await | `private async Task` | `XxxAsync` |\n| Method có return value | `private async Task<T>` | `GetXxxAsync`, `LoadXxxAsync` |\n\nSuffix `Async` giúp đọc code biết ngay đây là `async Task` - C# convention chuẩn.\n\n### So với coroutine\n\n| Tiêu chí | Coroutine | async/await |\n|---|---|---|\n| Gọi từ method bình thường | `StartCoroutine(Routine())` | Chỉ cần `DoSomething()` |\n| Return value | ❌ Phải dùng callback | ✅ `Task<T>` |\n| Try-catch | ⚠️ Khó (phải wrap yield) | ✅ Tự nhiên |\n| Đợi nhiều thứ song song | ⚠️ Manual track | ✅ `Task.WhenAll` |\n| Hoạt động trên non-MonoBehaviour | ❌ | ✅ |\n| Pause khi `Time.timeScale = 0` | ✅ (WaitForSeconds) | ⚠️ `AsyncOp.Delay` dùng `WaitForSeconds` nên cũng pause |\n\n---\n\n\n## 24. Fade in UI rồi đợi 2s rồi fade out\n\n```csharp\nusing GameTemplate.Core.Patterns.Async;\nusing UnityEngine;\n\npublic class Notification : MonoBehaviour\n{\n    [SerializeField] private CanvasGroup _canvasGroup;\n\n    public async void ShowFor(float duration)\n    {\n        await new Sequence()\n            .Append(() => AsyncOp.Tween(0, 1, 0.3f, v => _canvasGroup.alpha = v))\n            .AppendDelay(duration)\n            .Append(() => AsyncOp.Tween(1, 0, 0.3f, v => _canvasGroup.alpha = v))\n            .AppendCallback(() => gameObject.SetActive(false))\n            .Play();\n    }\n}\n\n// Sử dụng:\nnotification.ShowFor(2f); // fade in → đợi 2s → fade out → ẩn\n```\n\n---\n\n## 25. Đợi đến khi player chạm điểm\n\n```csharp\nusing GameTemplate.Core.Patterns.Async;\n\npublic async void TutorialStep()\n{\n    Debug.Log(\"Đến điểm A\");\n    await AsyncOp.WaitUntil(() => Vector3.Distance(player.position, pointA.position) < 1f);\n\n    Debug.Log(\"Player đã đến A. Đến điểm B!\");\n    await AsyncOp.WaitUntil(\n        () => Vector3.Distance(player.position, pointB.position) < 1f,\n        timeout: 30f // bỏ qua sau 30s\n    );\n\n    Debug.Log(\"Tutorial xong!\");\n}\n```\n\n---\n\n## 25b. Lặp lại action định kỳ (thay thế InvokeRepeating)\n\nUnity có `InvokeRepeating(methodName, delay, interval)` nhưng có nhiều hạn chế:\n- Chỉ chạy trên MonoBehaviour\n- Không truyền parameter cho action\n- Method phải là instance method, không dùng lambda được\n- Exception trong action sẽ kill loop\n\n`AsyncOp.RepeatAction` thay thế tốt hơn với 2 overload:\n\n### Cách 1: Quick use (static field, 1 loop duy nhất)\n\n```csharp\nusing GameTemplate.Core.Patterns.Async;\n\n// Set action global\nAsyncOp.LoopAction = () => Debug.Log($\"tick at {Time.time}\");\n\n// Chạy mỗi 1 giây - action chạy NGAY lập tức lần đầu\n_ = AsyncOp.RepeatAction(1f);\n\n// Cancel khi cần\nAsyncOp.LoopCts.Cancel();\n```\n\n**Đặc điểm:**\n- ✅ Code ngắn gọn, không cần maintain CancellationTokenSource\n- ⚠️ Static field → chỉ 1 loop tại 1 thời điểm (gọi lần 2 cancel auto lần 1)\n- ⚠️ Không dùng được cho nhiều system độc lập\n\n**Dùng khi:** prototype nhanh, tutorial step đơn lẻ, chỉ có 1 timer toàn game.\n\n### Cách 2: Production use (pass parameter, nhiều loop song song)\n\nPattern khuyến nghị cho mọi MonoBehaviour có loop:\n\n```csharp\nusing System.Threading;\nusing GameTemplate.Core.Patterns.Async;\n\npublic class EnemySpawner : MonoBehaviour\n{\n    [SerializeField] private Enemy _enemyPrefab;\n    [SerializeField] private Transform _spawnPoint;\n    [SerializeField] private float _spawnInterval = 2f;\n\n    private CancellationTokenSource _cts;\n\n    private void OnEnable()\n    {\n        _cts = new CancellationTokenSource();\n        // Loop chạy độc lập, không conflict với MonoBehaviour khác\n        _ = AsyncOp.RepeatAction(_spawnInterval, SpawnOne, _cts.Token);\n    }\n\n    private void OnDisable()\n    {\n        // QUAN TRỌNG: cancel khi disable để loop dừng\n        _cts?.Cancel();\n        _cts?.Dispose();\n        _cts = null;\n    }\n\n    private void SpawnOne()\n    {\n        Instantiate(_enemyPrefab, _spawnPoint.position, Quaternion.identity);\n    }\n}\n```\n\n**Đặc điểm:**\n- ✅ Mỗi loop có CancellationToken riêng → nhiều loop song song được\n- ✅ Auto-cancel khi disable GameObject (qua OnDisable) → an toàn\n- ✅ Action throw exception → log nhưng KHÔNG kill loop, tick tiếp tục\n- ✅ Lambda capture biến local được:\n  ```csharp\n  int counter = 0;\n  _ = AsyncOp.RepeatAction(1f, () => Debug.Log($\"counter = {++counter}\"), _cts.Token);\n  ```\n\n### Tham số chi tiết\n\n| Parameter | Default | Mô tả |\n|---|---|---|\n| `intervalSeconds` | required | Khoảng cách giữa các tick (giây). |\n| `action` | required | Method gọi mỗi tick. |\n| `cancellationToken` | `default` | Token dừng loop. Bỏ qua = loop chạy mãi. |\n| `runImmediately` | `true` | True = tick ngay lần đầu, false = đợi interval rồi mới tick lần 1. |\n\n### So với InvokeRepeating\n\n| Tiêu chí | `InvokeRepeating` | `AsyncOp.RepeatAction` |\n|---|---|---|\n| Chạy trên non-MonoBehaviour | ❌ Không | ✅ Có |\n| Truyền parameter / lambda | ❌ Không | ✅ Có |\n| Cancel selective | ❌ Phải biết method name | ✅ CancellationToken riêng |\n| Exception kill loop | ❌ Có | ✅ Không, log rồi tiếp tục |\n| Async/await syntax | ❌ Không | ✅ Có |\n| Pause khi `Time.timeScale = 0` | ✅ Có (default) | ✅ Có (dùng `Delay` scaled time) |\n\n### Use case thực tế\n\n```csharp\n// 1. Auto-save mỗi 30s\nprivate void OnEnable()\n{\n    _saveCts = new CancellationTokenSource();\n    _ = AsyncOp.RepeatAction(30f, () =>\n        _characterController.SaveAtCheckpoint(),\n        _saveCts.Token, runImmediately: false);\n}\n\n// 2. Sync server state mỗi 60s\nprivate void OnEnable()\n{\n    _syncCts = new CancellationTokenSource();\n    _ = AsyncOp.RepeatAction(60f, SyncToServer, _syncCts.Token);\n}\n\n// 3. Spawn boss khi đủ điều kiện (kết hợp với cancel manual)\npublic async void StartBossWave()\n{\n    _bossCts = new CancellationTokenSource();\n    _ = AsyncOp.RepeatAction(5f, SpawnMinion, _bossCts.Token);\n\n    // Đợi 30s rồi spawn boss và stop minion wave\n    await AsyncOp.Delay(30f);\n    _bossCts.Cancel();\n    SpawnBoss();\n}\n```\n\n---\n\n## 26. Thêm cheat command (god mode, add coin)\n\n```csharp\nusing GameTemplate.Core.DevTools;\n\npublic static class GameplayCheats\n{\n    [CheatCommand(\"god_mode\", \"Toggle god mode\")]\n    static void GodMode(string[] args)\n    {\n        Player.Instance.IsGod = !Player.Instance.IsGod;\n        Debug.Log($\"God mode: {Player.Instance.IsGod}\");\n    }\n\n    [CheatCommand(\"add_coin\", \"add_coin <amount>\")]\n    static void AddCoin(string[] args)\n    {\n        if (args.Length == 0) return;\n        int amount = int.Parse(args[0]);\n        PlayerData.Coins += amount;\n    }\n\n    [CheatCommand(\"set_level\", \"set_level <index>\")]\n    static void SetLevel(string[] args)\n    {\n        int idx = int.Parse(args[0]);\n        GameManager.LoadLevel(idx);\n    }\n}\n```\n\nCheat tự discover qua reflection - không cần đăng ký tay.\n\n---\n\n## 27. Mở Cheat Console trong build\n\n- **Editor:** bấm `Tab`\n- **Mobile dev build:** chạm 3 ngón tay\n- **Save Inspector** (xem save file): `F2` (Editor) hoặc 4 ngón tay (mobile)\n\nProduction release build: cheat console KHÔNG có trong build (tự strip).\n\n**Built-in commands:** `help`, `clear`, `close`, `fps`, `scene`, `time_scale 0.5`\n\n---\n\n## 28. Bật log dev\n\nMenu: **GameTemplate → Define Symbol Manager** → tick `ENABLE_GAME_LOG`\n\nHoặc thủ công: Project Settings → Player → Scripting Define Symbols → thêm `ENABLE_GAME_LOG`\n\n**Filter theo category:**\n```csharp\nusing GameTemplate.Core.Logger;\n\n// Trong Bootstrap:\nGameLog.EnabledCategories = LogCategory.Bootstrap | LogCategory.Audio;\n// Chỉ log 2 category này, ẩn hết\n```\n\n---\n\n## 28b. Hiện FPS counter khi test trên device\n\n`FpsDisplay` là component hiện FPS realtime trên màn hình - quan trọng khi test performance trên device thật (Editor luôn show FPS qua Stats panel, nhưng device build thì không).\n\n### Tính năng\n\n- ✅ Hiện FPS hiện tại (số nguyên, update mỗi 0.5s)\n- ✅ Color code: **xanh** ≥60 / **vàng** 30-60 / **đỏ** <30\n- ✅ Optional: Min/Max FPS, Memory usage (MB)\n- ✅ Toggle on/off: phím `~` (PC) hoặc **3-finger tap** (mobile)\n- ✅ 4 góc màn hình (Inspector chọn)\n- ✅ Auto-create UI nếu chưa có Text component\n- ✅ DontDestroyOnLoad - sống xuyên scene\n- ✅ Dùng `unscaledDeltaTime` - không bị Time.timeScale ảnh hưởng (pause vẫn đếm đúng)\n\n### Cách dùng - Cách 1: Auto-create UI (đơn giản nhất)\n\n1. Trong scene Bootstrap, tạo Empty GameObject → đặt tên `FpsDisplay`\n2. Add Component → **Fps Display**\n3. Để `_autoCreateUI = true` và `_fpsText = null`\n4. Component tự tạo Canvas + Text khi chạy\n\nKhi build, FPS counter hiện ngay góc đã chọn.\n\n### Cách dùng - Cách 2: Tự setup UI (custom font, position chính xác)\n\n1. Tạo Canvas overlay → Text con (đặt vị trí góc tuỳ thích)\n2. Set font, size, outline tuỳ ý\n3. Add `FpsDisplay` component → kéo Text vào field `_fpsText`\n4. Set `_autoCreateUI = false`\n\n### Inspector fields\n\n```\nFps Display\n├── UI Reference\n│   ├── Fps Text: (Text hoặc null)\n│   ├── Auto Create UI: ✅\n│   ├── Corner: TopRight\n│   └── Font Size: 28\n│\n├── Display Options\n│   ├── Show Average: ✅      ← Smooth FPS trung bình period\n│   ├── Show Min Max: ☐       ← Min/Max trong 0.5s\n│   └── Show Memory: ☐        ← RAM usage (MB)\n│\n├── Update Rate\n│   └── Update Interval: 0.5  ← Update text mỗi 0.5s\n│\n├── Color Thresholds (FPS)\n│   ├── Good FPS: 60          ← ≥60 = xanh\n│   ├── Warning FPS: 30       ← 30-60 = vàng, <30 = đỏ\n│   └── (3 color fields)\n│\n├── Toggle\n│   ├── Toggle Key: BackQuote    ← Phím `~` cho PC/Editor\n│   └── Toggle Finger Count: 3   ← 3 ngón tap = toggle (mobile)\n│\n└── Lifecycle\n    └── Dont Destroy On Load: ✅\n```\n\n### Toggle qua code\n\n```csharp\n[SerializeField] private FpsDisplay _fpsDisplay;\n\n// Toggle qua nút Cheat Console\npublic void ToggleFps() => _fpsDisplay.Toggle();\n\n// Hoặc qua Cheat Command\n[CheatCommand(\"fps\", \"Toggle FPS display\")]\nstatic void ToggleFps(string[] args)\n{\n    var fps = FindAnyObjectByType<FpsDisplay>();\n    if (fps != null) fps.Toggle();\n}\n```\n\n### Build options\n\n**Dev build (test performance):**\n- Build → tick `Development Build` + `Script Debugging`\n- Kéo `FpsDisplay` vào Bootstrap scene\n- Test trên device thật\n\n**Release build:**\n- Không thêm `FpsDisplay` vào scene production\n- Hoặc thêm nhưng default `_isVisible = false` → user toggle khi cần debug\n\n**Release build cho QA testing:**\n- Thêm `FpsDisplay` vào Bootstrap, default visible\n- QA monitor performance dễ dàng\n- Hard-code toggle ẩn (vd: tap 5 ngón) để player thường không vô tình bật\n\n### Cảnh báo\n\n⚠️ **`GC.GetTotalMemory(false)` (Show Memory) chỉ trả memory managed của .NET**, không bao gồm:\n- Native memory (textures, audio buffers, mesh)\n- Memory unmanaged (DLL plugins)\n\nĐể xem memory đầy đủ trên Android: `adb shell dumpsys meminfo <package_name>`. Còn iOS dùng Xcode Instruments.\n\n⚠️ FPS có thể **không phản ánh frame time thực** nếu game có dynamic resolution / VSync. Dùng `Time.unscaledDeltaTime` đảm bảo đúng nhất.\n\n### Use case track FPS analytics\n\nKết hợp với Analytics để track performance trên real player base:\n\n```csharp\npublic class FpsTracker : MonoBehaviour\n{\n    private float _accumFrameTime;\n    private int _frameCount;\n    private float _sessionStartTime;\n\n    private void Start()\n    {\n        _sessionStartTime = Time.realtimeSinceStartup;\n    }\n\n    private void Update()\n    {\n        _accumFrameTime += Time.unscaledDeltaTime;\n        _frameCount++;\n    }\n\n    private void OnApplicationQuit()\n    {\n        if (_frameCount == 0) return;\n        float avgFps = _frameCount / _accumFrameTime;\n        float sessionDuration = Time.realtimeSinceStartup - _sessionStartTime;\n\n        // Gửi Analytics\n        if (ServiceLocator.TryGet<IAnalyticsService>(out var analytics))\n        {\n            analytics.TrackEvent(\"session_perf\", new Dictionary<string, object>\n            {\n                [\"avg_fps\"] = Mathf.RoundToInt(avgFps),\n                [\"duration_sec\"] = Mathf.RoundToInt(sessionDuration),\n                [\"device_model\"] = SystemInfo.deviceModel,\n            });\n        }\n    }\n}\n```\n\n→ Sau 1 tuần có data: device nào FPS thấp → cần optimize, device nào quá cao → có thể tăng quality settings.\n\n---\n\n## 28c. Fix Unity 6 import ảnh tự động thành Multiple\n\nUnity 6.0 đổi default Sprite Mode = Multiple → mỗi lần kéo ảnh vào dev phải sửa thủ công về Single. Phiền khi import 100+ icon.\n\nTemplate có sẵn 2 tool xử lý:\n\n### Tool 1: `SpriteImportPostprocessor` - tự xử lý lúc import\n\n📁 `Assets/_Project/Scripts/Editor/AssetWorkflow/SpriteImportPostprocessor.cs`\n\n**Cách work:** Unity gọi callback `OnPreprocessTexture()` MỖI KHI có ảnh import. Script set sẵn config (Sprite Mode, PPU, Mipmap...) → Unity import theo config đó. Dev kéo ảnh vào = xong, không cần sửa tay.\n\n**Convention folder mặc định:**\n\n| Folder | Sprite Mode | Mipmap | Mục đích |\n|---|---|---|---|\n| `Art/UI/` | Single | ❌ Off | Icon, button, panel |\n| `Art/Sprites/` | Single | ✅ On | Gameplay sprite đơn |\n| `Art/SpriteSheets/` | **Multiple** | ✅ On | Animation sprite sheet |\n| `Art/Animations/` | **Multiple** | ✅ On | Sprite atlas animation |\n| `Art/Backgrounds/` | Single | ❌ Off | Background lớn (tiết kiệm 33% memory) |\n| `Art/Splash/` | Single | ❌ Off | Splash screen |\n| Mặc định | Single | ✅ On | Mọi folder khác |\n\n**Custom convention:** Mở `SpriteImportPostprocessor.cs`, sửa các array `_multipleSpriteFolders`, `_backgroundFolders` theo cấu trúc project của bạn.\n\n### Tool 2: `SpriteModeBatchTool` - convert ảnh đã import\n\n📁 `Assets/_Project/Scripts/Editor/AssetWorkflow/SpriteModeBatchTool.cs`\n\n`AssetPostprocessor` chỉ work với ảnh import LẦN ĐẦU. Ảnh đã có `.meta` trước đó vẫn giữ setting cũ → cần batch convert thủ công 1 lần.\n\n**3 menu trong Editor:**\n\n#### 1. Convert Selected Sprites to Single\n\nMenu: **GameTemplate → Asset Tools → Convert Selected Sprites to Single**\n\n1. Chọn folder hoặc nhiều ảnh trong Project window\n2. Run menu này\n3. Tool scan toàn bộ texture trong selection → đổi sang Single\n4. Hiện dialog báo kết quả (converted / skipped)\n\nPhù hợp: convert 1 folder lớn nhưng không phải toàn project.\n\n#### 2. Convert All Sprites to Single (Project)\n\nMenu: **GameTemplate → Asset Tools → Convert All Sprites to Single (Project)**\n\nScan toàn bộ `Assets/_Project/` → convert hết sang Single.\n\n⚠️ **Cẩn thận:** nếu có sprite sheet animation đang dùng Multiple thật sự (vd: character spritesheet đã slice frames), tool này sẽ **xóa setup slicing**. Trước khi chạy:\n\n1. Kiểm tra project có sprite sheet animation Multiple thực sự không\n2. Nếu có → bỏ qua tool này, dùng tool 1 với selection cẩn thận\n\n#### 3. Find All Multiple-Mode Sprites\n\nMenu: **GameTemplate → Asset Tools → Find All Multiple-Mode Sprites**\n\n**Audit tool** - không sửa gì, chỉ liệt kê ảnh nào đang Multiple. Log ra Console, click log để select asset.\n\n→ Chạy trước khi `Convert All` để biết những ảnh nào sẽ bị ảnh hưởng.\n\n### Workflow cho project mới\n\n**Bước 1:** Copy 2 file Editor vào `Assets/_Project/Scripts/Editor/AssetWorkflow/`\n\n**Bước 2:** Run **Find All Multiple-Mode Sprites** để audit\n\n**Bước 3:** Nếu có sprite Multiple thật sự (character animation):\n- Note lại path → SKIP các path đó khi convert\n- Hoặc đổi tên folder thành `Art/SpriteSheets/...` để khớp convention\n\n**Bước 4:** Run **Convert All Sprites to Single** (hoặc Convert Selected nếu cẩn thận)\n\n**Bước 5:** Từ giờ, mọi ảnh mới kéo vào sẽ tự đúng setting (qua AssetPostprocessor).\n\n### Workflow cho project đang chạy\n\nĐã có hàng trăm sprite trong project:\n\n1. **KHÔNG** chạy `Convert All` ngay - check xem có Multiple thật sự không (character sheet, tilemap...)\n2. Backup project trước (git commit)\n3. Chạy **Find All Multiple-Mode Sprites** → xem list\n4. Folder nào đúng là Single → chạy Convert Selected trên folder đó\n5. Folder có animation thật → để yên, hoặc đổi folder name theo convention\n\n### Customize cấu hình mặc định\n\nMở `SpriteImportPostprocessor.cs`:\n\n```csharp\nprivate void OnPreprocessTexture()\n{\n    var importer = (TextureImporter)assetImporter;\n    if (!IsFirstImport()) return;\n\n    // Sửa các config ở đây theo project của bạn\n    importer.textureType = TextureImporterType.Sprite;\n    importer.spritePixelsPerUnit = 100f;        // ← Đổi PPU mặc định\n    importer.maxTextureSize = 2048;              // ← Đổi max size\n    importer.filterMode = FilterMode.Bilinear;   // ← Bilinear / Point / Trilinear\n\n    // Compression mặc định: dev có thể thêm\n    // importer.textureCompression = TextureImporterCompression.Compressed;\n}\n```\n\nHoặc thêm convention folder mới:\n\n```csharp\n// Thêm folder Pixel Art (cần Point filter)\nprivate static readonly string[] _pixelArtFolders = new[]\n{\n    \"/Art/PixelArt/\",\n};\n\n// Trong OnPreprocessTexture:\nif (IsInAnyFolder(_pixelArtFolders))\n{\n    importer.filterMode = FilterMode.Point;\n    importer.textureCompression = TextureImporterCompression.Uncompressed;\n}\n```\n\n### Common pitfalls\n\n**Pitfall 1: Setting không apply cho ảnh cũ**\n\n`AssetPostprocessor` chỉ work khi ảnh **import lần đầu** (chưa có `.meta`). Ảnh đã trong project → cần Reimport thủ công:\n- Right-click ảnh → Reimport\n- Hoặc dùng `SpriteModeBatchTool` để batch\n\n**Pitfall 2: Override setting không mong muốn**\n\nScript default check `IsFirstImport()` - không động vào ảnh đã có setting. Nhưng nếu bạn muốn FORCE re-apply lên ảnh cũ:\n- Comment dòng `if (!IsFirstImport()) return;`\n- ⚠️ Cẩn thận: mọi ảnh sẽ bị reset về convention\n\n**Pitfall 3: Conflict với Unity Sprite Atlas**\n\nNếu project dùng Sprite Atlas (Unity Package), atlas đôi khi yêu cầu sprite ở Multiple mode. Convention `Art/Atlases/` đã handle case này (default Multiple cho folder đó).\n\n**Pitfall 4: Workflow team - tránh re-import liên tục**\n\nKhi dev khác kéo ảnh mới vào git → push → ai pull về sẽ re-import. Đảm bảo:\n- File `.meta` được commit (đã có trong `.gitignore` template)\n- AssetPostprocessor work giống nhau ở mọi máy → không có inconsistency\n\n---\n\n## 29. Lỗi \"Cannot Add Component\"\n\n**Triệu chứng:** Add Component → search tên class → không thấy.\n\n**Nguyên nhân:**\n1. Tên file `.cs` không khớp tên class (vd file `Player.cs` có `class PlayerController`)\n2. Compile error đâu đó trong project (xem Console)\n3. Class không kế thừa MonoBehaviour\n\n**Fix:**\n1. Đảm bảo tên file = tên class\n2. Mở Console → fix mọi lỗi đỏ → Unity tự recompile\n3. Nếu vẫn không thấy: Right-click trong Project window → Reimport All\n\n---\n\n## 30. Lỗi \"Service chưa được register\"\n\n**Triệu chứng:**\n```\nInvalidOperationException: [ServiceLocator] Service IAudioService chưa được register.\n```\n\n**Nguyên nhân:** Bạn đang Play scene gameplay trực tiếp (không qua Bootstrap), nên các service chưa init.\n\n**Fix:**\n1. Bật Scene Auto-Loader: Menu **GameTemplate → Scene Auto-Loader → Enabled** (tick)\n2. Bấm Play lần nữa - Unity tự load Bootstrap trước rồi load lại scene gameplay\n3. Hoặc: tự mở scene Bootstrap trước khi Play\n", "DIAGRAMS.md": "# Architecture Diagrams\n\nĐây là các diagram giải thích cách hệ thống hoạt động. Tất cả dùng [Mermaid](https://mermaid.js.org/) - GitHub tự render khi bạn xem file `.md` này.\n\n**Để sửa diagram:** chỉ cần edit text trong code block, không cần tool ngoài.\n\n---\n\n## 1. Toàn cảnh kiến trúc 3 lớp\n\n```mermaid\nflowchart TB\n    subgraph entry[\"🎬 Entry Point\"]\n        Bootstrap[Bootstrap Scene<br/>GameBootstrap.cs]\n    end\n\n    subgraph core[\"🔧 Core Framework - tái dùng nhiều game\"]\n        SL[ServiceLocator<br/>DI nhẹ]\n        EB[EventBus<br/>Pub/Sub zero-alloc]\n        SS[SaveService<br/>JSON + Atomic write]\n        Loader[SceneLoader<br/>Async + Loading event]\n        Audio[AudioManager<br/>Pool + Mixer]\n        UI[UIManager<br/>Stack-based panel]\n    end\n\n    subgraph mobile[\"📱 Mobile Services\"]\n        Ads[AdsService<br/>Mediation switchable]\n        IAP[IapService<br/>Purchase + Restore]\n        Analytics[Analytics<br/>Multi-provider]\n        Config[RemoteConfig<br/>A/B test ready]\n        Loc[Localization<br/>CSV import]\n        Haptic[HapticService<br/>iOS+Android]\n    end\n\n    subgraph gameplay[\"🎮 Gameplay - game-specific\"]\n        Player[Player Controller]\n        Enemy[Enemies]\n        Rules[Game Rules]\n    end\n\n    Bootstrap --> core\n    Bootstrap --> mobile\n    gameplay -.gọi qua interface.-> core\n    gameplay -.gọi qua interface.-> mobile\n\n    style entry fill:#fff4e6,stroke:#f59e0b\n    style core fill:#e0e7ff,stroke:#6366f1\n    style mobile fill:#e0f2fe,stroke:#0284c7\n    style gameplay fill:#fce7f3,stroke:#ec4899\n```\n\n---\n\n## 2. Bootstrap startup sequence (chi tiết)\n\nĐây là thứ tự việc khi game khởi động. Cực kỳ quan trọng để debug \"tại sao service X null\":\n\n```mermaid\nsequenceDiagram\n    participant U as Unity\n    participant GB as GameBootstrap\n    participant MSB as MobileBootstrapper\n    participant SL as ServiceLocator\n    participant Mock as Mock Services\n    participant Scene as SceneLoader\n\n    U->>GB: Awake()\n    Note over GB: [DefaultExecutionOrder(-1000)]<br/>Chạy trước mọi script khác\n\n    GB->>GB: ConfigureMobile()<br/>(60fps, screenSleep off)\n    GB->>SL: Register<ISaveService>\n    GB->>SL: Register<ISceneLoader>\n    GB->>SL: Register<IAudioService>\n    GB->>SL: Register<UIManager>\n\n    GB->>MSB: InitializeAsync()\n    MSB->>MSB: DeviceInfoService<br/>(detect tier Low/Mid/High)\n    MSB->>MSB: ApplyTierSettings()<br/>(QualitySettings.SetQualityLevel)\n    MSB->>SL: Register Haptic, Localization\n    MSB->>Mock: RemoteConfig.FetchAsync()\n    Mock-->>MSB: defaults loaded\n    MSB->>SL: Register IRemoteConfigService\n    par Init song song\n        MSB->>Mock: Analytics.Initialize()\n    and\n        MSB->>Mock: Ads.Initialize()\n    and\n        MSB->>Mock: IAP.Initialize()\n    end\n    Mock-->>MSB: All ready\n    MSB-->>GB: Done\n\n    GB->>Scene: LoadSceneAsync(\"MainMenu\")\n    Scene-->>U: MainMenu loaded\n    Note over U: 🎮 Game ready to play\n```\n\n**Debug tip:** Nếu game đứng ở Bootstrap không load MainMenu → mở Console (bật ENABLE_GAME_LOG) → xem log đến chỗ nào thì dừng → biết service nào fail init.\n\n---\n\n## 3. Service Locator pattern\n\nCách các module tìm thấy nhau mà không reference trực tiếp:\n\n```mermaid\nflowchart LR\n    subgraph register[\"Bootstrap (chạy 1 lần)\"]\n        B[GameBootstrap.Awake] --> R1[ServiceLocator.Register<br/>IAudioService → audioMgr]\n        B --> R2[ServiceLocator.Register<br/>ISaveService → saveSvc]\n    end\n\n    subgraph use[\"Gameplay (chạy nhiều lần)\"]\n        PC[CoinPickup.OnTriggerEnter] --> G1[ServiceLocator.Get<br/>&lt;IAudioService&gt;]\n        PG[PlayerProgress.Save] --> G2[ServiceLocator.Get<br/>&lt;ISaveService&gt;]\n\n        G1 --> Audio[audioMgr.PlaySfx]\n        G2 --> Save[saveSvc.SaveAsync]\n    end\n\n    register -.dictionary lookup.-> use\n\n    style register fill:#e0e7ff,stroke:#6366f1\n    style use fill:#fce7f3,stroke:#ec4899\n```\n\n**Lợi ích:**\n- Module gameplay không biết AudioManager cụ thể nào, chỉ biết `IAudioService`\n- Đổi implementation (vd `AudioManager` → `FMODAudioManager`) → gameplay code không sửa\n- Test dễ: register mock service trong unit test\n\n---\n\n## 4. Event Bus - giao tiếp giữa modules\n\nĐây là cách module không phụ thuộc trực tiếp nhau:\n\n```mermaid\nflowchart TB\n    subgraph publishers[\"📤 Publishers\"]\n        P1[CoinPickup]\n        P2[Enemy.OnDeath]\n        P3[Player.Jump]\n    end\n\n    EB((EventBus<br/>static))\n\n    subgraph subscribers[\"📥 Subscribers - không biết publisher\"]\n        S1[ScoreManager]\n        S2[AudioReactor]\n        S3[VFXSpawner]\n        S4[UIPopup]\n        S5[Analytics]\n    end\n\n    P1 -->|CoinCollectedEvent| EB\n    P2 -->|EnemyKilledEvent| EB\n    P3 -->|PlayerJumpedEvent| EB\n\n    EB -->|CoinCollectedEvent| S1\n    EB -->|CoinCollectedEvent| S2\n    EB -->|EnemyKilledEvent| S1\n    EB -->|EnemyKilledEvent| S3\n    EB -->|EnemyKilledEvent| S4\n    EB -->|EnemyKilledEvent| S5\n    EB -->|PlayerJumpedEvent| S2\n\n    style publishers fill:#fef3c7,stroke:#f59e0b\n    style EB fill:#dbeafe,stroke:#3b82f6\n    style subscribers fill:#dcfce7,stroke:#22c55e\n```\n\n**Quy tắc:**\n- 1 event = 1 struct (zero GC)\n- Publisher không biết ai subscribe\n- Subscriber phải `Unsubscribe` trong `OnDisable` (xem Cookbook recipe #10)\n\n---\n\n## 5. MVP UI pattern (RPG inventory ví dụ)\n\n```mermaid\nflowchart LR\n    subgraph m[\"📦 Model (Pure C#)\"]\n        Data[InventoryData<br/>ReactiveCollection&lt;Item&gt;]\n    end\n\n    subgraph p[\"🧠 Presenter (Pure C#)\"]\n        Logic[InventoryPresenter<br/>Subscribe Model<br/>Update View]\n    end\n\n    subgraph v[\"🎨 View (MonoBehaviour)\"]\n        View[InventoryView<br/>SetItemCount<br/>AddItemSlot<br/>RemoveItemSlot]\n    end\n\n    Data -->|OnAdd/OnRemove event| Logic\n    Logic -->|gọi method| View\n    View -->|user click button| Logic\n    Logic -->|update Model| Data\n\n    style m fill:#fef3c7,stroke:#f59e0b\n    style p fill:#dbeafe,stroke:#3b82f6\n    style v fill:#dcfce7,stroke:#22c55e\n```\n\n**Lợi ích:**\n- **View**: chỉ biết UI component (Text, Image), không biết business logic\n- **Presenter**: chứa logic, test được mà không cần Unity Editor\n- **Model**: data thuần, không phụ thuộc Unity\n- Designer thay UI khác hoàn toàn → Presenter không sửa\n\n---\n\n## 6. Factory + Pool lifecycle (spawn enemy)\n\n```mermaid\nsequenceDiagram\n    participant Caller as EnemyManager\n    participant Factory as PrefabFactory\n    participant Pool as ObjectPool\n    participant Enemy\n\n    Note over Caller,Enemy: Lần spawn đầu tiên\n\n    Caller->>Factory: Create(\"slime\", pos)\n    Factory->>Pool: Init pool (size 8)\n    loop 8 lần\n        Pool->>Enemy: Instantiate prefab\n        Pool->>Enemy: SetActive(false)\n    end\n    Factory->>Pool: Get()\n    Pool->>Enemy: SetActive(true)\n    Pool-->>Factory: enemy instance\n    Factory->>Enemy: Configure(slimeData)\n    Factory-->>Caller: enemy\n\n    Note over Caller,Enemy: Enemy chết\n\n    Caller->>Factory: Return(\"slime\", enemy)\n    Factory->>Pool: Release(enemy)\n    Pool->>Enemy: SetActive(false)\n    Note over Pool: Enemy trong pool, sẵn sàng spawn lần sau\n\n    Note over Caller,Enemy: Spawn tiếp - KHÔNG Instantiate mới!\n\n    Caller->>Factory: Create(\"slime\", pos2)\n    Factory->>Pool: Get() (đã có sẵn)\n    Pool->>Enemy: SetActive(true)\n    Pool-->>Factory: enemy (reused)\n    Factory->>Enemy: Configure(slimeData)\n    Factory-->>Caller: enemy\n```\n\n**Vì sao mobile cần pattern này:**\n- `Instantiate`/`Destroy` mỗi enemy = GC spike = frame drop\n- Pool reuse object → 0 alloc trong gameplay loop\n\n---\n\n## 7. Reactive Property data flow\n\nCách HP/Score tự update lên UI mà không cần gọi `UpdateUI()`:\n\n```mermaid\nflowchart LR\n    subgraph game[\"Gameplay code\"]\n        Damage[player.TakeDamage 20]\n        Damage --> Hp[Hp.Value = 80]\n    end\n\n    subgraph reactive[\"ReactiveProperty&lt;int&gt; Hp\"]\n        Hp --> Check{Value changed?}\n        Check -->|yes| Notify[Notify subscribers]\n        Check -->|no| Skip[Skip]\n    end\n\n    subgraph ui[\"UI subscribers - tự động\"]\n        Notify --> S1[HpText.text = '80']\n        Notify --> S2[HpBar.fillAmount = 0.8]\n        Notify --> S3[ShakeCamera if low HP]\n    end\n\n    style game fill:#fef3c7,stroke:#f59e0b\n    style reactive fill:#dbeafe,stroke:#3b82f6\n    style ui fill:#dcfce7,stroke:#22c55e\n```\n\n---\n\n## 8. Mobile services - Mock vs Real SDK\n\nCách template build được mà không cần import SDK:\n\n```mermaid\nflowchart TB\n    Game[Gameplay code]\n    Game -->|depends on| IAds[IAdsService<br/>interface]\n\n    IAds -.implementation.-> Factory{AdsServiceFactory.Create<br/>kiểm tra define}\n\n    Factory -->|UNITY_EDITOR| Mock[MockAdsService<br/>log + return success<br/>luôn 'ready']\n    Factory -->|ADS_UNITY define| UA[UnityAdsService<br/>compile khi có SDK]\n    Factory -->|ADS_ADMOB define| AM[AdMobAdsService<br/>compile khi có SDK]\n    Factory -->|ADS_APPLOVIN define| AL[AppLovinAdsService<br/>compile khi có SDK]\n    Factory -->|none defined| Mock\n\n    style Game fill:#fce7f3,stroke:#ec4899\n    style IAds fill:#dbeafe,stroke:#3b82f6\n    style Mock fill:#dcfce7,stroke:#22c55e\n    style UA fill:#fef3c7,stroke:#f59e0b\n    style AM fill:#fef3c7,stroke:#f59e0b\n    style AL fill:#fef3c7,stroke:#f59e0b\n```\n\n**Triết lý:** Code gameplay trước, gắn SDK cuối. Khi chưa có SDK → Mock chạy bình thường, gameplay test được hết.\n\n---\n\n## 9. Scene flow (game lifecycle)\n\n```mermaid\nstateDiagram-v2\n    [*] --> Bootstrap : App start\n    Bootstrap --> Bootstrap : Init services\n    Bootstrap --> MainMenu : All ready\n\n    MainMenu --> Gameplay : Player bấm Play\n    Gameplay --> Pause : ESC / pause button\n    Pause --> Gameplay : Resume\n    Pause --> MainMenu : Quit to menu\n\n    Gameplay --> GameOver : Win/Lose\n    GameOver --> Gameplay : Retry\n    GameOver --> MainMenu : Back to menu\n\n    note right of Bootstrap\n        Chạy 1 lần duy nhất\n        Services persist qua DontDestroyOnLoad\n    end note\n\n    note right of Gameplay\n        Có thể là Level 1, 2, 3...\n        Mỗi level = 1 scene riêng\n        hoặc dùng 1 scene + load level data\n    end note\n```\n\n---\n\n## 10. Folder structure ↔ Namespace mapping\n\n```mermaid\nflowchart LR\n    subgraph folders[\"📁 Folders\"]\n        F1[Scripts/Core/]\n        F2[Scripts/Core/Mobile/Ads/]\n        F3[Scripts/Core/Patterns/Reactive/]\n        F4[Scripts/Gameplay/]\n        F5[Scripts/UI/]\n        F6[Scripts/Editor/]\n    end\n\n    subgraph ns[\"📛 Namespaces\"]\n        N1[GameTemplate.Core.&lt;System&gt;]\n        N2[GameTemplate.Core.Mobile.Ads]\n        N3[GameTemplate.Core.Patterns.Reactive]\n        N4[GameTemplate.Gameplay.&lt;Feature&gt;]\n        N5[GameTemplate.UI]\n        N6[GameTemplate.Editor]\n    end\n\n    subgraph asm[\"📦 Assembly Definitions\"]\n        A1[GameTemplate.Core.asmdef]\n        A2[GameTemplate.Gameplay.asmdef]\n        A3[GameTemplate.Editor.asmdef]\n    end\n\n    F1 --> N1 --> A1\n    F2 --> N2 --> A1\n    F3 --> N3 --> A1\n    F4 --> N4 --> A2\n    F5 --> N5 --> A2\n    F6 --> N6 --> A3\n\n    A2 -->|references| A1\n    A3 -->|references| A1\n    A3 -->|references| A2\n\n    style folders fill:#fef3c7,stroke:#f59e0b\n    style ns fill:#dbeafe,stroke:#3b82f6\n    style asm fill:#dcfce7,stroke:#22c55e\n```\n\n**Lợi ích Assembly Definition:**\n- Sửa code Gameplay → chỉ compile Gameplay, không compile lại Core → nhanh hơn\n- Ép kỷ luật: Core không reference Gameplay được → đảm bảo Core reusable\n\n---\n\n## 11. Adaptive Quality tier detection\n\n```mermaid\nflowchart TB\n    Start([Device boot]) --> Detect[DeviceInfoService.DetectTier]\n\n    Detect --> CheckRAM{RAM ≥ 6GB<br/>+ VRAM ≥ 2GB<br/>+ 8 cores?}\n    CheckRAM -->|yes| High[Tier: High<br/>60fps, MSAA 2x<br/>Shadows ON]\n    CheckRAM -->|no| CheckMid{RAM ≥ 3GB<br/>+ VRAM ≥ 1GB<br/>+ 4 cores?}\n    CheckMid -->|yes| Mid[Tier: Mid<br/>60fps, no MSAA<br/>Shadows hard only]\n    CheckMid -->|no| Low[Tier: Low<br/>30fps, no shadows<br/>Half texture res]\n\n    High --> Apply[ApplyTierSettings<br/>QualitySettings.SetQualityLevel]\n    Mid --> Apply\n    Low --> Apply\n\n    style High fill:#dcfce7,stroke:#22c55e\n    style Mid fill:#fef3c7,stroke:#f59e0b\n    style Low fill:#fee2e2,stroke:#ef4444\n```\n\nUser có thể override trong Settings menu nếu muốn.\n\n---\n\n## Tips xem diagram trên GitHub\n\n1. Mở repo trên GitHub → click vào file `DIAGRAMS.md`\n2. GitHub tự render Mermaid → diagram hiện như ảnh\n3. Click vào diagram để xem full screen\n4. Edit ngay trên web: click pencil icon → sửa text → preview tab xem trước\n\n**Nếu diagram không render:**\n- GitHub support Mermaid từ 2022 - đảm bảo bạn đang trên github.com (không phải Bitbucket/legacy server)\n- Nếu dùng GitLab: cũng support, từ 13.3+\n- Local: cài extension VSCode \"Markdown Preview Mermaid Support\"\n", "EDITOR_TOOLS.md": "# Editor Tools\n\nTemplate cung cấp **8 universal editor tools** + **meta-tools** để team build game-specific editors nhanh hơn.\n\n## Đảm bảo không ảnh hưởng dung lượng build\n\nUnity tự strip editor code khỏi build bằng 3 cơ chế:\n\n| Cơ chế | Áp dụng cho | Cách nhận biết |\n|---|---|---|\n| Folder `Editor/` | Mọi script trong folder tên `Editor` | Folder `Assets/_Project/Scripts/Editor/` |\n| Assembly Definition `includePlatforms: [\"Editor\"]` | Cả assembly compile chỉ cho Editor | File `GameTemplate.Editor.asmdef` |\n| `#if UNITY_EDITOR \\|\\| DEVELOPMENT_BUILD` | Code runtime cần debug trên device | CheatConsole, SaveInspector |\n\n**Verify trước khi ship release:**\n\n```\nFile > Build Settings > Development Build = OFF\nBuild Android Release qua menu GameTemplate > Build > Android Release\n```\n\nBuild production sẽ KHÔNG chứa:\n- Mọi code trong `Scripts/Editor/`\n- CheatConsole, SaveInspector (vì `DEVELOPMENT_BUILD` chưa define)\n\n## 8 Tools có sẵn\n\n### Nhóm 1: Infrastructure\n\n#### 1.1 Scene Auto-Loader\n- **Menu:** `GameTemplate > Scene Auto-Loader > Enabled`\n- **Tính năng:** Bấm Play ở scene bất kỳ → tự load Bootstrap trước → Stop về scene cũ.\n- **Extend:** Đổi `BootstrapScenePath` trong code nếu folder scene khác.\n\n#### 1.2 Define Symbol Manager\n- **Menu:** `GameTemplate > Define Symbol Manager`\n- **Tính năng:** UI checkbox để bật/tắt define (`ADS_UNITY`, `ENABLE_GAME_LOG`...).\n- **Extend:** Thêm define mới vào `_groups` array trong code:\n  ```csharp\n  new DefineGroup(\"Multiplayer\", new[]\n  {\n      new DefineEntry(\"MULTIPLAYER_PHOTON\", \"Photon SDK\"),\n      new DefineEntry(\"MULTIPLAYER_MIRROR\", \"Mirror Networking\"),\n  }),\n  ```\n\n#### 1.3 Build Pipeline\n- **Menu:** `GameTemplate > Build > Android/iOS Dev/Release`\n- **Tính năng:** One-click build, auto increment version, output theo timestamp folder.\n- **Extend:**\n  - Thêm webhook Slack: trong `ExecuteBuild`, sau khi `BuildResult.Succeeded` gọi API Slack.\n  - Auto upload Firebase Distribution: dùng `firebase appdistribution:distribute` qua `System.Diagnostics.Process`.\n\n### Nhóm 2: Quality of Life\n\n#### 2.1 Hierarchy Icons\n- **Tự động:** Hiện icon component bên cạnh GameObject trong Hierarchy.\n- **Extend:** Thêm icon cho component custom (vd PlayerController) trong `_iconMappings`:\n  ```csharp\n  (typeof(PlayerController), \"Player\"),\n  (typeof(EnemyAI), \"Enemy\"),\n  ```\n\n#### 2.2 Project Shortcuts\n- **Menu:** `GameTemplate > Open/Folder/Clear`\n- **Tính năng:** Quick open Bootstrap scene, Build settings, Persistent Data folder, clear PlayerPrefs/saves.\n- **Extend:** Thêm shortcut riêng cho game:\n  ```csharp\n  [MenuItem(\"GameTemplate/Open/Level Editor\", priority = 35)]\n  public static void OpenLevelEditor() => LevelEditorWindow.Open();\n  ```\n\n#### 2.3 ScriptableObject Browser\n- **Menu:** `GameTemplate > ScriptableObject Browser`\n- **Tính năng:** Window xem mọi SO trong project, lọc theo type, edit inline.\n- **Use case:** RPG có 50 enemy SO → mở browser duyệt balance nhanh, không phải tìm từng file.\n- **Tự động:** Detect mọi class kế thừa ScriptableObject. Không cần config gì.\n\n### Nhóm 3: Asset Workflow\n\n#### 3.1 CSV → Localization Importer\n- **Menu:** `GameTemplate > Import > CSV to Localization Table`\n- **Workflow chuẩn:**\n  1. Designer làm sheet Google Sheets với cột `Key | English | Vietnamese | Japanese...`\n  2. File → Download → CSV\n  3. Unity: GameTemplate > Import > CSV to Localization Table\n  4. Chọn file CSV vừa download, chọn nơi save `.asset`\n  5. Game tự dùng table mới qua `ServiceLocator.Get<ILocalizationService>()`\n- **Format CSV:**\n  ```\n  Key,English,Vietnamese,Japanese\n  ui.play,Play,Chơi,プレイ\n  ui.settings,Settings,Cài đặt,設定\n  ```\n- **Extend:** Tạo importer tương tự cho ItemData, EnemyData... copy file `CsvToLocalizationImporter.cs` làm template.\n\n### Nhóm 4: Meta-Tools (để build game-specific tools)\n\n#### 4.1 Inspector Attributes + PropertyDrawers\nAttributes có sẵn dùng được ngay trong ScriptableObject hoặc MonoBehaviour:\n\n```csharp\npublic class EnemyData : ScriptableObject\n{\n    [MinMaxRange(0, 100)] public Vector2 DamageRange;\n    [Tag] public string TargetTag;\n    [Layer] public int EnemyLayer;\n    [ReadOnly] public string Id; // không cho sửa trong inspector\n    [InspectorNote(\"Boss chỉ spawn 1 lần per level\", InspectorNoteAttribute.MessageType.Warning)]\n    public bool IsBoss;\n    [ShowIf(nameof(IsBoss))] public BossConfig BossSettings;\n}\n```\n\n**Extend - thêm attribute mới:**\n1. Tạo `MyAttribute : PropertyAttribute` trong `Scripts/Core/Patterns/Attributes/`\n2. Tạo `MyDrawer : PropertyDrawer` trong `Scripts/Editor/MetaTools/` với `[CustomPropertyDrawer(typeof(MyAttribute))]`\n\n#### 4.2 EditorWindowBase<T>\nBase class để build custom editor cho data game-specific. Có sẵn:\n- Toolbar (New, Refresh, Search)\n- List panel với search filter\n- Detail panel với default inspector\n- Delete confirmation\n\n**Tạo Quest Editor cho game RPG trong 30 dòng:**\n\n```csharp\nusing UnityEditor;\nusing UnityEngine;\nusing GameTemplate.Editor.MetaTools;\n\npublic class QuestEditorWindow : EditorWindowBase<Quest>\n{\n    [MenuItem(\"MyGame/Quest Editor\")]\n    public static void Open() => GetWindow<QuestEditorWindow>(\"Quest Editor\");\n\n    protected override Quest CreateNew()\n    {\n        var quest = CreateInstance<Quest>();\n        var path = EditorUtility.SaveFilePanelInProject(\n            \"New Quest\", \"NewQuest\", \"asset\", \"\");\n        if (string.IsNullOrEmpty(path)) return null;\n        AssetDatabase.CreateAsset(quest, path);\n        return quest;\n    }\n\n    protected override string GetItemDisplayName(Quest q) => q.QuestName;\n\n    protected override void DrawCustomToolbar()\n    {\n        if (GUILayout.Button(\"Validate All\", EditorStyles.toolbarButton))\n        {\n            foreach (var q in _items) q.Validate();\n        }\n    }\n}\n```\n\nCó ngay UI 3-panel chuyên nghiệp, không phải code lại từ đầu.\n\n### Nhóm 5: Debug Runtime (Cheat Console + Save Inspector)\n\n#### 5.1 Cheat Console\n- **Toggle:** `Tab` (Editor), 3-finger tap (mobile dev build)\n- **Built-in commands:** `help`, `clear`, `close`, `fps`, `scene`, `time_scale`\n- **Extend - cách 1 (RegisterCommand):**\n  ```csharp\n  void Start()\n  {\n      CheatConsole.RegisterCommand(\"add_coin\", \"add_coin <amount>\", args =>\n      {\n          int amount = int.Parse(args[0]);\n          PlayerData.Instance.Coins += amount;\n      });\n  }\n  ```\n- **Extend - cách 2 (attribute, recommend):**\n  ```csharp\n  public static class GameplayCheats\n  {\n      [CheatCommand(\"god_mode\", \"Toggle god mode\")]\n      static void GodMode(string[] args)\n      {\n          Player.IsGod = !Player.IsGod;\n      }\n\n      [CheatCommand(\"set_level\", \"set_level <index>\")]\n      static void SetLevel(string[] args)\n      {\n          int idx = int.Parse(args[0]);\n          GameManager.LoadLevel(idx);\n      }\n  }\n  ```\n  Console tự discover qua reflection, không cần đăng ký tay.\n\n#### 5.2 Save Inspector\n- **Toggle:** `F2` (Editor), 4-finger tap (mobile dev build)\n- **Tính năng:** Xem file save JSON, edit trực tiếp, lưu lại, delete file.\n- **Use case:** Test edge case \"hp = 0\", \"coin overflow\", \"level 999\" mà không phải replay game.\n\n#### Đảm bảo release build sạch\nBuild menu `Build > Android Release` đã tắt `Development Build` mặc định. Verify:\n\n```csharp\n// Code này trong gameplay vẫn compile được dù release build:\nCheatConsole.RegisterCommand(\"test\", \"\", args => { });\n// Vì stub class luôn tồn tại. Method chỉ là no-op trong release.\n```\n\nQuan trọng: **KHÔNG để key dev** (Tab, F2, multi-touch) trigger logic gì khác. Người dùng cuối nhấn vào không có gì xảy ra (Console không tồn tại trong release).\n\n## Best practices cho team\n\n1. **Đừng commit Development Build option đang ON.** Default OFF, dev tự bật khi cần.\n2. **Thêm cheat khi gặp bug khó tái hiện.** Tăng năng suất QA.\n3. **Cheat command nên có prefix theo system:** `audio_volume`, `audio_play`, `player_god`, `player_coin`. Dễ tra cứu.\n4. **Editor tool extend dần khi cần.** Đừng build sẵn tool cho feature chưa có.\n\n## Bảng tổng kết tools\n\n| Tool | Folder | Strip khỏi build? |\n|---|---|---|\n| Scene Auto-Loader | `Editor/Infrastructure/` | ✅ (folder Editor) |\n| Define Symbol Manager | `Editor/Infrastructure/` | ✅ |\n| Build Pipeline | `Editor/Infrastructure/` | ✅ |\n| Hierarchy Icons | `Editor/QualityOfLife/` | ✅ |\n| Project Shortcuts | `Editor/QualityOfLife/` | ✅ |\n| SO Browser | `Editor/QualityOfLife/` | ✅ |\n| CSV Importer | `Editor/AssetWorkflow/` | ✅ |\n| Inspector PropertyDrawers | `Editor/MetaTools/` | ✅ |\n| EditorWindowBase | `Editor/MetaTools/` | ✅ |\n| **Cheat Console** | `Core/DevTools/` | ⚠️ Chỉ trong `DEVELOPMENT_BUILD` |\n| **Save Inspector** | `Core/DevTools/` | ⚠️ Chỉ trong `DEVELOPMENT_BUILD` |\n| Inspector Attributes | `Core/Patterns/Attributes/` | ❌ (luôn có, vì PropertyAttribute là base Unity, attributes runtime chỉ ~1KB) |\n", "EXAMPLE_MVP_SINGLETON.md": "# Example: MVP + Reactive & Singleton\n\nHai example thực tế kết hợp patterns trong template. Đọc cùng code trong `Scripts/Gameplay/`.\n\n## Example 1: Settings Panel (MVP + Reactive Property)\n\n📁 `Assets/_Project/Scripts/Gameplay/UI/SettingsPanel/`\n\n### Cấu trúc file\n\n```\nSettingsPanel/\n├── SettingsModel.cs       ← Pure C#, business logic + reactive state\n├── SettingsView.cs        ← MonoBehaviour, UI components only\n├── SettingsPresenter.cs   ← Pure C#, wire Model ↔ View\n└── SettingsPanel.cs       ← UIPanel wrapper, composition root\n```\n\n### Ai làm gì - hiểu chính xác vai trò\n\nNhiều dev mới đọc xong nghĩ rằng \"SettingsPanel = mở/đóng popup, SettingsView = nút bấm gọi Model\". **Sai 2 điểm quan trọng** - đọc kỹ phần này.\n\n| Class | ✅ Đảm nhiệm | ❌ KHÔNG đảm nhiệm |\n|---|---|---|\n| **UIManager** (template có sẵn) | Mở/đóng popup, animation transition, back button Android | Logic của Settings |\n| **SettingsPanel** | **Composition root**: tạo Model + Presenter khi popup hiện, dispose khi destroy | Tự mở chính nó, xử lý click button |\n| **SettingsView** | Hiển thị UI component, fire C# event khi user tương tác | Gọi Model trực tiếp, chứa logic |\n| **SettingsPresenter** | Subscribe View events → gọi Model, subscribe Model reactive → gọi View | Trực tiếp gọi Unity UI API |\n| **SettingsModel** | ReactiveProperty cho data, bridge với service, lo persistence | Biết Unity UI có gì |\n\nSơ đồ ownership trực quan:\n\n```mermaid\nflowchart TB\n    UIM[\"🪟 UIManager<br/>Mở/đóng popup, back button\"]\n    SP[\"📦 SettingsPanel<br/>Composition root<br/>Tạo + Dispose Model, Presenter\"]\n    SV[\"🎨 SettingsView<br/>Slider, Button, Dropdown<br/>Fire C# events\"]\n    SPR[\"🧠 SettingsPresenter<br/>Wire View ↔ Model<br/>Chứa logic UI\"]\n    SM[\"📊 SettingsModel<br/>ReactiveProperty<br/>Bridge với service\"]\n    SVC[\"⚙️ IAudioService, IHaptic...<br/>Auto save PlayerPrefs\"]\n\n    UIM -->|Push/Pop| SP\n    SP -->|OnShow tạo| SPR\n    SP -->|OnShow tạo| SM\n    SV -.subscribe events.-> SPR\n    SPR -.call methods.-> SV\n    SPR -.call methods.-> SM\n    SM -.subscribe reactive.-> SPR\n    SM -->|apply| SVC\n```\n\n### Điểm 1: SettingsPanel KHÔNG đảm nhận mở/đóng\n\n`SettingsPanel` kế thừa `UIPanel`. Việc **mở/đóng** thực ra là **`UIManager` làm**, không phải `SettingsPanel`. `SettingsPanel` chỉ là một panel bị quản lý.\n\n```\nAi muốn mở Settings popup?\n    ↓\nServiceLocator.Get<UIManager>().Push(settingsPanel)\n    ↓\nUIManager gọi settingsPanel.Show()  ← UIPanel base method\n    ↓\nUIPanel.Show() bật GameObject + alpha 1 + gọi OnShow()\n    ↓\nSettingsPanel.OnShow() được override → tạo Model + Presenter\n```\n\n`SettingsPanel` thực ra là **\"composition root\"** - chỉ làm 1 việc: tạo và dispose Model + Presenter đúng lúc. Animation/transition thì base class `UIPanel` lo (fade alpha).\n\n### Điểm 2: View KHÔNG gọi Model trực tiếp\n\nView **fire event** rồi Presenter **nghe event** rồi mới gọi Model:\n\n```\nUser bấm nút Mute Music\n    ↓\nSettingsView nhận sự kiện Button.onClick\n    ↓\nSettingsView fire C# event: OnMusicMuteClicked?.Invoke()\n    ↓\nSettingsPresenter subscribe event này (trong OnInit)\n    ↓\nPresenter gọi Model.ToggleMusicMute()\n    ↓\nModel gọi AudioService.ToggleMusic()\n    ↓\nModel cập nhật ReactiveProperty.Value\n    ↓\nPresenter đã subscribe ReactiveProperty\n    ↓\nPresenter gọi View.SetMusicMuteIcon(true) → icon đổi 🔊→🔇\n```\n\nĐây là **2-way binding qua events**: View không bao giờ trực tiếp gọi Model, mà phải qua Presenter.\n\n### Setup prefab trong Unity Editor\n\n#### Bước 1: Tạo prefab SettingsPopup\n\n```\nHierarchy → Right-click → UI → Panel (hoặc Empty + Image)\n    Đặt tên: \"SettingsPopup\"\n\nSettingsPopup (root GameObject)\n├── Add Component: SettingsView    ← Script\n├── Add Component: SettingsPanel   ← Script\n├── Add Component: CanvasGroup     ← UIPanel base cần\n│\n├── Background (Image)\n├── Title (Text - \"Settings\")\n├── MusicSection\n│   ├── Label\n│   ├── Slider (Music Volume)\n│   ├── MuteButton (Button)\n│   │   └── Icon (Image)\n├── SfxSection\n│   ├── Label\n│   ├── Slider\n│   ├── MuteButton\n│   │   └── Icon\n├── HapticSection\n│   ├── Label\n│   ├── Toggle\n├── LanguageSection\n│   ├── Label\n│   ├── Dropdown\n└── CloseButton\n```\n\n#### Bước 2: Gán reference trong Inspector\n\n**Trên `SettingsView` component:**\n- Music Volume Slider: kéo `MusicSection/Slider`\n- Music Mute Button: kéo `MusicSection/MuteButton`\n- Music Mute Icon: kéo `MusicSection/MuteButton/Icon`\n- Sfx Volume Slider, Sfx Mute Button, Sfx Mute Icon: tương tự\n- Haptic Toggle: kéo `HapticSection/Toggle`\n- Language Dropdown: kéo `LanguageSection/Dropdown`\n- Test Sfx Clip: kéo 1 audio clip ngắn (vd tick sound) - sẽ phát khi user kéo slider SFX\n- Icon Sound On / Icon Sound Off: kéo 2 sprite 🔊 và 🔇\n\n**Trên `SettingsPanel` component:**\n- View: kéo chính GameObject root (vì `SettingsView` nằm trên cùng GameObject)\n\n#### Bước 3: Save thành prefab\n\nKéo `SettingsPopup` từ Hierarchy vào folder `Assets/_Project/Prefabs/UI/`.\n\n#### Bước 4: Mở popup từ Main Menu\n\n```csharp\npublic class MainMenuController : MonoBehaviour\n{\n    [SerializeField] private SettingsPanel _settingsPanelPrefab;\n    private SettingsPanel _settingsInstance;\n\n    public void OnSettingsButtonClicked()\n    {\n        // Lazy instantiate - không tạo khi mới load Main Menu\n        if (_settingsInstance == null)\n        {\n            _settingsInstance = Instantiate(_settingsPanelPrefab, transform);\n        }\n\n        ServiceLocator.Get<UIManager>().Push(_settingsInstance);\n    }\n}\n```\n\nWire `OnSettingsButtonClicked` vào nút Settings của Main Menu qua `OnClick()` trong Inspector.\n\n### Vì sao 4 file thay vì 1?\n\nNếu viết tất cả trong 1 MonoBehaviour, file sẽ ~400 dòng làm:\n- Read AudioService volume → set Slider value\n- Slider OnValueChanged → set AudioService volume\n- Read HapticService.IsEnabled → set Toggle\n- Toggle OnValueChanged → set HapticService\n- Dropdown populate language list\n- Khi đổi ngôn ngữ, gọi 5 method UpdateLabel\n- ... (40+ thứ tương tự)\n\nVấn đề:\n- ❌ Không test được logic (vì stuck với Unity Editor)\n- ❌ Đổi UI = sửa logic\n- ❌ Mỗi field thêm = sửa 4 chỗ\n- ❌ Loop dễ xảy ra: UI → Service → callback → UI lại set → infinite loop\n\n### Tách MVP giải quyết thế nào\n\n**Model** (pure C#):\n- Inject service qua constructor\n- Mỗi setting là `ReactiveProperty<T>` - notify khi đổi\n- API rõ ràng: `SetMusicVolume()`, `ToggleSfxMute()`\n- Có thể unit test bằng NUnit (mock IAudioService)\n\n**View** (MonoBehaviour):\n- Chỉ chứa `[SerializeField] Slider _slider; Button _button;`\n- Method công khai: `SetMusicVolume(float)`, `SetMusicMuteIcon(bool)`\n- Fire C# event khi user tương tác\n- **Không biết** Model tồn tại\n\n**Presenter** (pure C#):\n- Constructor nhận `(view, model)`\n- `OnInit()`: subscribe View events + Model reactive\n- `OnDispose()`: unsubscribe hết\n- Logic: \"View OnSliderChanged → Model.SetVolume → Reactive notify → View.SetSlider\"\n\n**SettingsPanel** (MonoBehaviour, kế thừa UIPanel):\n- Tạo Model + Presenter khi panel hiện ra\n- Dispose khi destroy\n- Tích hợp với UIManager.Push/Pop có sẵn của template\n\n### Flow chuẩn (đọc kỹ phần này)\n\n```\nUser kéo slider Music Volume\n    ↓\nSettingsView.onValueChanged event fire\n    ↓\nSettingsView.OnMusicVolumeChanged?.Invoke(0.5f)\n    ↓\nSettingsPresenter.OnMusicVolumeChanged(0.5f) ← subscribe View event\n    ↓\nModel.SetMusicVolume(0.5f)\n    ↓\n1. _audio.MusicVolume = 0.5f          ← AudioManager save PlayerPrefs\n2. MusicVolume.Value = 0.5f           ← ReactiveProperty notify\n    ↓\nMọi subscriber của MusicVolume nhận callback\n    ↓\nView.SetMusicVolume(0.5f) ← Presenter đã subscribe SubscribeWithInit\n    ↓\nslider.SetValueWithoutNotify(0.5f)  ← KHÔNG fire onValueChanged lại\n```\n\n**Điểm tinh tế:** dùng `SetValueWithoutNotify` ở View để **chặn loop**. Nếu dùng `slider.value = 0.5f` thì `onValueChanged` fire lại → vô hạn.\n\n### Test SettingsModel không cần Unity Editor\n\nVì Model là pure C#, viết test NUnit bình thường:\n\n```csharp\n[Test]\npublic void SetMusicVolume_UpdatesAudioServiceAndNotifiesSubscribers()\n{\n    // Arrange: mock IAudioService\n    var mockAudio = new MockAudioService { MusicVolume = 1f };\n    var model = new SettingsModel(mockAudio, ..., ...);\n    \n    int notifyCount = 0;\n    model.MusicVolume.Subscribe(_ => notifyCount++);\n    \n    // Act\n    model.SetMusicVolume(0.5f);\n    \n    // Assert\n    Assert.AreEqual(0.5f, mockAudio.MusicVolume);\n    Assert.AreEqual(0.5f, model.MusicVolume.Value);\n    Assert.AreEqual(1, notifyCount);\n}\n```\n\nTest này chạy trong ~10ms, không cần Unity Editor. Logic UI test riêng - đảm bảo chất lượng.\n\n### Tại sao Model có `SyncFromAudioService()` ?\n\nTình huống: user chỉnh volume **không qua SettingsPanel** (vd: từ Cheat Console gõ lệnh `audio_volume 0.3`). Service đổi nhưng UI không biết → lệch.\n\n`AudioService.OnAudioSettingsChanged` event fire → Model.SyncFromAudioService → reactive notify → View update → UI sync với service. **Không bao giờ lệch.**\n\n### Khi nào KHÔNG cần MVP\n\nUI đơn giản 1-2 field hiển thị → overkill. Vd HUD chỉ hiện Score:\n\n```csharp\n// Không cần MVP - dùng MonoBehaviour + Reactive thôi\npublic class ScoreHud : MonoBehaviour\n{\n    [SerializeField] private Text _text;\n    \n    void OnEnable() => GameStateManager.Instance.Score.SubscribeWithInit(v => _text.text = $\"Score: {v}\");\n    void OnDisable() => GameStateManager.Instance?.Score.Unsubscribe(...);\n}\n```\n\n**Quy tắc:** UI có > 3 widget tương tác phức tạp với data → dùng MVP. Đơn giản hơn → MonoBehaviour + Reactive đủ.\n\n---\n\n## Example 2: GameStateManager (Singleton)\n\n📁 `Assets/_Project/Scripts/Gameplay/Core/`\n\n### Tại sao Singleton, không phải ServiceLocator?\n\nTemplate recommend **ServiceLocator > Singleton** cho hầu hết case. Vậy khi nào Singleton?\n\n**4 dấu hiệu nên dùng Singleton:**\n\n1. **Truy cập từ static context**: cheat command, editor menu, attribute callback. ServiceLocator cũng được nhưng `GameStateManager.Instance` ngắn hơn.\n\n2. **Không cần swap implementation**: GameStateManager không có interface, không ai inject mock. Lifecycle gắn chặt với Unity.\n\n3. **Là \"in-house\" service**: chỉ logic game này dùng, không phải framework. Khi làm game mới, GameStateManager sẽ viết lại khác hoàn toàn.\n\n4. **Lifecycle phụ thuộc Unity**: cần `Update()`, `OnApplicationPause()`, `Awake()` - không thể là pure C# class.\n\n### Code GameStateManager có gì\n\n**Setup trong Unity:** không cần kéo prefab gì. `MonoSingleton<T>.Instance` tự tạo GameObject `[Singleton] GameStateManager` khi gọi lần đầu. Nếu muốn control thứ tự init, tạo prefab và đặt sẵn trong Bootstrap scene.\n\n```csharp\npublic class GameStateManager : MonoSingleton<GameStateManager>\n{\n    public ReactiveProperty<int> Score { get; }       // UI subscribe\n    public ReactiveProperty<int> Combo { get; }\n    public ReactiveProperty<float> SessionTime { get; }\n    public ReactiveProperty<bool> IsPaused { get; }\n    public ReactiveProperty<GameState> CurrentState { get; }\n    \n    public bool IsGodMode { get; set; }\n    \n    public void StartNewSession() { ... }\n    public void EndSession(bool isWin) { ... }\n    public void SetPaused(bool paused) { ... }\n    public void AddScore(int amount) { ... }\n}\n```\n\nĐây vẫn là **Singleton + Reactive** - 2 pattern kết hợp tự nhiên. Singleton lo \"single instance + truy cập dễ\", Reactive lo \"notify subscribers\".\n\n### Cách dùng từ 3 nơi khác nhau\n\n**1. Từ gameplay code (Player controller):**\n```csharp\npublic class CoinPickup : MonoBehaviour\n{\n    void OnTriggerEnter(Collider other)\n    {\n        GameStateManager.Instance.AddScore(10);\n        Destroy(gameObject);\n    }\n}\n```\n\n**2. Từ UI HUD (subscribe reactive):**\n```csharp\npublic class GameplayHud : MonoBehaviour\n{\n    void OnEnable()\n    {\n        GameStateManager.Instance.Score.SubscribeWithInit(s => _scoreText.text = s.ToString());\n    }\n}\n```\n\n**3. Từ Cheat Console (static method):**\n```csharp\npublic static class GameplayCheats\n{\n    [CheatCommand(\"add_score\", \"add_score <amount>\")]\n    static void AddScore(string[] args)\n    {\n        GameStateManager.Instance.AddScore(int.Parse(args[0]));\n    }\n}\n```\n\n**Đây là chỗ Singleton thắng ServiceLocator:** từ static method, viết `GameStateManager.Instance` ngắn hơn `ServiceLocator.Get<IGameStateManager>()`. Cheat console có 20-30 command - chênh lệch code này tích lại đáng kể.\n\n### Quy tắc dùng Singleton không bị spaghetti\n\n**1. Không hơn 3 Singleton trong project.** Mỗi cái thêm = 1 điểm coupling. Project mình tóm:\n- `GameStateManager` - session state\n- `Player.Instance` (nếu có) - player local\n- Hết.\n\n**2. Không inject Singleton vào constructor.** Class nhận Singleton qua constructor = lừa người đọc. Constructor chỉ nên nhận interface (ServiceLocator).\n\n**3. Static state PHẢI reset khi reload game.** MonoSingleton trong template handle sẵn (`OnDestroy` clear instance). Đừng để state cũ dính qua session mới.\n\n**4. Test Singleton bằng test scene riêng.** Không unit test được - chấp nhận. Bù lại: integration test hoặc PlayMode test trong Unity.\n\n### Cảnh báo anti-pattern thường gặp\n\n❌ **Singleton hell** - mọi class đều là Singleton:\n```csharp\nPlayerManager.Instance.SetPosition(...)\nAudioManager.Instance.PlaySfx(...)\nScoreManager.Instance.Add(...)\nParticleManager.Instance.Spawn(...)\nNetworkManager.Instance.Send(...)\n// → mọi thứ couple với mọi thứ. Test khó. Refactor khó.\n```\n\n✅ **Service Locator cho framework, Singleton cho game state:**\n```csharp\n// Framework - swap được, mock được\nServiceLocator.Get<IAudioService>().PlaySfx(...);\n\n// Game state - truy cập tiện\nGameStateManager.Instance.AddScore(...);\n```\n\n---\n\n## Kết hợp 2 pattern: ai biết ai?\n\n```mermaid\nflowchart LR\n    subgraph singleton[Singleton]\n        GSM[GameStateManager.Instance]\n    end\n    \n    subgraph mvp[Settings MVP]\n        Model[SettingsModel]\n        Presenter[SettingsPresenter]\n        View[SettingsView]\n    end\n    \n    subgraph services[Services - ServiceLocator]\n        Audio[IAudioService]\n        Haptic[IHapticService]\n        Loc[ILocalizationService]\n    end\n    \n    Model -->|inject ctor| services\n    Presenter -.subscribe.-> Model\n    Presenter -.call methods.-> View\n    View -.events.-> Presenter\n    \n    GSM -.dùng từ Player, UI, Cheats.-> services\n    \n    style singleton fill:#fef3c7,stroke:#f59e0b\n    style mvp fill:#dbeafe,stroke:#3b82f6\n    style services fill:#dcfce7,stroke:#22c55e\n```\n\n**Layering rõ:**\n- Services (ServiceLocator) là **lớp dưới cùng** - không biết ai dùng mình\n- Singleton (GameStateManager) là **lớp giữa** - dùng services, được UI dùng\n- MVP (Settings) là **lớp trên cùng** - dùng services qua Model, UI tương tác qua View\n\nKhông có vòng tròn dependency. Code mới scale lên dễ.\n\n---\n\n## Test thử trên Editor\n\n1. Vào Bootstrap → load Gameplay scene\n2. Mở Cheat Console (Tab) → gõ `god_mode` → bật\n3. Gõ `add_score 100` → HUD hiện \"Score: 1000\" (god_mode x10)\n4. Gõ `session_info` → in ra state đầy đủ\n5. Mở Settings Panel → kéo slider Music → AudioMixer giảm volume realtime\n6. Đóng panel → mở lại → slider nhớ giá trị (PlayerPrefs persist)\n7. Đổi ngôn ngữ → mọi label trong panel refresh\n\n## Khi nào team mới copy pattern này\n\n| Bài toán | Copy example nào |\n|---|---|\n| Settings, Profile, Inventory chi tiết | **MVP + Reactive** (Example 1) |\n| HUD đơn giản (score, hp, time) | **Singleton + Reactive trực tiếp** (Example 2) |\n| Shop, Quest log, Character sheet | **MVP + Reactive** |\n| Achievement progress | **Reactive + MonoBehaviour** đủ |\n| Cheat commands gameplay | **Singleton + static class** |\n| Network/Multiplayer state | **ServiceLocator** (cần swap mock/real) |\n| Save/Load | **ServiceLocator** (đã có ISaveService) |\n", "MOBILE_INTEGRATION.md": "# Mobile Services Integration Guide\n\nTemplate cung cấp **7 mobile services** với pattern \"interface + Mock + skeleton SDK\". Code gameplay viết được ngay, SDK gắn sau khi gần ship.\n\n## Triết lý: Code trước, SDK sau\n\nVấn đề kinh điển khi làm mobile game:\n1. Team đang code gameplay, designer chưa quyết AdMob hay AppLovin\n2. Import SDK quá sớm → bloat build, compile chậm, dev không có account test\n3. Code rải `if (UnityAds != null)` khắp nơi → khó maintain\n\nGiải pháp của template:\n\n```\nCode gameplay  -->  IAdsService (interface)\n                         |\n                         ├── MockAdsService (mặc định, không cần SDK)\n                         ├── UnityAdsService (compile khi ADS_UNITY define)\n                         ├── AdMobAdsService (compile khi ADS_ADMOB define)\n                         └── AppLovinAdsService (compile khi ADS_APPLOVIN define)\n```\n\n**Quy tắc:** Không có define nào → MockAdsService chạy → game vẫn build và play được. SDK bỏ qua hoàn toàn.\n\n## Các service có sẵn\n\n| Service | Interface | Mock | SDK skeleton | Define symbol |\n|---|---|---|---|---|\n| Ads | `IAdsService` | ✅ | Unity Ads, AdMob, AppLovin | `ADS_UNITY` / `ADS_ADMOB` / `ADS_APPLOVIN` |\n| IAP | `IIapService` | ✅ | Unity IAP, Google Play Billing | `IAP_UNITY` / `IAP_GOOGLE_PLAY` |\n| Analytics | `IAnalyticsService` | ✅ | Firebase | `ANALYTICS_FIREBASE` |\n| Remote Config | `IRemoteConfigService` | ✅ | Firebase | `REMOTE_CONFIG_FIREBASE` |\n| Localization | `ILocalizationService` | n/a (sync, đọc SO) | n/a | n/a |\n| Haptic | `IHapticService` | ✅ (log) | Native iOS/Android | n/a (auto detect platform) |\n| Device Info | `IDeviceInfoService` | n/a | n/a | n/a |\n\n## Cách dùng từ gameplay code\n\n```csharp\nusing GameTemplate.Core.DI;\nusing GameTemplate.Core.Mobile.Ads;\nusing GameTemplate.Core.Mobile.Analytics;\nusing GameTemplate.Core.Mobile.Haptic;\n\npublic class GameOverScreen : MonoBehaviour\n{\n    public async void OnReviveButtonClicked()\n    {\n        var ads = ServiceLocator.Get<IAdsService>();\n        var haptic = ServiceLocator.Get<IHapticService>();\n        var analytics = ServiceLocator.Get<IAnalyticsService>();\n\n        haptic.Play(HapticType.Selection);\n\n        if (!ads.IsRewardedReady())\n        {\n            analytics.TrackEvent(\"revive_no_ad\");\n            return;\n        }\n\n        var result = await ads.ShowRewardedAsync(\"revive\");\n        if (result == AdResult.Success)\n        {\n            analytics.TrackEvent(\"revive_success\");\n            ReviveLevel();\n        }\n    }\n}\n```\n\nCode này hoạt động:\n- ✅ Trên Editor (MockAdsService log + return success)\n- ✅ Trên build chưa import SDK (MockAdsService)\n- ✅ Sau khi import Unity Ads SDK + define `ADS_UNITY` (UnityAdsService)\n- ✅ Sau khi đổi sang AdMob (AdMobAdsService)\n\n## Workflow tích hợp SDK thật (khi gần ship)\n\n### Bước 1: Quyết định mediation/provider\n\nĐến lúc gần ship hoặc khi có ad account, team họp quyết:\n- Ads: AppLovin MAX (eCPM cao) hay AdMob (mainstream)\n- IAP: Unity IAP (đa platform sẵn) hay native\n- Analytics: Firebase (free, tốt) hay GameAnalytics\n\n### Bước 2: Import SDK qua Package Manager\n\n```\n# Unity Ads (đã có sẵn nếu dùng Unity 2020+)\nWindow > Package Manager > Unity Registry > Advertisement Legacy\n\n# Google AdMob\nTải google-mobile-ads-x.x.x.unitypackage từ developers.google.com/admob/unity\nImport vào project\n\n# AppLovin MAX\nTải MaxSdk.unitypackage từ dash.applovin.com\nImport vào project\n\n# Firebase\nTải firebase_unity_sdk_x.x.x.zip\nImport FirebaseAnalytics.unitypackage + FirebaseRemoteConfig.unitypackage\n\n# Unity IAP\nWindow > Package Manager > In App Purchasing\n```\n\n### Bước 3: Define symbol\n\n`Edit > Project Settings > Player > Scripting Define Symbols`:\n\n```\nENABLE_GAME_LOG;ADS_APPLOVIN;IAP_UNITY;ANALYTICS_FIREBASE;REMOTE_CONFIG_FIREBASE\n```\n\n(Cách nhau bằng dấu `;`, không có space)\n\n### Bước 4: Fill code trong skeleton\n\nMở file `RealAdsServices.cs`, tìm class tương ứng (vd `AppLovinAdsService`), uncomment các TODO comment, fill implementation theo doc SDK.\n\nTrong template skeleton đã có:\n- Lifecycle method stubs\n- Comment hướng dẫn API gọi gì\n- Link doc SDK trong comment\n\n### Bước 5: Test\n\n1. Build dev với `ENABLE_GAME_LOG` define\n2. Cài lên device thật\n3. Xem log để verify:\n   - `[Bootstrap] Mobile services ready.`\n   - `[Ads] [AppLovin] Initialized.`\n   - `[IAP] Initialized với N sản phẩm.`\n4. Test từng path: show ad, buy product, change language\n\n## Bật tắt Ads runtime\n\nUser mua \"Remove Ads\" hoặc dev muốn tắt:\n\n```csharp\nvar ads = ServiceLocator.Get<IAdsService>();\n\nads.AdsEnabled = false;          // tắt toàn bộ\nads.BannerEnabled = false;       // chỉ tắt banner, giữ interstitial + rewarded\nads.InterstitialEnabled = false; // tắt interstitial\n// Rewarded vẫn nên giữ vì user chủ động xem để nhận thưởng\n```\n\nState này KHÔNG tự persist - bạn lưu vào Save service:\n\n```csharp\npublic class PlayerData : SaveDataBase\n{\n    public bool RemoveAdsPurchased;\n}\n\n// Khi load save:\nads.AdsEnabled = !playerData.RemoveAdsPurchased;\n```\n\n## Switch mediation runtime qua Remote Config\n\nTrong `MobileServicesBootstrapper`, set `_useRemoteConfigForAds = true`. Sau đó:\n\n1. Firebase Console → Remote Config\n2. Tạo param `ads_mediation` với value `\"AppLovin\"` hoặc `\"AdMob\"`\n3. A/B test: 50% user dùng AppLovin, 50% AdMob để so eCPM\n4. Tăng % cho mediation thắng\n\nLưu ý: Cần build có cả 2 SDK + cả 2 define symbol để switch được. Chỉ chọn approach này khi đã có 2 mediation account.\n\n## Localization workflow\n\n1. Create `LocalizationTable` ScriptableObject: `Assets > Create > GameTemplate > Localization > Localization Table`\n2. Add entries:\n   - Key: `ui.play`\n     - Vietnamese: \"Chơi\"\n     - English: \"Play\"\n3. Gán vào `MobileServicesBootstrapper._localizationTable`\n4. Trong code:\n   ```csharp\n   var loc = ServiceLocator.Get<ILocalizationService>();\n   playButton.text = loc.Get(\"ui.play\");\n   ```\n5. Đổi ngôn ngữ:\n   ```csharp\n   loc.SetLanguage(GameLanguage.English);\n   // OnLanguageChanged event fire -> UI refresh\n   ```\n\nTip: Viết component `LocalizedText : MonoBehaviour` subscribe `OnLanguageChanged` để mọi text tự refresh khi đổi ngôn ngữ.\n\n## Adaptive Quality\n\nTrong Bootstrap đã tự gọi `device.ApplyTierSettings()`. Game tự set quality theo tier.\n\nUser có thể override trong Settings menu:\n\n```csharp\nQualitySettings.SetQualityLevel(2); // High\nApplication.targetFrameRate = 60;\n```\n\nLưu setting vào PlayerPrefs để giữ qua session.\n\n## Analytics - Adapter pattern giải thích\n\nKhi tích hợp Firebase Analytics, có thể bạn sẽ thấy code SDK Firebase dùng `Parameter[]`:\n\n```csharp\n// Firebase Analytics API thực tế\nFirebaseAnalytics.LogEvent(\"level_complete\", new Parameter[] {\n    new Parameter(\"level\", 5),\n    new Parameter(\"duration\", 120f)\n});\n```\n\n**Nhưng `IAnalyticsService` của template dùng `Dictionary<string, object>`:**\n\n```csharp\nvoid TrackEvent(string eventName, Dictionary<string, object> parameters);\n```\n\n### Vì sao Dictionary thay vì Parameter[]?\n\n**Lý do 1: Abstract khỏi vendor.** `Parameter` là class của Firebase SDK (`Firebase.Analytics.Parameter`). Nếu interface dùng nó:\n- Mọi file gameplay phải `using Firebase.Analytics` mới gọi được\n- Không build được khi chưa import Firebase SDK → `MockAnalyticsService` không chạy trên Editor\n- Stuck với Firebase, không swap được sang GameAnalytics/AppsFlyer\n\n**Lý do 2: Multi-provider support.** Template hiện tại có `AnalyticsService` (composite) - gửi event tới nhiều provider cùng lúc:\n\n```csharp\nanalytics.RegisterProvider(new FirebaseAnalyticsProvider());\nanalytics.RegisterProvider(new GameAnalyticsProvider());\nanalytics.RegisterProvider(new AppsFlyerProvider());\n\nanalytics.TrackEvent(\"level_complete\", new Dictionary<string, object>\n{\n    [\"level\"] = 5,\n    [\"duration\"] = 120f\n});\n// → cả 3 provider đều nhận, mỗi provider tự convert sang SDK riêng\n```\n\nNếu interface dùng `Parameter[]`, GameAnalytics phải convert ngược về Dictionary để xử lý → kỳ cục.\n\n**Lý do 3: Dễ dùng từ gameplay code.** Dictionary có C# inline syntax gọn:\n\n```csharp\n// Gọn, không cần using Firebase\nanalytics.TrackEvent(\"ad_shown\", new Dictionary<string, object>\n{\n    [\"placement\"] = \"level_complete\",\n    [\"ad_type\"] = \"interstitial\"\n});\n```\n\n### Đây là Adapter pattern\n\nTemplate define interface theo \"ngôn ngữ chung\" (Dictionary), mỗi provider **adapter** convert sang SDK riêng:\n\n```\nGameplay code (vendor-agnostic)\n       │\n       │ TrackEvent(\"level\", Dictionary)\n       ▼\nIAnalyticsService  ← \"ngôn ngữ chung\" Dictionary\n       │\n       ├──► FirebaseAdapter    → convert → FirebaseAnalytics.LogEvent(Parameter[])\n       ├──► GameAnalyticsAdapter → convert → GameAnalytics.NewDesignEvent(...)\n       └──► AppsFlyerAdapter   → convert → AppsFlyer.SendEvent(Dictionary)\n```\n\n### Code mẫu: FirebaseAnalyticsProvider\n\nKhi tích hợp Firebase thật, tạo file `FirebaseAnalyticsProvider.cs` trong `Assets/_Project/Scripts/Core/Mobile/Analytics/`:\n\n```csharp\n#if ANALYTICS_FIREBASE\nusing System.Collections.Generic;\nusing System.Threading.Tasks;\nusing Firebase;\nusing Firebase.Analytics;\nusing UnityEngine;\nusing GameTemplate.Core.Logger;\n\nnamespace GameTemplate.Core.Mobile.Analytics\n{\n    /// <summary>\n    /// Firebase Analytics adapter - convert Dictionary<string, object> → Parameter[].\n    /// Đăng ký vào AnalyticsService composite, không gọi trực tiếp.\n    /// </summary>\n    public class FirebaseAnalyticsProvider : IAnalyticsProvider\n    {\n        public string Name => \"Firebase\";\n        public bool IsInitialized { get; private set; }\n\n        public async Task<bool> InitializeAsync()\n        {\n            var status = await FirebaseApp.CheckAndFixDependenciesAsync();\n            if (status != DependencyStatus.Available)\n            {\n                GameLog.Error(LogCategory.Analytics,\n                    $\"[Firebase] Dependencies không OK: {status}\");\n                return false;\n            }\n\n            FirebaseAnalytics.SetAnalyticsCollectionEnabled(true);\n            IsInitialized = true;\n            GameLog.Info(LogCategory.Analytics, \"[Firebase] Analytics ready.\");\n            return true;\n        }\n\n        public void SetUserId(string userId)\n            => FirebaseAnalytics.SetUserId(userId);\n\n        public void SetUserProperty(string key, string value)\n            => FirebaseAnalytics.SetUserProperty(key, value);\n\n        public void TrackEvent(string eventName)\n            => FirebaseAnalytics.LogEvent(eventName);\n\n        public void TrackEvent(string eventName, Dictionary<string, object> parameters)\n        {\n            if (parameters == null || parameters.Count == 0)\n            {\n                FirebaseAnalytics.LogEvent(eventName);\n                return;\n            }\n\n            // ⭐ CHỖ MAGIC: Dictionary → Parameter[]\n            var parameterArray = new Parameter[parameters.Count];\n            int i = 0;\n            foreach (var kv in parameters)\n            {\n                parameterArray[i++] = ToFirebaseParameter(kv.Key, kv.Value);\n            }\n            FirebaseAnalytics.LogEvent(eventName, parameterArray);\n        }\n\n        /// <summary>\n        /// Convert object value → Firebase Parameter.\n        /// Firebase chỉ accept: string, long, double. Các type khác phải convert.\n        /// </summary>\n        private static Parameter ToFirebaseParameter(string key, object value)\n        {\n            return value switch\n            {\n                string s => new Parameter(key, s),\n                int i    => new Parameter(key, i),\n                long l   => new Parameter(key, l),\n                float f  => new Parameter(key, f),\n                double d => new Parameter(key, d),\n                bool b   => new Parameter(key, b ? 1 : 0),  // Firebase không có bool\n                null     => new Parameter(key, \"\"),\n                _        => new Parameter(key, value.ToString())  // fallback toString\n            };\n        }\n    }\n}\n#endif\n```\n\nĐăng ký vào Bootstrap:\n\n```csharp\n#if ANALYTICS_FIREBASE\nanalyticsService.RegisterProvider(new FirebaseAnalyticsProvider());\n#endif\n```\n\n### Tạo provider khác (GameAnalytics, AppsFlyer)\n\nCùng pattern - implement `IAnalyticsProvider` interface, convert Dictionary sang format SDK đó:\n\n```csharp\n#if ANALYTICS_GAMEANALYTICS\npublic class GameAnalyticsProvider : IAnalyticsProvider\n{\n    public void TrackEvent(string eventName, Dictionary<string, object> parameters)\n    {\n        // GameAnalytics dùng string format \"Category:Type:Item:Action\"\n        // Hoặc dùng custom dimensions\n        if (parameters == null)\n        {\n            GameAnalytics.NewDesignEvent(eventName);\n            return;\n        }\n\n        // GameAnalytics chỉ nhận 1 value số → pick \"value\" key nếu có\n        if (parameters.TryGetValue(\"value\", out var value) && value is float f)\n            GameAnalytics.NewDesignEvent(eventName, f);\n        else\n            GameAnalytics.NewDesignEvent(eventName);\n    }\n    // ... các method khác\n}\n#endif\n```\n\n### Quy tắc khi viết provider mới\n\n1. **Implement `IAnalyticsProvider` interface** - đảm bảo có TrackEvent, SetUserId, InitializeAsync\n2. **Wrap trong `#if ANALYTICS_XXX`** - không define symbol thì class không tồn tại\n3. **Mỗi provider tự convert Dictionary → SDK format** - không leak SDK type ra ngoài\n4. **Handle null/empty parameters** gracefully - không crash khi event không có param\n5. **Log via GameLog** với category `LogCategory.Analytics`\n6. **Đăng ký trong Bootstrap** sau khi composite `AnalyticsService` đã tạo\n\n### Workflow tích hợp Firebase Analytics - 5 bước\n\nKhi muốn switch từ Mock sang Firebase thật, làm theo thứ tự:\n\n#### Bước 1: Cài SDK + config files\n\n- Download Firebase Unity SDK từ [console.firebase.google.com](https://console.firebase.google.com)\n- Import `FirebaseAnalytics.unitypackage` qua Assets → Import Package\n- Đặt `google-services.json` vào `Assets/` (Android)\n- Đặt `GoogleService-Info.plist` vào `Assets/` (iOS)\n\n#### Bước 2: Bật define symbol\n\nMenu **GameTemplate → Define Symbol Manager** → tick `ANALYTICS_FIREBASE`.\n\nSau khi tick, class `FirebaseAnalyticsProvider` (đang nằm trong `#if ANALYTICS_FIREBASE`) mới được compile.\n\n#### Bước 3: Tạo file `FirebaseAnalyticsProvider.cs`\n\nCopy code mẫu ở section trên, lưu vào:\n\n```\nAssets/_Project/Scripts/Core/Mobile/Analytics/FirebaseAnalyticsProvider.cs\n```\n\nFile này:\n- Implement `IAnalyticsProvider` interface (KHÔNG phải `IAnalyticsService`)\n- Wrap trong `#if ANALYTICS_FIREBASE` để không break build khi chưa có SDK\n- Convert `Dictionary<string, object>` → `Parameter[]` của Firebase\n\n#### Bước 4: Đăng ký provider vào Bootstrap\n\nChỗ này **đã viết sẵn** trong `MobileServicesBootstrapper.cs`:\n\n```csharp\n// 5. Analytics\nvar analytics = new AnalyticsService();\nanalytics.RegisterProvider(new MockAnalyticsProvider());\n#if ANALYTICS_FIREBASE\nanalytics.RegisterProvider(new FirebaseAnalyticsProvider());  // ← tự compile khi define on\n#endif\nServiceLocator.Register<IAnalyticsService>(analytics);\n```\n\nKhi tick define ở Bước 2, dòng `RegisterProvider(new FirebaseAnalyticsProvider())` tự được compile và chạy lúc Bootstrap. **Không phải sửa Bootstrap.**\n\n#### Bước 5: Verify trên device\n\n1. Build dev với `ENABLE_GAME_LOG` + `ANALYTICS_FIREBASE` defines\n2. Cài lên device Android/iOS thật (Editor không gửi được)\n3. Mở Firebase Console → Analytics → **DebugView**\n4. Gọi trong code:\n   ```csharp\n   analytics.TrackEvent(\"test_event\", new Dictionary<string, object>\n   {\n       [\"test\"] = \"hello\"\n   });\n   ```\n5. Sự kiện phải xuất hiện trong DebugView trong 1-2 phút\n\n### Bảng \"khi import Firebase phải sửa cái gì\"\n\nĐây là điểm mạnh của Adapter pattern - **chỉ thêm 1 file mới, không sửa file nào hết**:\n\n| Component | Trước Firebase | Sau khi import Firebase | Có sửa? |\n|---|---|---|---|\n| `IAnalyticsService` (interface) | Dictionary API | Dictionary API | ❌ Không |\n| `IAnalyticsProvider` (interface) | TrackEvent + Dictionary | TrackEvent + Dictionary | ❌ Không |\n| `AnalyticsService` (composite) | Loop registered providers | Loop registered providers | ❌ Không |\n| `MockAnalyticsProvider` | Log ra Console | Log ra Console | ❌ Không |\n| Gameplay code (`TrackEvent` calls) | `Dictionary<string, object>` | `Dictionary<string, object>` | ❌ Không |\n| `MobileServicesBootstrapper` | Có `#if ANALYTICS_FIREBASE` sẵn | Define được bật, dòng register tự chạy | ❌ Không (chỉ tick define) |\n| **`FirebaseAnalyticsProvider.cs`** | **Chưa tồn tại** | **Tạo mới + implement IAnalyticsProvider** | ✅ **Tạo mới** |\n\n### Khi nào CẦN sửa interface?\n\nTrong một số trường hợp **buộc phải sửa** `IAnalyticsService` khi cần expose feature mới. Ví dụ:\n\n**Firebase có `SetSessionTimeoutDuration(TimeSpan)`** - chỉnh thời gian timeout session. Nếu gameplay code cần gọi, phải:\n\n**1. Thêm method vào interface:**\n```csharp\npublic interface IAnalyticsService\n{\n    // ... methods cũ\n    void SetSessionTimeout(System.TimeSpan duration);  // ← thêm\n}\n```\n\n**2. Implement trong `AnalyticsService` composite (forward tới mọi provider):**\n```csharp\npublic void SetSessionTimeout(TimeSpan duration)\n{\n    foreach (var p in _providers) p.SetSessionTimeout(duration);\n}\n```\n\n**3. Mỗi provider implement (kể cả Mock):**\n```csharp\n// FirebaseProvider\npublic void SetSessionTimeout(TimeSpan duration)\n    => FirebaseAnalytics.SetSessionTimeoutDuration(duration);\n\n// MockProvider\npublic void SetSessionTimeout(TimeSpan duration) { /* no-op */ }\n\n// GameAnalyticsProvider - nếu SDK không support feature này\npublic void SetSessionTimeout(TimeSpan duration) { /* no-op, log warning */ }\n```\n\n**Quy tắc:** chỉ thêm vào interface những thứ là **khái niệm chung** (có ý nghĩa với mọi analytics provider). Tránh thêm feature riêng của 1 SDK:\n\n| Feature | Có thêm vào interface không? | Lý do |\n|---|---|---|\n| `SetUserId`, `TrackEvent`, `SetUserProperty` | ✅ Có | Khái niệm chung mọi analytics platform |\n| `SetSessionTimeout` | ✅ Có | Hầu hết platform có khái niệm session |\n| `SetAnalyticsCollectionEnabled` (Firebase only) | ⚠️ Cân nhắc | Một số provider không có khái niệm này |\n| `LogECommercePurchaseWithParameters` (Firebase only) | ❌ Không | Quá specific - dùng `TrackPurchase` của template |\n| `SetDefaultEventParameters` (Firebase only) | ❌ Không | Feature mới chỉ Firebase có |\n\nKhi cần feature **chỉ Firebase có**, expose qua property `Provider` của FirebaseAnalyticsProvider rồi cast - đừng làm bẩn interface chung:\n\n```csharp\n// Cách đúng: cast provider khi cần feature đặc thù\nif (analytics is AnalyticsService composite)\n{\n    var firebase = composite.GetProvider<FirebaseAnalyticsProvider>();\n    firebase?.SetAnalyticsCollectionEnabled(false);  // Firebase-only API\n}\n```\n\n\n\n- [ ] Mọi service đã có SDK thật (không còn Mock trên prod build)\n- [ ] Define symbol đúng cho mỗi platform\n- [ ] Firebase config file đặt đúng chỗ:\n  - Android: `Assets/google-services.json`\n  - iOS: `Assets/GoogleService-Info.plist`\n- [ ] AdMob App ID đã set trong Androi
