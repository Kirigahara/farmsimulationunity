<title>Unity Game Template - Documentation</title>

<!-- Load 100% local từ vendors/ (không cần internet) -->

<style>
  /* Dark theme - GitHub Dark style */
  :root {
    --bg: #0d1117;
    --bg-side: #161b22;
    --bg-code: #161b22;
    --bg-toolbar: #010409;
    --text: #e6edf3;
    --text-mute: #7d8590;
    --border: #30363d;
    --link: #2f81f7;
    --accent: #2f81f7;
    --table-row: #161b22;
    --search-highlight: #ffd33d;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    display: flex;
    min-height: 100vh;
  }

  /* ===== Sidebar ===== */
  #sidebar {
    width: 260px;
    background: var(--bg-side);
    border-right: 1px solid var(--border);
    padding: 16px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    flex-shrink: 0;
  }
  #sidebar h1 {
    font-size: 16px;
    margin: 0 0 4px;
    color: var(--text);
  }
  #sidebar .subtitle {
    font-size: 12px;
    color: var(--text-mute);
    margin-bottom: 16px;
  }
  #sidebar ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  #sidebar li {
    margin: 2px 0;
  }
  #sidebar a {
    display: block;
    padding: 6px 10px;
    border-radius: 6px;
    color: var(--text);
    text-decoration: none;
    font-size: 14px;
    cursor: pointer;
  }
  #sidebar a:hover {
    background: rgba(255, 255, 255, 0.05);
  }
  #sidebar a.active {
    background: var(--accent);
    color: white;
    font-weight: 500;
  }
  #sidebar .group-label {
    font-size: 11px;
    color: var(--text-mute);
    text-transform: uppercase;
    font-weight: 600;
    margin: 16px 0 4px 10px;
    letter-spacing: 0.5px;
  }

  /* ===== Main content ===== */
  main {
    flex: 1;
    max-width: 980px;
    padding: 32px 48px;
    overflow-x: auto;
  }
  #content {
    min-height: 80vh;
  }

  /* GitHub-style markdown */
  #content h1, #content h2, #content h3, #content h4 {
    margin-top: 24px;
    margin-bottom: 16px;
    font-weight: 600;
    line-height: 1.25;
    /* Offset cho toolbar sticky - khi nhảy tới heading, không bị che */
    scroll-margin-top: 80px;
  }
  #content h1 {
    font-size: 2em;
    padding-bottom: 0.3em;
    border-bottom: 1px solid var(--border);
  }
  #content h2 {
    font-size: 1.5em;
    padding-bottom: 0.3em;
    border-bottom: 1px solid var(--border);
  }
  #content h3 { font-size: 1.25em; }
  #content h4 { font-size: 1em; }

  #content p { margin: 12px 0; }
  #content a { color: var(--link); text-decoration: none; }
  #content a:hover { text-decoration: underline; }

  #content code {
    background: var(--bg-code);
    padding: 0.2em 0.4em;
    border-radius: 6px;
    font-size: 85%;
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
  }
  #content pre {
    background: var(--bg-code);
    padding: 16px;
    border-radius: 6px;
    overflow-x: auto;
    line-height: 1.45;
    border: 1px solid var(--border);
  }
  #content pre code {
    background: transparent;
    padding: 0;
    font-size: 100%;
  }

  #content blockquote {
    margin: 12px 0;
    padding: 0 1em;
    color: var(--text-mute);
    border-left: 0.25em solid var(--border);
  }

  #content table {
    border-collapse: collapse;
    margin: 16px 0;
    display: block;
    overflow-x: auto;
  }
  #content table th, #content table td {
    border: 1px solid var(--border);
    padding: 6px 13px;
  }
  #content table th {
    background: var(--bg-side);
    font-weight: 600;
  }
  #content table tr:nth-child(2n) {
    background: var(--table-row);
  }

  #content ul, #content ol {
    padding-left: 2em;
    margin: 12px 0;
  }
  #content li { margin: 4px 0; }

  #content hr {
    border: 0;
    height: 1px;
    background: var(--border);
    margin: 24px 0;
  }

  #content img { max-width: 100%; }

  /* Mermaid diagram */
  .mermaid {
    text-align: center;
    margin: 24px 0;
    background: var(--bg-side);
    padding: 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
  }
  /* Mermaid SVG text màu sáng hơn cho dễ đọc trên dark */
  .mermaid svg { max-width: 100%; }
  .mermaid .nodeLabel, .mermaid .edgeLabel, .mermaid text {
    color: var(--text);
  }

  /* ===== Toolbar (top) ===== */
  #toolbar {
    position: sticky;
    top: 0;
    background: var(--bg-toolbar);
    border-bottom: 1px solid var(--border);
    padding: 12px 48px;
    display: flex;
    align-items: center;
    gap: 16px;
    z-index: 100;
    margin: -32px -48px 24px;
  }
  #search {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-side);
    color: var(--text);
    font-size: 14px;
    outline: none;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--text-mute); }

  .search-hit {
    background: var(--search-highlight);
    color: #000;
    padding: 1px 2px;
    border-radius: 2px;
  }

  /* ===== Empty state ===== */
  .empty {
    color: var(--text-mute);
    padding: 60px 40px;
    text-align: center;
  }
  .empty h3 {
    color: var(--text);
    margin-bottom: 12px;
  }

  /* Responsive */
  @media (max-width: 768px) {
    body { flex-direction: column; }
    #sidebar { width: 100%; height: auto; position: relative; }
    main { padding: 16px; }
    #toolbar { padding: 12px 16px; margin: -16px -16px 16px; }
  }

  /* Scrollbar styling for dark */
  ::-webkit-scrollbar { width: 12px; height: 12px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }
  ::-webkit-scrollbar-thumb:hover { background: #484f58; }

    ]},

      { label: "💰 AppLovin MAX Setup", file: "APPLOVIN_SETUP.md" },
      { label: "🔧 Editor Tools", file: "EDITOR_TOOLS.md" },

  // ==================== Markdown content (build script inject vào đây) ====================
  window.__MARKDOWN_CONTENT__ = {"API_REFERENCE.md": "# API Reference\n\nTài liệu chi tiết mọi public class/method trong template. Tham khảo khi cần signature/example cụ thể.\n\n**Quy ước:**\n- 📁 = đường dẫn file source\n- 📦 = namespace\n- ⚠️ = lưu ý quan trọng\n- 💡 = tip dùng\n\n---\n\n## Mục lục\n\n**Core Framework:**\n- [ServiceLocator](#servicelocator) - DI nhẹ\n- [EventBus](#eventbus) - Pub/Sub\n- [GameLog](#gamelog) - Logger có category\n- [ObjectPool](#objectpool) - Pool generic\n- [JsonSaveService](#jsonsaveservice) - Save/load\n- [IDailyResetService](#idailyresetservice) - Check ngày mới, streak\n- [TutorialSequencer](#tutorialsequencer) - Tutorial engine\n- [ITutorialStep](#itutorialstep) - Tutorial step interface\n- [ITutorialOverlay](#itutorialoverlay) - Tutorial UI overlay\n- [AudioManager](#audiomanager) - Audio pool\n- [SceneLoader](#sceneloader) - Async scene load\n- [UIPanel + UIManager](#uipanel--uimanager) - UI stack\n- [SafeAreaFitter](#safeareafitter) - Tránh notch/home indicator\n- [CameraFitter](#camerafitter) - Fit gameplay area trên mọi device aspect\n- [EnhancedButton](#enhancedbutton) - Button + SFX + Analytics + Haptic\n- [HoldButton](#holdbutton) - Nút nhấn giữ\n- [UIButtonSfxLibrary](#uibuttonsfxlibrary) - ScriptableObject map preset SFX\n\n**Patterns:**\n- [ReactiveProperty](#reactiveproperty) - Observable value\n- [ReactiveCollection](#reactivecollection) - Observable list\n- [PrefabFactory](#prefabfactory) - Spawn từ ScriptableObject\n- [MVP base](#mvp-base) - Model/View/Presenter\n- [MonoSingleton](#monosingleton) - Singleton an toàn\n- [AsyncOp + Sequence](#asyncop--sequence) - Async helpers\n\n**Mobile Services:**\n- [IAdsService](#iadsservice) - Ads\n- [IIapService](#iiapservice) - In-app purchase\n- [IAnalyticsService](#ianalyticsservice) - Analytics\n- [IRemoteConfigService](#iremoteconfigservice) - Remote config\n- [ILocalizationService](#ilocalizationservice) - Localization\n- [IHapticService](#ihapticservice) - Haptic\n- [IDeviceInfoService](#ideviceinfoservice) - Device tier\n\n**Dev Tools:**\n- [CheatConsole](#cheatconsole) - Runtime cheat\n- [SaveInspector](#saveinspector) - Save file editor\n- [FpsDisplay](#fpsdisplay) - FPS counter overlay\n\n---\n\n## ServiceLocator\n\n📁 `Assets/_Project/Scripts/Core/DI/ServiceLocator.cs`\n📦 `GameTemplate.Core.DI`\n\nDI nhẹ không phụ thuộc plugin. Dùng để các module tìm thấy service global mà không phải `FindObjectOfType`.\n\n### Methods\n\n| Method | Mô tả |\n|---|---|\n| `Register<T>(T service)` | Đăng ký service. Throw nếu service null. Override nếu type đã tồn tại. |\n| `Get<T>()` | Lấy service. **Throw** nếu chưa register. |\n| `TryGet<T>(out T service)` | An toàn hơn Get. Return false nếu chưa register. |\n| `Unregister<T>()` | Xoá khỏi locator. |\n| `Clear()` | Xoá tất cả. Dùng khi test hoặc shutdown. |\n\n### Example\n\n```csharp\n// Register (chỉ ở Bootstrap)\nServiceLocator.Register<IAudioService>(audioManager);\nServiceLocator.Register<ISaveService>(new JsonSaveService());\n\n// Use (mọi nơi khác)\nvar audio = ServiceLocator.Get<IAudioService>();\naudio.PlaySfx(clip);\n\n// Safe check\nif (ServiceLocator.TryGet<IAdsService>(out var ads))\n{\n    ads.ShowBanner();\n}\n```\n\n⚠️ **Không gọi `Get<T>` trong constructor** - thứ tự init không đảm bảo. Dùng trong `Start()` trở đi.\n\n---\n\n## EventBus\n\n📁 `Assets/_Project/Scripts/Core/Events/EventBus.cs`\n📦 `GameTemplate.Core.Events`\n\nPub/Sub type-safe, zero-alloc (event là struct).\n\n### Methods\n\n| Method | Mô tả |\n|---|---|\n| `Subscribe<T>(Action<T> handler)` | Đăng ký callback nhận event type T. |\n| `Unsubscribe<T>(Action<T> handler)` | Huỷ đăng ký. **BẮT BUỘC** trong OnDisable/OnDestroy. |\n| `Publish<T>(T evt)` | Gọi mọi handler đã subscribe type T. |\n| `Clear<T>()` | Xoá mọi handler của type T (dùng cẩn thận). |\n\n### Example\n\n```csharp\n// 1. Định nghĩa event (phải là struct, kế thừa IGameEvent)\npublic struct PlayerJumpedEvent : IGameEvent\n{\n    public float Power;\n}\n\n// 2. Subscribe\nprivate void OnEnable()\n{\n    EventBus.Subscribe<PlayerJumpedEvent>(OnJump);\n}\n\nprivate void OnDisable()\n{\n    EventBus.Unsubscribe<PlayerJumpedEvent>(OnJump);\n}\n\nprivate void OnJump(PlayerJumpedEvent evt)\n{\n    Debug.Log($\"Player jumped with power: {evt.Power}\");\n}\n\n// 3. Publish (từ chỗ khác)\nEventBus.Publish(new PlayerJumpedEvent { Power = 5f });\n```\n\n💡 **Common events sẵn có** (`CommonEvents.cs`): `GameStartedEvent`, `GamePausedEvent`, `GameOverEvent`, `LevelLoadedEvent`, `SceneLoadStartedEvent`, `SceneLoadCompletedEvent`.\n\n---\n\n## GameLog\n\n📁 `Assets/_Project/Scripts/Core/Logger/GameLog.cs`\n📦 `GameTemplate.Core.Logger`\n\nLogger có category + tự strip release build (zero overhead production).\n\n### Methods\n\n| Method | Mô tả | Strip khi release? |\n|---|---|---|\n| `Info(LogCategory, string)` | Log info | ✅ Bị strip nếu không `ENABLE_GAME_LOG` |\n| `Warning(LogCategory, string)` | Log warning | ✅ Bị strip |\n| `Error(LogCategory, string)` | Log error | ❌ Luôn log (lỗi prod cần track) |\n\n### Properties\n\n| Property | Mô tả |\n|---|---|\n| `EnabledCategories` | Bitmask lọc category. Default `LogCategory.All`. |\n\n### LogCategory enum\n\n`Bootstrap`, `Audio`, `Save`, `UI`, `Input`, `Scene`, `Gameplay`, `Network`, `Ads`, `IAP`, `Analytics`, `All`.\n\n### Example\n\n```csharp\nGameLog.Info(LogCategory.Audio, \"Playing background music\");\nGameLog.Warning(LogCategory.Save, \"Save file backup created\");\nGameLog.Error(LogCategory.Network, \"API timeout after 30s\");\n\n// Filter: chỉ log Audio + Save, ẩn các category khác\nGameLog.EnabledCategories = LogCategory.Audio | LogCategory.Save;\n```\n\n⚠️ Để bật log: thêm `ENABLE_GAME_LOG` vào Scripting Define Symbols.\n\n---\n\n## ObjectPool\n\n📁 `Assets/_Project/Scripts/Core/Pooling/ObjectPool.cs`\n📦 `GameTemplate.Core.Pooling`\n\nPool generic - tránh GC spike khi spawn/despawn liên tục. Hỗ trợ IPoolable callback, MaxSize cap, active tracking.\n\n### Constructors\n\n```csharp\n// Đầy đủ (production)\nObjectPool<T>(T prefab, int prewarm, int maxSize, Transform parent = null, bool expandable = true)\n\n// Backward compatible (code cũ vẫn work)\nObjectPool<T>(T prefab, int initialSize, Transform parent = null, bool expandable = true)\n```\n\n| Param | Mô tả |\n|---|---|\n| `prefab` | Component để Instantiate (vd: Bullet, Enemy) |\n| `prewarm` / `initialSize` | Số object tạo sẵn lúc init (tránh GC spike lần đầu Get) |\n| `maxSize` | Cap tối đa instance (active + available). 0 = unlimited |\n| `parent` | Transform cha (organize hierarchy) |\n| `expandable` | True = tự tạo thêm đến maxSize, false = return null khi cạn |\n\n### Methods\n\n| Method | Mô tả |\n|---|---|\n| `Get()` | Lấy 1 object active. Auto gọi `IPoolable.OnSpawnFromPool`. Return null nếu cạn + đạt MaxSize |\n| `Release(T instance)` | Trả về pool. Auto gọi `IPoolable.OnDespawnToPool`. SetActive(false). |\n| `DespawnAll()` | Release tất cả instance đang active. Vd: scene reset |\n| `Clear()` | Destroy mọi instance, clear pool. Vd: scene unload |\n\n### Properties\n\n| Property | Mô tả |\n|---|---|\n| `CountActive` | Số instance đang được dùng (đã Get nhưng chưa Release) |\n| `CountAvailable` | Số instance đang chờ trong pool (inactive) |\n| `CountTotal` | Tổng (active + available) |\n| `MaxSize` | Limit tối đa (int.MaxValue nếu unlimited) |\n| `Prefab` | Prefab gốc (cho debug) |\n\n### Example\n\n```csharp\nprivate ObjectPool<Bullet> _bulletPool;\n\nvoid Awake()\n{\n    _bulletPool = new ObjectPool<Bullet>(\n        bulletPrefab,\n        prewarm: 50,\n        maxSize: 200,\n        parent: transform);\n}\n\nvoid Shoot()\n{\n    var bullet = _bulletPool.Get();\n    if (bullet == null) return;  // Pool đã đạt MaxSize\n    bullet.transform.position = muzzle.position;\n    bullet.Fire(direction);\n}\n\nvoid OnBulletHit(Bullet bullet) => _bulletPool.Release(bullet);\n```\n\nXem [Cookbook recipe #21](COOKBOOK.md#21-pool-object-để-spawn-enemy) và [#21b IPoolable](COOKBOOK.md#21b-ipoolable---object-tự-reset-state-khi-spawnđespawn).\n\n---\n\n## IPoolable\n\n📁 `Assets/_Project/Scripts/Core/Pooling/IPoolable.cs`\n📦 `GameTemplate.Core.Pooling`\n\nInterface cho object tự reset state khi spawn/despawn từ pool.\n\n### Methods\n\n| Method | Trigger |\n|---|---|\n| `OnSpawnFromPool()` | Gọi sau khi `SetActive(true)`, trước khi trả về caller |\n| `OnDespawnToPool()` | Gọi trước khi `SetActive(false)` |\n\nObjectPool tự gọi qua `GetComponents<IPoolable>()` → nhiều IPoolable trên cùng GameObject đều được gọi.\n\nXem [Cookbook recipe #21b](COOKBOOK.md#21b-ipoolable---object-tự-reset-state-khi-spawnđespawn).\n\n---\n\n## JsonSaveService\n\n📁 `Assets/_Project/Scripts/Core/Save/JsonSaveService.cs`\n📦 `GameTemplate.Core.Save`\n\nSave/load JSON async, atomic write (chống corrupt khi user kill app).\n\n### Interface `ISaveService`\n\n| Method | Mô tả |\n|---|---|\n| `LoadAsync<T>(string key)` | Load. Return `new T()` nếu file chưa có hoặc lỗi parse. |\n| `SaveAsync<T>(string key, T data)` | Save. Atomic write (file tạm + rename). |\n| `HasSave(string key)` | Check file tồn tại. |\n| `Delete(string key)` | Xoá file save. |\n\n### Base class\n\n```csharp\n[Serializable]\npublic abstract class SaveDataBase\n{\n    public int SaveVersion = 1; // tăng khi đổi schema để migrate\n}\n```\n\n### Example\n\n```csharp\n[Serializable]\npublic class PlayerData : SaveDataBase\n{\n    public int Coins;\n    public int Level;\n}\n\n// Save\nvar save = ServiceLocator.Get<ISaveService>();\nawait save.SaveAsync(\"player\", new PlayerData { Coins = 100, Level = 5 });\n\n// Load\nvar data = await save.LoadAsync<PlayerData>(\"player\");\nDebug.Log($\"Coins: {data.Coins}\");\n\n// Migration khi đổi schema:\nif (data.SaveVersion < 2)\n{\n    data.NewField = \"default\";\n    data.SaveVersion = 2;\n    await save.SaveAsync(\"player\", data);\n}\n```\n\n⚠️ JsonUtility (Unity) chỉ serialize fields (không serialize properties). Field phải public hoặc có `[SerializeField]`.\n\n📁 File save: `Application.persistentDataPath/Saves/<key>.json`. Mở folder qua menu **GameTemplate → Folder → Persistent Data Path**.\n\n---\n\n## IDailyResetService\n\n📁 `Assets/_Project/Scripts/Core/Scheduling/DailyResetService.cs`\n📦 `GameTemplate.Core.Scheduling`\n\nService check \"đã sang ngày mới chưa\" - dùng cho daily reward, daily quest, free chest mỗi ngày.\n\n### Triết lý\n\nCHỈ làm phần universal (check ngày, lưu timestamp, đếm streak). KHÔNG làm UI claim hay reward data - game tự build.\n\n### Methods\n\n| Method | Mô tả |\n|---|---|\n| `IsNewDay(string key)` | Hôm nay đã pass ngày của lần claim cuối chưa? |\n| `MarkAsClaimed(string key)` | Đánh dấu đã claim hôm nay + auto tính streak |\n| `GetLastClaimDate(string key)` | DateTime lần claim cuối |\n| `GetStreakIfClaimed(string key)` | Số ngày streak hiện tại (liên tiếp) |\n| `GetTimeUntilNextReset()` | TimeSpan tới 00:00 ngày mai (cho countdown UI) |\n| `ResetKey(string key)` | Xoá data 1 key (cho cheat/test) |\n\n### Multi-key\n\n1 service quản nhiều daily key độc lập: `\"login_bonus\"`, `\"daily_quest\"`, `\"free_chest\"`, `\"ad_limit\"`...\n\n### Persistence\n\nDùng PlayerPrefs với prefix `Daily_LastClaim_` và `Daily_Streak_`. Đơn giản, không cần ISaveService.\n\n### Time source\n\nDùng `DateTime.Now` (device time). User chỉnh đồng hồ có thể hack - chấp nhận trade-off cho casual game.\n\n### Example\n\nXem [Cookbook recipe #4b](COOKBOOK.md#4b-check-ngày-mới-daily-reset--login-bonus).\n\n---\n\n## TutorialSequencer\n\n📁 `Assets/_Project/Scripts/Core/Tutorial/TutorialSequencer.cs`\n📦 `GameTemplate.Core.Tutorial`\n\nEngine chạy tuần tự các tutorial step, lưu tiến độ PlayerPrefs, hỗ trợ skip/resume. Tách \"engine\" (universal) khỏi \"content\" (game tự viết step).\n\n### Constructor\n\n```csharp\nTutorialSequencer(string tutorialId, ITutorialOverlay overlay)\n```\n\n### Methods\n\n| Method | Mô tả |\n|---|---|\n| `AddStep(ITutorialStep step)` | Builder - thêm step, return this để chain |\n| `Start(bool forceRestart = false)` | Bắt đầu. Skip nếu đã hoàn thành (trừ forceRestart) |\n| `Tick()` | Gọi mỗi frame từ Update - chạy step logic |\n| `SkipAll()` | Skip toàn bộ, đánh dấu hoàn thành |\n\n### Properties\n\n| Property | Mô tả |\n|---|---|\n| `IsRunning` | Tutorial đang chạy? |\n| `CurrentStep` | Step hiện tại |\n| `TutorialId` | Id tutorial |\n\n### Events\n\n| Event | Khi nào |\n|---|---|\n| `OnCompleted` | Toàn bộ tutorial xong |\n| `OnSkipped` | User skip |\n| `OnStepCompleted` | Mỗi step xong (param: step) |\n\n### Static methods\n\n| Method | Mô tả |\n|---|---|\n| `IsCompleted(string tutorialId)` | Check đã hoàn thành chưa |\n| `ResetTutorial(string tutorialId)` | Reset (cho cheat/test) |\n\n### Example\n\nXem [Cookbook recipe #4c](COOKBOOK.md#4c-tutorial-system-step-sequencer--highlight).\n\n---\n\n## ITutorialStep\n\n📁 `Assets/_Project/Scripts/Core/Tutorial/ITutorialStep.cs`\n📦 `GameTemplate.Core.Tutorial`\n\nInterface cho 1 bước tutorial. Engine chỉ biết 3 method, không quan tâm nội dung.\n\n### Methods\n\n| Method | Mô tả |\n|---|---|\n| `StepId` | Id duy nhất (cho save tiến độ) |\n| `Enter(TutorialContext)` | Gọi 1 lần khi step bắt đầu |\n| `IsComplete()` | Gọi mỗi frame, true = xong |\n| `Exit()` | Gọi 1 lần khi step kết thúc |\n\n### 4 built-in steps\n\n| Step | Constructor | Complete khi |\n|---|---|---|\n| `MessageStep` | `(id, message, placement)` | User tap |\n| `WaitForClickStep` | `(id, targetGetter, message, placement)` | Bấm đúng highlight |\n| `WaitForEventStep<T>` | `(id, message, highlightGetter?, filter?)` | EventBus event fire |\n| `WaitForConditionStep` | `(id, condition, message, highlightGetter?)` | Func bool true |\n\nViết step custom: implement `ITutorialStep`. Xem [Cookbook #4c](COOKBOOK.md#4c-tutorial-system-step-sequencer--highlight).\n\n---\n\n## ITutorialOverlay\n\n📁 `Assets/_Project/Scripts/Core/Tutorial/ITutorialOverlay.cs` (interface), `TutorialOverlay.cs` (impl)\n📦 `GameTemplate.Core.Tutorial`\n\nUI overlay tutorial: mask tối + khoét lỗ highlight + text bubble + block input. Implement bằng `TutorialOverlay` MonoBehaviour (4 mask panel, không cần shader).\n\n### Methods\n\n| Method | Mô tả |\n|---|---|\n| `Show()` / `Hide()` | Bật/tắt overlay |\n| `HighlightTarget(RectTransform, allowClickThrough, padding)` | Khoét lỗ vào UI element |\n| `HighlightWorldPosition(Vector3, screenRadius, allowClickThrough)` | Highlight vị trí world space |\n| `ClearHighlight()` | Mask phủ kín lại |\n| `ShowMessage(message, placement, showTapHint)` | Hiện text bubble |\n| `HideMessage()` | Ẩn bubble |\n| `WasTappedThisFrame()` | User vừa tap overlay? |\n| `WasHighlightTappedThisFrame()` | User tap đúng vùng highlight? |\n\n### Enum `BubblePlacement`\n\n`Auto`, `Above`, `Below`, `Left`, `Right`, `Center`.\n\n### Setup\n\nTạo Canvas prefab với 4 mask panel + FullMask + MessageBubble, add `TutorialOverlay` component, kéo references. Xem [Cookbook #4c](COOKBOOK.md#4c-tutorial-system-step-sequencer--highlight).\n\n---\n\n## AudioManager\n\n📁 `Assets/_Project/Scripts/Core/Audio/AudioManager.cs`\n📦 `GameTemplate.Core.Audio`\n\nAudio manager với pool AudioSource cho SFX (tránh GC).\n\n### Interface `IAudioService`\n\n**Mute API** (cho game không cần slider volume - hyper-casual, puzzle):\n\n| Property | Mô tả |\n|---|---|\n| `IsMasterMuted` | Tắt toàn bộ âm thanh. Auto save PlayerPrefs. |\n| `IsMusicMuted` | Tắt riêng nhạc. |\n| `IsSfxMuted` | Tắt riêng SFX. |\n| `ToggleMaster()` | Toggle nhanh, return state mới. |\n| `ToggleMusic()` | Toggle music. |\n| `ToggleSfx()` | Toggle SFX. |\n\n**Volume API** (cho game có slider 0-1):\n\n| Property | Mô tả |\n|---|---|\n| `MasterVolume` (get/set) | 0..1. Set auto save PlayerPrefs. |\n| `MusicVolume` (get/set) | 0..1. |\n| `SfxVolume` (get/set) | 0..1. |\n\n**Event:**\n\n| Event | Khi nào fire |\n|---|---|\n| `OnAudioSettingsChanged` | Bất kỳ thay đổi mute/volume nào - UI subscribe để refresh icon. |\n\n**Playback:**\n\n| Method | Mô tả |\n|---|---|\n| `PlaySfx(AudioClip, float volume = 1, float pitch = 1)` | Phát SFX qua pool. Skip nếu đang mute. |\n| `PlayMusic(AudioClip, bool loop = true, float fadeIn = 1f)` | Phát nhạc với fade. |\n| `StopMusic(float fadeOut = 1f)` | Dừng nhạc. |\n\n**Mute vs Volume:**\n- 2 thứ độc lập, mute không reset volume\n- Unmute lại trả về volume cũ\n- Master mute override cả music + sfx (kể cả volume riêng)\n\n### Setup (Bootstrap)\n\n1. Tạo Audio Mixer với 3 group: Master, Music, SFX\n2. Expose 3 param: `MasterVolume`, `MusicVolume`, `SfxVolume`\n3. Tạo prefab AudioManager với script `AudioManager.cs`, gán Mixer + Groups\n4. Gán prefab vào `GameBootstrap.AudioManagerPrefab`\n\n### Example\n\n```csharp\nvar audio = ServiceLocator.Get<IAudioService>();\n\n// Playback\naudio.PlaySfx(jumpSound);\naudio.PlaySfx(coinSound, volume: 0.5f, pitch: 1.2f);\naudio.PlayMusic(bgmTheme, loop: true, fadeIn: 2f);\naudio.StopMusic(fadeOut: 1f);\n\n// Mute on/off (cho game không cần slider)\naudio.IsMasterMuted = true;     // tắt toàn bộ\naudio.ToggleMusic();            // toggle nhanh\n\n// Volume 0-1 (cho game có slider)\naudio.MasterVolume = 0.8f;\naudio.SfxVolume = 0.5f;\n\n// Subscribe để UI tự update khi setting đổi\naudio.OnAudioSettingsChanged += () => RefreshSoundIcon();\n```\n\n**Settings tự persist PlayerPrefs** - reload game vẫn nhớ user đã mute/đặt volume bao nhiêu.\n\n---\n\n## SceneLoader\n\n📁 `Assets/_Project/Scripts/Core/SceneManagement/SceneLoader.cs`\n📦 `GameTemplate.Core.SceneManagement`\n\nLoad scene async + publish event cho loading UI.\n\n### Interface `ISceneLoader`\n\n| Method | Mô tả |\n|---|---|\n| `LoadSceneAsync(string sceneName, bool showLoading = true)` | Load async. Publish event nếu showLoading. |\n| `Progress` | Float 0-1 progress hiện tại. |\n\n### Events publish\n\n- `SceneLoadStartedEvent` - khi bắt đầu load\n- `SceneLoadCompletedEvent` - khi load xong\n\n### Example\n\n```csharp\n// Load đơn giản\nvar loader = ServiceLocator.Get<ISceneLoader>();\nawait loader.LoadSceneAsync(\"Level_03\");\n\n// Loading UI subscribe\npublic class LoadingScreen : MonoBehaviour\n{\n    private void OnEnable()\n    {\n        EventBus.Subscribe<SceneLoadStartedEvent>(OnLoadStarted);\n        EventBus.Subscribe<SceneLoadCompletedEvent>(OnLoadCompleted);\n    }\n    // ...\n}\n```\n\n---\n\n## UIPanel + UIManager\n\n📁 `Assets/_Project/Scripts/Core/UI/UIPanel.cs`, `UIManager.cs`\n📦 `GameTemplate.Core.UI`\n\n### UIPanel (base class)\n\n| Method | Mô tả |\n|---|---|\n| `Show()` | Hiện panel + alpha 1. |\n| `Hide()` | Ẩn panel + alpha 0. |\n| `OnShow()` | Override để xử lý khi hiện. |\n| `OnHide()` | Override để cleanup. |\n| `OnBackPressed()` | Override để handle Android back. Return true = đã xử lý. |\n\n### UIManager (stack-based)\n\n| Method | Mô tả |\n|---|---|\n| `Push(UIPanel)` | Push panel mới, ẩn panel cũ. |\n| `Pop()` | Quay lại panel trước. |\n| `PopAll()` | Đóng hết panel. |\n| `CurrentPanel` | Panel đang trên cùng stack. |\n\n### Example\n\n```csharp\n// Tạo panel\npublic class SettingsPanel : UIPanel\n{\n    [SerializeField] private Slider _volumeSlider;\n\n    protected override void OnShow()\n    {\n        _volumeSlider.value = PlayerPrefs.GetFloat(\"Volume\", 1f);\n    }\n\n    public override bool OnBackPressed()\n    {\n        ServiceLocator.Get<UIManager>().Pop();\n        return true;\n    }\n}\n\n// Sử dụng\nvar ui = ServiceLocator.Get<UIManager>();\nui.Push(settingsPanel);\n// User bấm back → UIManager auto Pop\n```\n\n---\n\n## SafeAreaFitter\n\n📁 `Assets/_Project/Scripts/Core/UI/SafeAreaFitter.cs`\n📦 `GameTemplate.Core.UI`\n\nMonoBehaviour component auto-fit RectTransform vào `Screen.safeArea` - tránh notch, home indicator, status bar.\n\n### Fields\n\n| Field | Default | Mô tả |\n|---|---|---|\n| `padTop` | true | Apply padding cho cạnh trên (status bar, notch) |\n| `padBottom` | true | Apply padding cho cạnh dưới (home indicator) |\n| `padLeft` | true | Apply padding cho cạnh trái (notch khi landscape) |\n| `padRight` | true | Apply padding cho cạnh phải |\n| `logChanges` | false | Debug: log mỗi lần re-apply |\n\n### Behavior\n\n- Auto-apply trong `Awake()`, `OnEnable()`, và `Update()` khi detect change\n- Detect change: `Screen.safeArea`, `Screen.width/height`, `Screen.orientation`\n- Hỗ trợ xoay device, foldable phone, split screen Android\n\n### Setup\n\n```\nCanvas (full màn hình)\n├── Background (Image)         ← ngoài SafeArea, tràn vào notch OK\n└── SafeArea (SafeAreaFitter)  ← anchor stretch full, offset = 0\n    ├── TopBar\n    ├── GameplayUI\n    └── BottomBar\n```\n\n### Example\n\nXem [Cookbook recipe #5b](COOKBOOK.md#5b-tạo-ui-an-toàn-với-notch--home-indicator-safe-area).\n\n---\n\n## CameraFitter\n\n📁 `Assets/_Project/Scripts/Core/Camera/CameraFitter.cs`\n📦 `GameTemplate.Core.Camera`\n\nMonoBehaviour auto-fit Camera (Orthographic 2D hoặc Perspective 3D) vào design area trên mọi device aspect. Object luôn scale 1, camera tự điều chỉnh.\n\n### Fields\n\n| Field | Default | Mô tả |\n|---|---|---|\n| `designWidth` | 9 | Chiều ngang design area (world units) |\n| `designHeight` | 16 | Chiều dọc design area |\n| `mode` | `AutoByOrientation` | Strategy fit |\n| `logChanges` | false | Debug log mỗi lần re-fit |\n| `drawGizmo` | true | Vẽ design area trong Scene view |\n\n### Enum `CameraFitMode`\n\n| Value | Behavior | Phù hợp |\n|---|---|---|\n| `FitWidth` | Cố định chiều ngang = DesignWidth | Portrait, side-scroller, runner |\n| `FitHeight` | Cố định chiều dọc = DesignHeight | Landscape, top-down |\n| `AutoByOrientation` | Portrait → FitWidth, Landscape → FitHeight | Game support cả 2 orientation |\n\n### Properties\n\n| Property | Mô tả |\n|---|---|\n| `Camera` | Camera component được fit |\n| `EffectiveMode` | Mode đang áp dụng (resolve Auto thành Width/Height) |\n\n### Behavior\n\n- Apply trong `Awake()`\n- Re-apply trong `Update()` khi screen size đổi (xoay device, split screen, foldable)\n- Support Orthographic (set `orthographicSize`) và Perspective (set `fieldOfView`)\n\n### Example\n\nXem [Cookbook recipe #5c](COOKBOOK.md#5c-camera-fit-gameplay-area-trên-mọi-device-aspect).\n\n---\n\n## EnhancedButton\n\n📁 `Assets/_Project/Scripts/Core/UI/Buttons/EnhancedButton.cs`\n📦 `GameTemplate.Core.UI.Buttons`\n\nButton kế thừa Unity `Button`, thêm SFX preset/custom + Analytics tracking (event name only) + Haptic + spam protection.\n\n### Fields\n\n| Field | Default | Mô tả |\n|---|---|---|\n| `sfxPreset` | `Click` | None/Click/Confirm/Cancel/Error/Custom |\n| `customSfx` | null | Override AudioClip - dùng thay cho preset library nếu set |\n| `sfxVolumeScale` | 1.0 | Scale volume 0..1 |\n| `trackEventName` | \"\" | Tên Analytics event. Để trống = không track |\n| `hapticType` | `Selection` | Loại haptic mobile (None để tắt) |\n| `minIntervalBetweenClicks` | 0.2 | Anti-spam seconds. 0 = tắt |\n\n### SFX priority\n\n1. Preset = None → không phát\n2. Custom Sfx ≠ null → phát Custom (override preset)\n3. Preset = Click/Confirm/... → lookup `UIButtonSfxLibrary` qua ServiceLocator\n\n### Public API\n\n```csharp\nSetTrackEvent(string eventName)   // Đổi event name runtime\n```\n\n### Example\n\nXem [Cookbook recipe #5d](COOKBOOK.md#5d-enhancedbutton---button-có-sfx--analytics--haptic).\n\n---\n\n## HoldButton\n\n📁 `Assets/_Project/Scripts/Core/UI/Buttons/HoldButton.cs`\n📦 `GameTemplate.Core.UI.Buttons`\n\nNút nhấn-giữ với 3 UnityEvent wire trực tiếp Inspector.\n\n### Fields\n\n| Field | Default | Mô tả |\n|---|---|---|\n| `onStartAction` | empty | Fire khi pointer down |\n| `onHoldAction` | empty | Fire mỗi frame khi đang giữ |\n| `onReleaseAction` | empty | Fire khi pointer up hoặc drag ra ngoài |\n| `releaseOnPointerExit` | true | Drag ra ngoài = fire Release |\n| `hapticOnStart` | `Light` | Haptic khi bắt đầu giữ |\n| `hapticOnRelease` | `None` | Haptic khi nhả |\n\n### Properties\n\n| Property | Mô tả |\n|---|---|\n| `IsHolding` | True khi đang giữ |\n| `HoldDuration` | Giây đã giữ (0 nếu không giữ) |\n| `OnStartAction` / `OnHoldAction` / `OnReleaseAction` | UnityEvent public - AddListener trong code |\n\n### Wire qua Inspector\n\nDrag GameObject + chọn method public → không cần code subscribe.\n\n### Example\n\nXem [Cookbook recipe #5e](COOKBOOK.md#5e-holdbutton---nút-nhấn-giữ-với-unityevent).\n\n---\n\n## UIButtonSfxLibrary\n\n📁 `Assets/_Project/Scripts/Core/UI/Buttons/UIButtonSfxLibrary.cs`\n📦 `GameTemplate.Core.UI.Buttons`\n\nScriptableObject map enum `ButtonSfxPreset` sang AudioClip. 1 asset cho cả project.\n\n### Setup\n\n1. Create asset: Project → Create → Game → UI → Button SFX Library\n2. Kéo AudioClip cho Click, Confirm, Cancel, Error\n3. Kéo asset vào `MobileServicesBootstrapper._uiButtonSfxLibrary`\n\nBootstrap tự đăng ký vào ServiceLocator → mọi `EnhancedButton` dùng được.\n\n### Method\n\n`AudioClip GetClip(ButtonSfxPreset preset)` - return null nếu preset không có clip.\n\n---\n\n## ReactiveProperty\n\n📁 `Assets/_Project/Scripts/Core/Patterns/Reactive/ReactiveProperty.cs`\n📦 `GameTemplate.Core.Patterns.Reactive`\n\nObservable value - UI tự update khi value đổi.\n\n### Methods\n\n| Method/Property | Mô tả |\n|---|---|\n| `Value` (get/set) | Lấy/gán value. Set sẽ notify nếu khác value cũ. |\n| `SetSilent(T value)` | Set không notify. Dùng khi load save. |\n| `ForceNotify()` | Notify dù value không đổi. |\n| `Subscribe(Action<T>)` | Đăng ký callback. |\n| `SubscribeWithInit(Action<T>)` | Subscribe + gọi luôn với value hiện tại. |\n| `Unsubscribe(Action<T>)` | Huỷ. |\n| `ClearSubscribers()` | Xoá hết subscriber. |\n\n### Example\n\n```csharp\npublic class PlayerStats\n{\n    public ReactiveProperty<int> Hp = new ReactiveProperty<int>(100);\n}\n\n// UI side\n_stats.Hp.SubscribeWithInit(hp => _hpText.text = $\"HP: {hp}\");\n\n// Trong OnDisable\n_stats.Hp.Unsubscribe(OnHpChanged);\n\n// Update value (UI tự refresh)\n_stats.Hp.Value = 80;\n\n// Implicit conversion - dùng như value thường\nint currentHp = _stats.Hp; // không cần .Value\n```\n\n---\n\n## ReactiveCollection\n\n📁 cùng file `ReactiveProperty.cs`\n\nObservable list cho inventory, quest log...\n\n### Events\n\n| Event | Mô tả |\n|---|---|\n| `OnAdd(T item)` | Khi item add. |\n| `OnRemove(T item)` | Khi item remove. |\n| `OnClear()` | Khi clear all. |\n| `OnChange()` | Bất kỳ thay đổi nào (Add/Remove/Clear). |\n\n### Example\n\n```csharp\npublic ReactiveCollection<Item> Inventory = new ReactiveCollection<Item>();\n\n// UI\nInventory.OnAdd += item => SpawnSlot(item);\nInventory.OnRemove += item => DestroySlot(item);\nInventory.OnChange += () => UpdateWeightText();\n\n// Modify\nInventory.Add(newSword);\nInventory.Remove(oldShield);\n```\n\n---\n\n## PrefabFactory\n\n📁 `Assets/_Project/Scripts/Core/Patterns/Factory/PrefabFactory.cs`\n📦 `GameTemplate.Core.Patterns.Factory`\n\nSpawn entity từ ScriptableObject data + có pool sẵn.\n\n### Setup\n\n```csharp\n// 1. Data class kế thừa FactoryDataBase\n[CreateAssetMenu(menuName = \"Game/Enemy Data\")]\npublic class EnemyData : FactoryDataBase\n{\n    public int MaxHp;\n    public GameObject EnemyPrefab;\n    public override GameObject Prefab => EnemyPrefab;\n}\n\n// 2. Entity implement IConfigurable<TData>\npublic class Enemy : MonoBehaviour, IConfigurable<EnemyData>\n{\n    public void Configure(EnemyData data) { /* set stats */ }\n}\n\n// 3. Tạo factory\nvar factory = new PrefabFactory<EnemyData, Enemy>(\n    allEnemyData,\n    poolParent: transform,\n    initialPoolSize: 8\n);\n```\n\n### Methods\n\n| Method | Mô tả |\n|---|---|\n| `Create(string id, Vector3 pos, Quaternion rot = default)` | Spawn entity theo Id, auto pool. |\n| `Return(string id, T entity)` | Trả về pool. |\n\n### Example\n\n```csharp\n// Spawn slime tại pos\nvar slime = factory.Create(\"slime_lv1\", spawnPos);\n\n// Sau khi slime chết\nfactory.Return(\"slime_lv1\", slime);\n```\n\n---\n\n## MVP Base\n\n📁 `Assets/_Project/Scripts/Core/Patterns/MVP/MVPBase.cs`\n📦 `GameTemplate.Core.Patterns.MVP`\n\n### `ViewBase`\nMonoBehaviour base cho View. Override `Bind()` và `Unbind()`.\n\n### `PresenterBase<TView, TModel>`\nPure C# class.\n\n| Method | Mô tả |\n|---|---|\n| `Init()` | Subscribe Model, init UI. |\n| `Dispose()` | Cleanup. |\n| `OnInit()` | Override để add logic init. |\n| `OnDispose()` | Override để cleanup. |\n\n### Example đầy đủ\n\nXem `HpBarExample.cs` trong `Patterns/MVP/Examples/`.\n\n---\n\n## MonoSingleton\n\n📁 `Assets/_Project/Scripts/Core/Patterns/Singleton/MonoSingleton.cs`\n📦 `GameTemplate.Core.Patterns.Singleton`\n\nMonoBehaviour singleton an toàn (lazy, thread-safe, tránh ghost khi quit).\n\n⚠️ **Template ưu tiên ServiceLocator hơn Singleton.** Chỉ dùng khi cần static context.\n\n### Example\n\n```csharp\npublic class GameManager : MonoSingleton<GameManager>\n{\n    public int Score { get; set; }\n\n    public void StartGame() { /* ... */ }\n}\n\n// Sử dụng\nGameManager.Instance.StartGame();\n```\n\n### Pure C# Singleton\n\n```csharp\npublic class ConfigCache : Singleton<ConfigCache>\n{\n    public Dictionary<string, string> Data = new Dictionary<string, string>();\n}\n\nConfigCache.Instance.Data[\"key\"] = \"value\";\n```\n\n---\n\n## AsyncOp + Sequence\n\n📁 `Assets/_Project/Scripts/Core/Patterns/Async/AsyncOp.cs`\n📦 `GameTemplate.Core.Patterns.Async`\n\n### `AsyncOp` static methods\n\n| Method | Mô tả |\n|---|---|\n| `Delay(float seconds)` | Delay theo Time.deltaTime (pause khi game pause). |\n| `DelayRealtime(float seconds)` | Delay realtime (không pause). |\n| `WaitUntil(Func<bool> condition, float timeout = -1)` | Đợi đến khi điều kiện true. |\n| `Tween(from, to, duration, onUpdate, curve = null)` | Tween float, gọi callback mỗi frame. |\n| `WhenAll(params Task[])` | Chạy song song nhiều task. |\n| `RepeatAction(float interval)` | Quick use - lặp `LoopAction` static. Chỉ 1 loop tại 1 thời điểm. |\n| `RepeatAction(float interval, Action, CancellationToken, bool runImmediately = true)` | Production use - lặp action với cancel token. Exception-safe. |\n\n### `Sequence` builder\n\n| Method | Mô tả |\n|---|---|\n| `Append(Func<Task>)` | Thêm step. |\n| `AppendDelay(float)` | Thêm delay. |\n| `AppendCallback(Action)` | Thêm callback đồng bộ. |\n| `Play()` | Chạy sequence (await). |\n\n### Example\n\n```csharp\n// Delay\nawait AsyncOp.Delay(2f);\n\n// Tween fade\nawait AsyncOp.Tween(0f, 1f, 0.3f, v => canvasGroup.alpha = v);\n\n// Wait condition\nawait AsyncOp.WaitUntil(() => player.IsAtTarget, timeout: 10f);\n\n// Sequence chain\nawait new Sequence()\n    .Append(() => AsyncOp.Tween(0, 1, 0.3f, v => panel.alpha = v))\n    .AppendDelay(2f)\n    .Append(() => AsyncOp.Tween(1, 0, 0.3f, v => panel.alpha = v))\n    .AppendCallback(() => panel.gameObject.SetActive(false))\n    .Play();\n```\n\n---\n\n## IAdsService\n\n📁 `Assets/_Project/Scripts/Core/Mobile/Ads/IAdsService.cs`\n📦 `GameTemplate.Core.Mobile.Ads`\n\n### Properties\n\n| Property | Mô tả |\n|---|---|\n| `CurrentMediation` | Mediation đang dùng. |\n| `IsInitialized` | Đã init xong chưa. |\n| `AdsEnabled` | Bật/tắt toàn bộ ads. |\n| `BannerEnabled` | Bật/tắt riêng banner. |\n| `InterstitialEnabled` | Bật/tắt riêng interstitial. |\n| `RewardedEnabled` | Bật/tắt rewarded (không nên tắt). |\n| `IsBannerVisible` | Banner đang hiện hay không. |\n\n### Methods\n\n| Method | Mô tả |\n|---|---|\n| `InitializeAsync()` | Init SDK. |\n| `ShowBanner(BannerPosition = Bottom)` | Hiện banner. |\n| `HideBanner()` | Ẩn banner. |\n| `IsInterstitialReady()` | Check ad có sẵn không. |\n| `ShowInterstitialAsync(string placement)` | Show full-screen ad. Return AdResult. |\n| `IsRewardedReady()` | Check rewarded có sẵn. |\n| `ShowRewardedAsync(string placement)` | Show rewarded video. Return AdResult. |\n\n### Events\n\n`OnAdShown(string)`, `OnAdClicked(string)`, `OnRewardEarned(string)`.\n\n### Enum `AdResult`\n\n`Success`, `Failed`, `Skipped`, `Closed`, `NotReady`.\n\n### Example\n\n```csharp\nvar ads = ServiceLocator.Get<IAdsService>();\n\n// Banner\nads.ShowBanner(BannerPosition.Bottom);\nads.HideBanner();\n\n// Interstitial\nif (ads.IsInterstitialReady())\n{\n    await ads.ShowInterstitialAsync(\"level_complete\");\n}\n\n// Rewarded\nvar result = await ads.ShowRewardedAsync(\"revive\");\nif (result == AdResult.Success)\n{\n    GivePlayerReward();\n}\n\n// Tắt khi user mua Remove Ads\nads.AdsEnabled = false;\n```\n\n---\n\n## IIapService\n\n📁 `Assets/_Project/Scripts/Core/Mobile/IAP/IIapService.cs`\n\n### Methods\n\n| Method | Mô tả |\n|---|---|\n| `InitializeAsync(IEnumerable<ProductInfo>)` | Init với list product. |\n| `GetProducts()` | List mọi product. |\n| `GetProduct(string id)` | Lấy product theo ID. |\n| `IsOwned(string id)` | Check non-consumable đã mua chưa. |\n| `PurchaseAsync(string id)` | Mua. Return PurchaseResult. |\n| `RestorePurchasesAsync()` | Restore (BẮT BUỘC iOS). |\n\n### Class `ProductInfo`\n\n```csharp\npublic class ProductInfo\n{\n    public string ProductId;\n    public ProductType Type; // Consumable, NonConsumable, Subscription\n    public string LocalizedPrice;\n    public string LocalizedTitle;\n    public string LocalizedDescription;\n    public bool IsOwned;\n}\n```\n\n### Example\n\nXem [Cookbook recipe #16](COOKBOOK.md#16-mua-in-app-purchase).\n\n---\n\n## IAnalyticsService\n\n📁 `Assets/_Project/Scripts/Core/Mobile/Analytics/AnalyticsService.cs`\n\nMulti-provider analytics (Firebase + GameAnalytics + Mock... đều track cùng lúc).\n\n> 💡 **Tại sao `Dictionary<string, object>` thay vì `Parameter[]` (Firebase)?**\n>\n> Template dùng **Adapter pattern** - interface vendor-agnostic, mỗi provider tự convert sang SDK format riêng. Lợi ích: code gameplay không phụ thuộc Firebase, dễ swap sang GameAnalytics/AppsFlyer, build được không cần SDK.\n>\n> Chi tiết + code FirebaseAnalyticsProvider mẫu: xem [MOBILE_INTEGRATION.md](MOBILE_INTEGRATION.md#analytics---adapter-pattern-giải-thích)\n\n### Methods\n\n| Method | Mô tả |\n|---|---|\n| `RegisterProvider(IAnalyticsProvider)` | Add destination. |\n| `SetUserId(string)` | Identify user. |\n| `SetUserProperty(string key, string value)` | Set property (vd: level, country). |\n| `TrackEvent(string name)` | Event không param. |\n| `TrackEvent(string name, Dictionary<string, object>)` | Event với param. |\n\n### Helper events chuẩn\n\n| Method | Event name | Params |\n|---|---|---|\n| `TrackLevelStart(int level)` | `level_start` | level |\n| `TrackLevelComplete(int, float)` | `level_complete` | level, duration |\n| `TrackLevelFail(int, string)` | `level_fail` | level, reason |\n| `TrackAdShown(string, string)` | `ad_shown` | placement, ad_type |\n| `TrackPurchase(string, string, float)` | `purchase` | product_id, currency, price |\n\n### Example\n\n```csharp\nvar analytics = ServiceLocator.Get<IAnalyticsService>();\n\nanalytics.SetUserId(\"user_12345\");\nanalytics.SetUserProperty(\"country\", \"VN\");\nanalytics.SetUserProperty(\"highest_level\", \"42\");\n\nanalytics.TrackEvent(\"tutorial_skip\");\nanalytics.TrackLevelComplete(levelIndex: 5, durationSeconds: 120f);\nanalytics.TrackEvent(\"button_click\", new Dictionary<string, object>\n{\n    [\"button\"] = \"shop\",\n    [\"screen\"] = \"main_menu\"\n});\n```\n\n---\n\n## IRemoteConfigService\n\n📁 `Assets/_Project/Scripts/Core/Mobile/RemoteConfig/IRemoteConfigService.cs`\n\n### Methods\n\n| Method | Mô tả |\n|---|---|\n| `FetchAsync()` | Fetch config từ server. |\n| `SetDefaults(Dictionary)` | Default values khi offline. |\n| `GetString(key, default = \"\")` | Get string value. |\n| `GetInt(key, default = 0)` | Get int. |\n| `GetLong(key, default = 0)` | Get long. |\n| `GetFloat(key, default = 0)` | Get float. |\n| `GetBool(key, default = false)` | Get bool. |\n\n### Event\n\n`OnConfigUpdated` - khi config fetch xong/update.\n\n### Example\n\n```csharp\nvar config = ServiceLocator.Get<IRemoteConfigService>();\n\nbool newShopOn = config.GetBool(\"new_shop_enabled\", false);\nint dailyReward = config.GetInt(\"daily_reward_amount\", 100);\nfloat coinMult = config.GetFloat(\"coin_drop_multiplier\", 1.0f);\n```\n\n---\n\n## ILocalizationService\n\n📁 `Assets/_Project/Scripts/Core/Mobile/Localization/LocalizationService.cs`\n\n### Methods\n\n| Method | Mô tả |\n|---|---|\n| `Get(string key, string fallback = null)` | Lấy text. Auto fallback English nếu key không có ở ngôn ngữ hiện tại. |\n| `Get(string key, params object[] args)` | Format string với placeholder `{0}`, `{1}`. |\n| `SetLanguage(GameLanguage)` | Đổi ngôn ngữ. Trigger `OnLanguageChanged`. |\n\n### Properties\n\n| Property | Mô tả |\n|---|---|\n| `CurrentLanguage` | GameLanguage hiện tại. |\n| `AvailableLanguages` | List ngôn ngữ có trong table. |\n\n### Event\n\n`OnLanguageChanged` - khi đổi ngôn ngữ.\n\n### Enum `GameLanguage`\n\n`English`, `Vietnamese`, `Japanese`, `Korean`, `ChineseSimplified`, `ChineseTraditional`, `Spanish`, `French`, `German`, `Italian`, `Portuguese`, `Russian`, `Thai`, `Indonesian`.\n\n### Workflow\n\n1. Tạo CSV: `Key,English,Vietnamese\\nui.play,Play,Chơi`\n2. Menu **GameTemplate → Import → CSV to Localization Table**\n3. Gán `LocalizationTable.asset` vào `MobileServicesBootstrapper`\n\n### Example\n\n```csharp\nvar loc = ServiceLocator.Get<ILocalizationService>();\n\nstring text = loc.Get(\"ui.play\");                    // \"Chơi\"\nstring score = loc.Get(\"ui.score_format\", 100);      // \"Score: 100\"\n\nloc.SetLanguage(GameLanguage.English);\n```\n\n---\n\n## IHapticService\n\n📁 `Assets/_Project/Scripts/Core/Mobile/Haptic/HapticService.cs`\n\n### Methods\n\n| Method | Mô tả |\n|---|---|\n| `Play(HapticType)` | Rung theo type. |\n\n### Properties\n\n| Property | Mô tả |\n|---|---|\n| `IsEnabled` (get/set) | Bật/tắt rung. Auto save PlayerPrefs. |\n| `IsSupported` | Device có support rung không. |\n\n### Enum `HapticType`\n\n`Light`, `Medium`, `Heavy`, `Success`, `Warning`, `Failure`, `Selection`.\n\n### Example\n\n```csharp\nvar haptic = ServiceLocator.Get<IHapticService>();\n\nhaptic.Play(HapticType.Light);  // tap UI\nhaptic.Play(HapticType.Success); // win level\nhaptic.IsEnabled = false;       // user setting\n```\n\n---\n\n## IDeviceInfoService\n\n📁 `Assets/_Project/Scripts/Core/Mobile/Device/DeviceInfoService.cs`\n\n### Properties\n\n| Property | Mô tả |\n|---|---|\n| `Tier` | DeviceTier.Low/Mid/High |\n| `SystemMemoryMb` | RAM device. |\n| `GraphicsMemoryMb` | VRAM. |\n| `DeviceModel` | Model name. |\n| `OsVersion` | OS version. |\n| `IsLowEndDevice` | True nếu Tier = Low. |\n\n### Method\n\n`ApplyTierSettings()` - apply QualitySettings theo tier.\n\n### Example\n\n```csharp\nvar device = ServiceLocator.Get<IDeviceInfoService>();\n\nif (device.IsLowEndDevice)\n{\n    // Tắt VFX nặng, giảm enemy count\n    maxEnemiesOnScreen = 10;\n}\nelse\n{\n    maxEnemiesOnScreen = 30;\n}\n```\n\n---\n\n## CheatConsole\n\n📁 `Assets/_Project/Scripts/Core/DevTools/CheatConsole.cs`\n📦 `GameTemplate.Core.DevTools`\n\nConsole runtime, chỉ có trong Editor + Development Build.\n\n### Toggle\n\n- Editor: `Tab` key\n- Mobile dev build: 3-finger tap\n\n### Register command\n\n**Cách 1 - Manual:**\n```csharp\nCheatConsole.RegisterCommand(\"kill_all\", \"Diệt mọi enemy\", args =>\n{\n    foreach (var e in FindObjectsByType<Enemy>(FindObjectsSortMode.None))\n        e.Kill();\n});\n```\n\n**Cách 2 - Attribute (auto discover):**\n```csharp\npublic static class GameplayCheats\n{\n    [CheatCommand(\"god_mode\", \"Toggle god mode\")]\n    static void GodMode(string[] args)\n    {\n        Player.Instance.IsGod = !Player.Instance.IsGod;\n    }\n}\n```\n\n### Built-in commands\n\n`help`, `clear`, `close`, `fps`, `scene`, `time_scale <value>`.\n\n⚠️ Release build production: console hoàn toàn không tồn tại (compile strip).\n\n---\n\n## SaveInspector\n\n📁 `Assets/_Project/Scripts/Core/DevTools/SaveInspector.cs`\n\nWindow xem/sửa save file JSON ngay trong build.\n\n### Toggle\n\n- Editor: `F2`\n- Mobile dev build: 4-finger tap\n\n### Tính năng\n\n- List mọi file save trong `Saves/`\n- Click file → xem nội dung JSON\n- Edit trực tiếp → bấm Save Changes\n- Delete file\n\nUse case: test edge case \"hp = 0\", \"coin overflow\", \"level 999\" không cần replay game.\n\n---\n\n## FpsDisplay\n\n📁 `Assets/_Project/Scripts/Core/DevTools/FpsDisplay.cs`\n📦 `GameTemplate.Core.DevTools`\n\nMonoBehaviour hiện FPS counter trên màn hình - dùng khi test performance trên device thật.\n\n### Fields chính\n\n| Field | Default | Mô tả |\n|---|---|---|\n| `fpsText` | null | Text UI để hiện. Null + autoCreateUI = tự tạo |\n| `autoCreateUI` | true | Tự tạo Canvas + Text nếu fpsText null |\n| `corner` | TopRight | 4 góc màn hình |\n| `showAverage` | true | Hiện FPS trung bình mượt |\n| `showMinMax` | false | Hiện min/max FPS trong 1 period |\n| `showMemory` | false | Hiện RAM usage (managed) |\n| `updateInterval` | 0.5 | Update text mỗi N giây |\n| `goodFps` | 60 | Ngưỡng FPS tốt (xanh) |\n| `warningFps` | 30 | Ngưỡng FPS warning (vàng), <30 = đỏ |\n| `toggleKey` | BackQuote | Phím toggle (PC/Editor) |\n| `toggleFingerCount` | 3 | Số ngón tap để toggle (mobile) |\n\n### Public API\n\n```csharp\nToggle()    // Bật/tắt visibility\nShow()      // Force show\nHide()      // Force hide\n```\n\n### Example\n\nXem [Cookbook recipe #28b](COOKBOOK.md#28b-hiện-fps-counter-khi-test-trên-device).\n\n---\n\n## Tham khảo thêm\n\n- [COOKBOOK.md](COOKBOOK.md) - 30+ công thức copy-paste\n- [DIAGRAMS.md](DIAGRAMS.md) - Diagrams kiến trúc\n- [ARCHITECTURE.md](ARCHITECTURE.md) - Chi tiết kiến trúc\n- [PATTERNS.md](PATTERNS.md) - Khi nào dùng pattern nào\n- [MOBILE_INTEGRATION.md](MOBILE_INTEGRATION.md) - Tích hợp SDK\n- [EDITOR_TOOLS.md](EDITOR_TOOLS.md) - Editor tools\n- [CODING_STANDARDS.md](CODING_STANDARDS.md) - Coding standards\n- [BUILD_CHECKLIST.md](BUILD_CHECKLIST.md) - Trước khi ship\n", "APPLOVIN_SETUP.md": "# AppLovin MAX Setup Guide\n\nHướng dẫn step-by-step tích hợp AppLovin MAX vào template. Đọc kèm với code trong `AppLovinAdsService.cs`.\n\n## Tổng quan\n\nAppLovin MAX là mediation platform - 1 SDK kết nối với nhiều ad network (AdMob, Meta, Unity Ads, IronSource...). MAX tự chọn network nào trả tiền cao nhất cho mỗi impression.\n\n**Lợi ích vs đi single network:**\n- eCPM cao hơn 20-50% (waterfall + bidding)\n- Fill rate tốt hơn ở mọi geo\n- 1 SDK quản lý, không phải maintain nhiều\n\n## Bước 1: Tạo tài khoản AppLovin\n\n1. Đăng ký tại [dash.applovin.com](https://dash.applovin.com)\n2. Verify email + thông tin payment\n3. **Tạo Application** (Apps → Add Application)\n   - Nhập tên app + chọn iOS/Android\n   - Sau khi tạo, copy **SDK Key** (long string ~80 chars)\n\n## Bước 2: Import AppLovin MAX SDK\n\n**Cách 1 - Unity Package Manager** (recommend):\n```\nWindow → Package Manager → + → Add package from git URL:\nhttps://github.com/AppLovin/AppLovin-MAX-Unity-Plugin.git\n```\n\n**Cách 2 - .unitypackage:**\n1. Tải MaxSdk.unitypackage từ [dashboard](https://dash.applovin.com) → Account → Documents → Unity SDK\n2. Assets → Import Package → Custom Package → chọn file đã tải\n\n## Bước 3: Setup SDK Key\n\nMenu Unity: **AppLovin → Integration Manager** → tab \"Settings\":\n- Paste SDK Key vào ô \"AppLovin SDK Key\"\n- Bấm Save\n\nViệc này tạo file `MaxSdk/Resources/AppLovinSettings.asset` chứa SDK key. SDK tự load lúc init, **không cần** `MaxSdk.SetSdkKey()` trong code.\n\n## Bước 4: Cài Mediation Networks\n\nMenu **AppLovin → Integration Manager** → tab \"Networks\":\n\nBật ít nhất 3-5 network để có competition:\n- ✅ **AppLovin Exchange** (luôn bật, free)\n- ✅ **Google AdMob** (eCPM cao, US/EU)\n- ✅ **Meta Audience Network** (cao ở Tier 1)\n- ✅ **UnityAds** (fill rate tốt)\n- ✅ **IronSource** (rewarded tốt)\n- ⚠️ **Mintegral** (Tier 2-3 markets như VN, SEA)\n\nBấm \"Install\" từng network → SDK tự download. Sau cùng bấm \"Install All Required Dependencies\".\n\n**Lưu ý:** Mỗi network cần đăng ký account riêng và link ID vào AppLovin Dashboard (Mediation → Networks → Add Network).\n\n## Bước 5: Tạo Ad Units trên Dashboard\n\n[dash.applovin.com](https://dash.applovin.com) → Apps → chọn app → **MAX → Ad Units → Create Ad Unit**\n\nTạo 3 ad unit cho mỗi platform:\n\n| Ad Unit | Format | Use case |\n|---|---|---|\n| `interstitial_main` | Interstitial | Full-screen sau game over |\n| `rewarded_main` | Rewarded | Cho user xem để nhận thưởng |\n| `banner_main` | Banner | Banner đáy màn hình |\n\nSau khi tạo, copy **Ad Unit ID** (mỗi unit 1 ID khác nhau, ~16 chars).\n\n## Bước 6: Update Ad Unit IDs trong code\n\nMở `Assets/_Project/Scripts/Core/Mobile/Ads/AppLovinAdsService.cs`, dòng 27-32:\n\n```csharp\nprivate const string AndroidInterstitialAdUnitId = \"YOUR_ANDROID_INTERSTITIAL_AD_UNIT_ID\";\nprivate const string IosInterstitialAdUnitId = \"YOUR_IOS_INTERSTITIAL_AD_UNIT_ID\";\nprivate const string AndroidRewardedAdUnitId = \"YOUR_ANDROID_REWARDED_AD_UNIT_ID\";\nprivate const string IosRewardedAdUnitId = \"YOUR_IOS_REWARDED_AD_UNIT_ID\";\nprivate const string AndroidBannerAdUnitId = \"YOUR_ANDROID_BANNER_AD_UNIT_ID\";\nprivate const string IosBannerAdUnitId = \"YOUR_IOS_BANNER_AD_UNIT_ID\";\n```\n\nPaste 6 ID thật từ dashboard. **Lưu ý:** Android và iOS ID khác nhau, không thể dùng chung.\n\n**Tip giữ secret:** Nếu repo public, đừng commit Ad Unit ID lên. Có thể chuyển sang đọc từ ScriptableObject (không commit) hoặc environment variable.\n\n## Bước 7: Bật Define Symbol\n\nMenu **GameTemplate → Define Symbol Manager** → tick `ADS_APPLOVIN`.\n\nSau khi tick, Unity recompile và `AppLovinAdsService.cs` mới được compile (do nằm trong `#if ADS_APPLOVIN`).\n\n## Bước 8: Verify trên thiết bị\n\n### A. Test trên Editor\n\nTrên Editor, `AdsServiceFactory.Create()` luôn return `MockAdsService` (vì SDK ads không chạy trên Editor). Bạn sẽ thấy log:\n\n```\n[Mock] Initializing...\n[Mock] Initialized.\n```\n\nEditor không test AppLovin được - phải build cho device.\n\n### B. Test trên device thật\n\n1. Build Android development build, install lên device\n2. Xem log qua **Android Logcat** (Window → Analysis → Android Logcat)\n3. Filter `[AppLovin]` để thấy log của service:\n   ```\n   [AppLovin] InitializeSdk called, waiting...\n   [AppLovin] SDK initialized. Country: VN\n   [AppLovin] Interstitial loaded (AppLovinExchange)\n   [AppLovin] Rewarded loaded (Mintegral)\n   ```\n\n### C. Mediation Debugger - tool cực hữu ích\n\nTrong build, dùng **5-finger tap** vào màn hình bất kỳ → mở MAX Mediation Debugger:\n- Xem network nào đang load được, network nào fail\n- Test ad từng network riêng lẻ\n- Verify config eCPM\n- Check missing Android manifest entries\n\nHoặc trigger qua code khi cần:\n```csharp\nMaxSdk.ShowMediationDebugger();\n```\n\nKhi launch product cuối cùng, **tắt** trigger 5-finger để user không vô tình bật.\n\n## Bước 9: GDPR / CCPA Consent\n\nEU users (GDPR) và California users (CCPA) yêu cầu consent trước khi show ads target. AppLovin có Consent Flow built-in:\n\n**Trong Inspector của `MaxSdk` setup:**\n- Bật \"Show Consent Flow\" trong AppLovin → Integration Manager\n- Setup URL Privacy Policy của bạn\n- MAX tự hiện popup consent lần đầu app launch\n\n**Hoặc set tay trong code:**\n```csharp\n// Trong AppLovinAdsService.OnSdkInitialized()\nMaxSdk.SetHasUserConsent(true);     // GDPR\nMaxSdk.SetIsAgeRestrictedUser(false);\nMaxSdk.SetDoNotSell(false);          // CCPA\n```\n\nCó thể fetch consent decision từ Firebase Remote Config theo region (vd: VN không cần GDPR thì auto skip flow).\n\n## Bước 10: iOS - ATT (App Tracking Transparency)\n\niOS 14+ yêu cầu hỏi user xin permission tracking trước khi show ads cá nhân hoá. Phải add vào `Info.plist`:\n\n```xml\n<key>NSUserTrackingUsageDescription</key>\n<string>This app uses tracking to show you more relevant ads.</string>\n```\n\nTrong Unity: **Project Settings → Player → iOS → Other Settings → Custom Plist Entries**.\n\nVà gọi request trước khi init MAX:\n\n```csharp\n// Trên iOS, gọi trước MaxSdk.InitializeSdk()\n#if UNITY_IOS && !UNITY_EDITOR\n    // Cần package \"com.unity.ads.ios-support\" hoặc tự viết native plugin\n    Unity.Advertisement.IosSupport.ATTrackingStatusBinding.RequestAuthorizationTracking();\n#endif\n```\n\n## Cách dùng trong gameplay (giống mọi mediation khác)\n\nCode gameplay **không thay đổi** dù dùng MAX hay Unity Ads hay Mock:\n\n```csharp\nvar ads = ServiceLocator.Get<IAdsService>();\n\n// Banner\nads.ShowBanner(BannerPosition.Bottom);\n\n// Interstitial sau level\nif (ads.IsInterstitialReady())\n{\n    var result = await ads.ShowInterstitialAsync(\"level_complete\");\n}\n\n// Rewarded\nvar result = await ads.ShowRewardedAsync(\"revive\");\nif (result == AdResult.Success)\n{\n    GivePlayerReward();\n}\n\n// Tắt khi user mua Remove Ads\nads.AdsEnabled = false;\n```\n\nĐây là điểm mạnh template: code business viết 1 lần, swap SDK chỉ qua define symbol.\n\n## Common issues & fixes\n\n### \"AppLovin namespace not found\"\n- Chưa import SDK qua Package Manager\n- Hoặc chưa define `ADS_APPLOVIN`\n\n### \"No fill\" trong Mediation Debugger\n- Mediation networks chưa active (cần đăng ký + verify account từng network)\n- Ad Unit ID sai (nhầm test vs production)\n- App chưa được approve trên network (Meta, AdMob phải review 1-2 ngày)\n\n### Interstitial show được nhưng Rewarded không\n- Rewarded format đôi khi thiếu inventory - đợi 1-2 ngày cho fill rate tăng\n- Hoặc Ad Unit ID rewarded gán nhầm thành interstitial\n\n### App crash khi show ad\n- Thiếu Android dependencies → mở **Assets → External Dependency Manager → Android Resolver → Force Resolve**\n- iOS thiếu Pod → mở **Assets → External Dependency Manager → iOS Resolver → Install Cocoapods**\n\n### eCPM thấp (< $0.50)\n- Tier 3 market (như VN nội địa) eCPM rẻ là bình thường\n- Bật thêm bidding networks: Meta Bidding, Unity Bidding\n- Setup Waterfall trên dashboard, không chỉ \"Auto-CPM\"\n\n## Best practices cho mobile game\n\n1. **Interstitial frequency cap:** không show liên tục, ít nhất 60s giữa 2 lần\n   ```csharp\n   if (Time.realtimeSinceStartup - _lastInterstitialTime < 60f) return;\n   ```\n\n2. **Rewarded placement đa dạng:** revive, double reward, unlock skin, daily bonus → nhiều entry point user xem\n\n3. **Banner ẩn trong gameplay:** chỉ show ở Main Menu, Pause, Shop. Trong gameplay banner che view → bad UX\n\n4. **No ads cho new user 3 phút đầu:** giữ retention. Code:\n   ```csharp\n   var sessionTime = Time.realtimeSinceStartup;\n   if (sessionTime < 180f) ads.InterstitialEnabled = false;\n   ```\n\n5. **Remove Ads chỉ tắt Banner + Interstitial, GIỮ Rewarded:** user chủ động xem rewarded để nhận thưởng\n\n6. **Track ad metric sang Analytics:** mỗi `OnAdShown` log event để xem placement nào hiệu quả\n\n```csharp\nads.OnAdShown += (placement) => {\n    analytics.TrackEvent(\"ad_shown\", new Dictionary<string, object> {\n        [\"placement\"] = placement,\n        [\"mediation\"] = ads.CurrentMediation.ToString()\n    });\n};\n```\n\n## Tham khảo\n\n- [AppLovin MAX Unity docs](https://developers.applovin.com/en/unity/overview/integration/)\n- [Mediation networks list](https://developers.applovin.com/en/max/mediation-networks/)\n- [Best practices](https://developers.applovin.com/en/max/preparing-mediation-of-ad-networks/)\n- File code: `Assets/_Project/Scripts/Core/Mobile/Ads/AppLovinAdsService.cs`\n", "ARCHITECTURE.md": "# Architecture\n\nTemplate này dùng kiến trúc **3 lớp + Service Locator + Event Bus**, tối ưu cho mobile và team nhỏ.\n\n## Tổng quan 3 lớp\n\n```\n┌─────────────────────────────────────────────┐\n│  Bootstrap (entry point, 1 scene)           │\n│  GameBootstrap.cs - khởi tạo mọi service    │\n└──────────────────┬──────────────────────────┘\n                   │\n                   ▼\n┌─────────────────────────────────────────────┐\n│  Core (framework, tái dùng nhiều game)      │\n│  - ServiceLocator (DI nhẹ)                  │\n│  - EventBus (giao tiếp module)              │\n│  - SaveService, SceneLoader, AudioManager   │\n│  - ObjectPool, UIPanel, GameLog             │\n└──────────────────┬──────────────────────────┘\n                   │ (dùng qua interface)\n                   ▼\n┌─────────────────────────────────────────────┐\n│  Gameplay (game-specific)                   │\n│  - PlayerController, Enemy, GameRules...    │\n│  - Subscribe EventBus, request Service      │\n└─────────────────────────────────────────────┘\n```\n\n## 1. Bootstrap Pattern\n\n**Vấn đề:** Test 1 scene riêng (vd `Gameplay`) sẽ bị null reference vì các Manager chưa khởi tạo.\n\n**Cách giải:**\n- Scene `Bootstrap` là scene đầu tiên (index 0 trong Build Settings)\n- `GameBootstrap.cs` chạy với `[DefaultExecutionOrder(-1000)]` để Awake trước mọi thứ\n- Khởi tạo: SaveService → SceneLoader → AudioManager → UIManager → register vào ServiceLocator\n- Sau đó tự load Main Menu\n\n**Test scene giữa:** GameBootstrap detect nếu đã bootstrapped sẽ skip → an toàn khi dev play từ scene gameplay trực tiếp.\n\n## 2. Service Locator (DI nhẹ)\n\n`ServiceLocator` là dictionary static `Type → object`. Đăng ký trong Bootstrap, dùng ở mọi nơi:\n\n```csharp\n// Register (chỉ ở Bootstrap)\nServiceLocator.Register<IAudioService>(audioManager);\n\n// Use (ở gameplay)\nvar audio = ServiceLocator.Get<IAudioService>();\naudio.PlaySfx(jumpClip);\n```\n\n**Tại sao không dùng Zenject?**\n- Mobile cần startup nhanh, code nhỏ → Service Locator đủ cho team 2-5 người\n- Zenject mạnh nhưng overhead lớn, learning curve cao\n- Nếu sau này cần DI thực sự (factory, scope) → migrate sang VContainer (nhẹ hơn Zenject)\n\n## 3. Event Bus\n\nCác module giao tiếp qua event, **không reference trực tiếp** nhau. Vd PlayerController không cần biết AudioManager:\n\n```csharp\n// Định nghĩa event (struct -> không GC)\npublic struct PlayerJumpedEvent : IGameEvent { public float Power; }\n\n// Publish (player)\nEventBus.Publish(new PlayerJumpedEvent { Power = 5f });\n\n// Subscribe (audio, particle, UI...)\nEventBus.Subscribe<PlayerJumpedEvent>(OnPlayerJumped);\n```\n\n**Quan trọng:** Mọi Subscribe phải có Unsubscribe trong `OnDestroy` để tránh leak.\n\n## 4. Flow scene chuẩn\n\n```\nBootstrap (1 lần duy nhất)\n  → Init services\n  → SceneLoader.LoadSceneAsync(\"MainMenu\")\n\nMainMenu\n  → User bấm Play\n  → SceneLoader.LoadSceneAsync(\"Gameplay\")\n  → EventBus publish SceneLoadStartedEvent\n  → LoadingPanel.Show() (subscribe sẵn event đó)\n\nGameplay\n  → EventBus publish SceneLoadCompletedEvent\n  → LoadingPanel.Hide()\n  → User chơi\n  → Game Over → EventBus publish GameOverEvent\n  → UI hiện popup, Audio play sfx, Save service ghi score\n```\n\n## 5. Save data versioning\n\nKhi đổi struct save (vd thêm field), tăng `SaveVersion`. Code load kiểm tra version và migrate:\n\n```csharp\nvar data = await save.LoadAsync<PlayerData>(\"player\");\nif (data.SaveVersion < 2)\n{\n    data.NewField = defaultValue;\n    data.SaveVersion = 2;\n    await save.SaveAsync(\"player\", data);\n}\n```\n\n## 6. Module độc lập qua Assembly Definitions\n\n```\nGameTemplate.Core.asmdef       (không reference gì)\nGameTemplate.Gameplay.asmdef   (reference Core)\nGameTemplate.Editor.asmdef     (reference cả 2, editor-only)\n```\n\nLợi ích:\n- Compile nhanh: sửa Gameplay không compile lại Core\n- Ép kỷ luật: Core không phụ thuộc Gameplay → tái dùng được\n- Test isolate dễ hơn\n\n## 7. Best practices mobile cần nhớ\n\n| Vấn đề | Giải pháp |\n|---|---|\n| GC spike | Object pool mọi spawn/despawn, dùng struct cho event, không alloc trong Update |\n| Draw call | Sprite atlas, dynamic batching, tắt shadow trên enemy |\n| Battery | targetFrameRate = 60 (30 cho idle game), Application.runInBackground = false |\n| Startup time | Tránh Resources.Load đồng bộ ở Bootstrap → dùng async load |\n| Save corrupt | Atomic write (file tạm + rename) - đã làm trong JsonSaveService |\n| Memory | Unload scene + Resources.UnloadUnusedAssets() khi đổi scene lớn |\n\n## Khi nào sửa Core, khi nào sửa Gameplay?\n\n**Sửa Core khi:**\n- Thêm capability dùng cho mọi game (vd: Ads service, Analytics service, IAP)\n- Fix bug trong framework\n- Cải thiện performance core systems\n\n**Sửa Gameplay khi:**\n- Thêm enemy mới, level mới, mechanic mới\n- Logic chỉ game này có (vd: card matching, RPG combat)\n\n**Quy tắc vàng:** Code Core không được `using GameTemplate.Gameplay`. Nếu thấy cần → có gì đó sai, refactor lại.\n", "BUILD_CHECKLIST.md": "# Build Checklist - Mobile\n\nTrước khi build release, check qua hết list này.\n\n## Chung\n\n- [ ] Bootstrap là scene index 0 trong Build Settings\n- [ ] Tất cả scene cần dùng đã add vào Build Settings\n- [ ] Bỏ `ENABLE_GAME_LOG` khỏi Scripting Define Symbols (Release)\n- [ ] Version number tăng đúng (Player Settings → Bundle Version Code)\n- [ ] Test trên device thật, không chỉ Editor\n\n## Android\n\n- [ ] Package Name đúng format `com.company.gamename`\n- [ ] Minimum API Level: 23 (Android 6.0) - cover ~95% device\n- [ ] Target API Level: lấy mới nhất Google Play yêu cầu\n- [ ] Scripting Backend: IL2CPP (bắt buộc cho 64-bit)\n- [ ] Target Architectures: ARMv7 + ARM64 (bỏ x86 trừ khi cần)\n- [ ] Keystore production có backup an toàn (mất là không update app được)\n- [ ] Build AAB (Android App Bundle), không phải APK, để upload Google Play\n- [ ] Proguard/Minification: bật, test kỹ vì có thể strip nhầm code\n\n## iOS\n\n- [ ] Bundle Identifier khớp với cert + provisioning profile\n- [ ] iOS Target: 12.0 trở lên\n- [ ] Architecture: ARM64\n- [ ] Camera/Mic/Photo usage description nếu app có request (Info.plist)\n- [ ] Capability: Push, IAP, GameCenter nếu cần\n- [ ] Build Xcode project, mở bằng Xcode mới nhất để Archive\n\n## Performance check trước khi ship\n\n- [ ] FPS ổn định 60 trên mid-range device (Galaxy A50, iPhone 8)\n- [ ] Memory usage < 500MB trên Android low-end\n- [ ] Startup time < 5s đến Main Menu\n- [ ] Không có GC spike >5ms trong gameplay (check Profiler)\n- [ ] Draw call < 100 trong scene gameplay (mobile)\n- [ ] Battery drain check 15 phút gameplay, < 10% pin\n\n## Quality settings\n\n- [ ] Tạo profile riêng cho Mobile (Edit → Project Settings → Quality)\n- [ ] Tắt shadows cho object không cần\n- [ ] Anti-aliasing: tắt hoặc FXAA (MSAA quá nặng cho mobile)\n- [ ] Texture quality: Full Res trên flagship, Half trên low-end (dynamic detect)\n\n## Build size\n\n- [ ] Texture compression: ASTC (Android) + ASTC (iOS), fallback ETC2\n- [ ] Audio: Vorbis quality 70% cho music, ADPCM/PCM cho SFX ngắn\n- [ ] Strip Engine Code: bật (Player Settings → Other Settings)\n- [ ] Build size cuối < 150MB (Google Play yêu cầu < 200MB cho APK base)\n\n## Post-build smoke test\n\n- [ ] Install lên 2 device khác nhau (1 Android low-end, 1 iOS)\n- [ ] Play từ đầu đến Game Over không crash\n- [ ] Tắt app giữa chừng → mở lại, save vẫn còn\n- [ ] Tắt mạng → app không crash, có thông báo phù hợp nếu cần\n- [ ] Xoay màn hình (nếu support) → UI không vỡ\n", "CODING_STANDARDS.md": "# Coding Standards\n\nQuy tắc code chung. Bám sát để PR review nhanh, code đồng nhất.\n\n## Naming\n\n| Loại | Convention | Ví dụ |\n|---|---|---|\n| Class, struct, interface | PascalCase | `PlayerController`, `IAudioService` |\n| Interface | Bắt đầu `I` | `ISaveService` |\n| Method, property | PascalCase | `PlaySfx()`, `IsAlive` |\n| Public field | PascalCase | `public int Score;` (hạn chế dùng, prefer property) |\n| Private field | `_camelCase` | `private int _hp;` |\n| Local var, parameter | camelCase | `var damage = 10;` |\n| Constant | PascalCase | `const int MaxLevel = 100;` |\n| Event | Past tense | `PlayerDiedEvent`, `LevelLoadedEvent` |\n\n## Folder rules\n\n| Code | Đặt ở | Namespace |\n|---|---|---|\n| Framework dùng nhiều game | `Scripts/Core/<system>/` | `GameTemplate.Core.<System>` |\n| Logic game này | `Scripts/Gameplay/<feature>/` | `GameTemplate.Gameplay.<Feature>` |\n| ScriptableObject data | `Scripts/Data/` | `GameTemplate.Data` |\n| UI panel | `Scripts/UI/` | `GameTemplate.UI` |\n| Editor tools | `Scripts/Editor/` | `GameTemplate.Editor` |\n\n**Quy tắc vàng:** Code Core KHÔNG `using GameTemplate.Gameplay`. Nếu cần → có gì đó sai, refactor.\n\n### ⚠️ Quy tắc tên file = tên class (cho MonoBehaviour & ScriptableObject)\n\nUnity yêu cầu file `.cs` chứa MonoBehaviour hoặc ScriptableObject phải **tên file khớp tên class**, nếu không Add Component / CreateAssetMenu sẽ không tìm thấy:\n\n| Loại class | Tên file bắt buộc? | Lý do |\n|---|---|---|\n| MonoBehaviour | ✅ Bắt buộc | Unity Add Component search theo tên file |\n| ScriptableObject | ✅ Bắt buộc | Unity load asset theo tên type |\n| Pure C# class | ❌ Không bắt buộc | Nhưng nên giữ cho rõ |\n| Interface, struct, enum | ❌ Không bắt buộc | Có thể gộp nhiều cái trong 1 file |\n\n**Lỗi điển hình:** 1 file chứa 2 MonoBehaviour → chỉ class trùng tên file mới search được. Tách thành 2 file riêng.\n\nVí dụ sai: `UIPanel.cs` chứa cả `class UIPanel` và `class UIManager` → Add Component không thấy `UIManager`.\nVí dụ đúng: 2 file `UIPanel.cs` và `UIManager.cs` riêng.\n\n### ⚠️ Cẩn thận khi đặt tên namespace\n\n**KHÔNG dùng các tên trùng với class/enum Unity built-in** cho namespace HOẶC type:\n\n| ❌ Tránh | ✅ Dùng thay thế | Lý do |\n|---|---|---|\n| namespace `GameTemplate.Core.Debug` | `GameTemplate.Core.DevTools` | Conflict với `UnityEngine.Debug` |\n| namespace `GameTemplate.Core.Input` | `GameTemplate.Core.InputSystem` | Conflict với `UnityEngine.Input` |\n| namespace `GameTemplate.Core.Random` | `GameTemplate.Core.Rng` | Conflict với `UnityEngine.Random` |\n| namespace `GameTemplate.Core.Object` | `GameTemplate.Core.Objects` | Conflict với `UnityEngine.Object` |\n| namespace `GameTemplate.Core.Application` | `GameTemplate.Core.App` | Conflict với `UnityEngine.Application` |\n| enum `SystemLanguage` | `GameLanguage` | Conflict với `UnityEngine.SystemLanguage` |\n| enum `Color` | `GameColor` / `PaletteColor` | Conflict với `UnityEngine.Color` |\n| class `Camera` | `GameCamera` / `CameraController` | Conflict với `UnityEngine.Camera` |\n\n**Triệu chứng nếu bị conflict:**\n- Namespace conflict: error CS0234 \"name 'LogXxx' does not exist in namespace ...\"\n- Type conflict: error CS0104 \"'SystemLanguage' is an ambiguous reference between...\"\n\n**Quy tắc nhanh:** Trước khi đặt tên type/namespace, search \"UnityEngine.<TênBạnĐịnhĐặt>\" trên docs.unity3d.com. Nếu Unity đã có → đổi tên.\n\n## Performance mobile - DO / DON'T\n\n### DO\n\n- ✅ Pool object spawn/despawn liên tục (bullet, enemy, VFX)\n- ✅ Cache reference trong Awake: `_rb = GetComponent<Rigidbody>();`\n- ✅ Dùng `struct` cho game event (zero alloc)\n- ✅ `TryGetComponent` thay vì `GetComponent` + null check\n- ✅ String formatting với `$\"...\"` nhưng tránh trong vòng lặp Update\n- ✅ Tắt log production: bỏ `ENABLE_GAME_LOG` define\n\n### DON'T\n\n- ❌ `GameObject.Find` / `FindObjectOfType` trong Update (chậm)\n- ❌ `FindObjectOfType` (Unity 2023+) → dùng `FindAnyObjectByType` (nhanh hơn) hoặc `FindFirstObjectByType`\n- ❌ `Instantiate` / `Destroy` trong vòng lặp → dùng pool\n- ❌ `Camera.main` trong Update → cache 1 lần\n- ❌ `Resources.Load` runtime → preload trong Bootstrap hoặc dùng Addressables\n- ❌ `new` cho class trong Update (alloc → GC spike)\n- ❌ LINQ trong hot path (vd Update, FixedUpdate)\n- ❌ String concatenation trong Update (`\"Score: \" + score`) → dùng `StringBuilder` hoặc UI cached\n\n## Event Bus quy tắc\n\n```csharp\n// ✅ ĐÚNG\nprivate void OnEnable()  => EventBus.Subscribe<MyEvent>(OnEvent);\nprivate void OnDisable() => EventBus.Unsubscribe<MyEvent>(OnEvent);\n\n// ❌ SAI - subscribe nhưng quên unsubscribe -> memory leak\nprivate void Start() { EventBus.Subscribe<MyEvent>(OnEvent); }\n\n// ❌ SAI - subscribe trong Update -> sub nhiều lần\nprivate void Update() { EventBus.Subscribe<MyEvent>(OnEvent); }\n```\n\n## ScriptableObject cho data\n\nMọi data tĩnh (level config, enemy stat, sound database) → ScriptableObject, không hardcode trong script:\n\n```csharp\n[CreateAssetMenu(menuName = \"Game/Enemy Data\")]\npublic class EnemyData : ScriptableObject\n{\n    public int MaxHp;\n    public float Speed;\n    public AudioClip DeathSfx;\n}\n```\n\nLợi ích: designer chỉnh được trong Inspector, không cần coder.\n\n## Serializing\n\n```csharp\n// ✅ Dùng SerializeField cho private, không expose public\n[SerializeField] private float _moveSpeed = 5f;\n\n// ❌ public field - bị access từ mọi nơi, vi phạm encapsulation\npublic float MoveSpeed = 5f;\n```\n\n## Khi review PR, kiểm tra\n\n- [ ] Có Subscribe/Unsubscribe đầy đủ?\n- [ ] Có FindObjectOfType, GameObject.Find trong runtime không?\n- [ ] Có alloc trong Update không (new, string concat, LINQ)?\n- [ ] Naming convention?\n- [ ] Folder đúng (Core vs Gameplay)?\n- [ ] Comment XML cho public API của Core?\n- [ ] Test bằng tay trên device thật (không chỉ Editor)?\n", "COOKBOOK.md": "# Cookbook - \"Muốn làm X thì làm sao\"\n\nĐây là tập hợp các công thức nhỏ. Tìm vấn đề bạn đang gặp → copy code → chạy.\n\n**Quy ước:** Mọi recipe dưới đây giả định bạn đang viết trong file `.cs` mới trong folder `Assets/_Project/Scripts/Gameplay/`.\n\n---\n\n## Mục lục\n\n**Đọc đầu tiên:**\n0. [Folder Structure - đặt assets vào đâu?](#0-folder-structure---đặt-assets-vào-đâu)\n\n**Cơ bản (mới vào dự án):**\n1. [Lấy AudioManager để phát SFX](#1-lấy-audiomanager-để-phát-sfx)\n2. [Phát nhạc nền](#2-phát-nhạc-nền)\n   - [2b. Bật/tắt âm thanh (mute on/off)](#2b-bậttắt-âm-thanh-mute-onoff---không-cần-slider-volume)\n   - [2c. Settings panel với slider volume + toggle](#2c-settings-panel-với-slider-volume--toggle)\n3. [Load scene mới](#3-load-scene-mới)\n4. [Lưu/đọc dữ liệu player](#4-lưuđọc-dữ-liệu-player)\n   - [4b. Check ngày mới (Daily Reset / Login Bonus)](#4b-check-ngày-mới-daily-reset--login-bonus)\n   - [4c. Tutorial system (Step Sequencer + Highlight)](#4c-tutorial-system-step-sequencer--highlight)\n5. [Hiện/ẩn UI panel](#5-hiệnẩn-ui-panel)\n   - [5b. Tạo UI an toàn với notch / home indicator (Safe Area)](#5b-tạo-ui-an-toàn-với-notch--home-indicator-safe-area)\n   - [5c. Camera fit gameplay area trên mọi device aspect](#5c-camera-fit-gameplay-area-trên-mọi-device-aspect)\n   - [5d. EnhancedButton - Button có SFX + Analytics + Haptic](#5d-enhancedbutton---button-có-sfx--analytics--haptic)\n   - [5e. HoldButton - Nút nhấn giữ với UnityEvent](#5e-holdbutton---nút-nhấn-giữ-với-unityevent)\n6. [In log debug](#6-in-log-debug)\n\n**Event Bus - giao tiếp giữa các module:**\n1. [#7 Tạo event mới](#7-tạo-event-mới)\n2. [#8 Publish event](#8-publish-event)\n3. [#9 Subscribe event](#9-subscribe-event)\n4. [#10 Anti-pattern: quên Unsubscribe](#10-anti-pattern-quên-unsubscribe)\n\n**Reactive UI - tự động update khi data đổi:**\n1. [#11 HP/Score tự update lên UI](#11-hpscore-tự-update-lên-ui)\n   - [Phiên bản đơn giản (cho casual/puzzle game)](#phiên-bản-đơn-giản-cho-casualpuzzle-game)\n   - [Phiên bản đầy đủ (cho RPG/Adventure) - 4 lớp data tách biệt](#phiên-bản-đầy-đủ-cho-rpgadventure---4-lớp-data-tách-biệt)\n2. [#12 Inventory tự refresh khi add/remove item](#12-inventory-tự-refresh-khi-addremove-item)\n\n**Mobile services:**\n1. [#13 Hiện banner ads](#13-hiện-banner-ads)\n2. [#14 Show rewarded video](#14-show-rewarded-video)\n3. [#15 Tắt ads khi user mua Remove Ads](#15-tắt-ads-khi-user-mua-remove-ads)\n4. [#16 Mua in-app purchase](#16-mua-in-app-purchase)\n5. [#17 Track event Firebase Analytics](#17-track-event-firebase-analytics)\n6. [#18 Đổi ngôn ngữ](#18-đổi-ngôn-ngữ)\n7. [#19 Rung khi tap button](#19-rung-khi-tap-button)\n8. [#20 Đọc Remote Config từ Firebase](#20-đọc-remote-config-từ-firebase)\n\n**Spawn objects:**\n1. [#21 Pool object để spawn enemy](#21-pool-object-để-spawn-enemy)\n   - [21b. IPoolable - object tự reset state khi spawn/despawn](#21b-ipoolable---object-tự-reset-state-khi-spawnđespawn)\n2. [#22 Factory: spawn enemy từ ScriptableObject](#22-factory-spawn-enemy-từ-scriptableobject)\n\n**Async (chain animation):**\n1. [#23 Delay không dùng coroutine](#23-delay-không-dùng-coroutine)\n2. [#24 Fade in UI rồi đợi 2s rồi fade out](#24-fade-in-ui-rồi-đợi-2s-rồi-fade-out)\n3. [#25 Đợi đến khi player chạm điểm](#25-đợi-đến-khi-player-chạm-điểm)\n4. [#25b Lặp lại action định kỳ (thay thế InvokeRepeating)](#25b-lặp-lại-action-định-kỳ-thay-thế-invokerepeating)\n\n**Debug & dev:**\n1. [#26 Thêm cheat command (god mode, add coin)](#26-thêm-cheat-command-god-mode-add-coin)\n2. [#27 Mở Cheat Console trong build](#27-mở-cheat-console-trong-build)\n3. [#28 Bật log dev](#28-bật-log-dev)\n4. [#28b Hiện FPS counter khi test trên device](#28b-hiện-fps-counter-khi-test-trên-device)\n5. [#28c Fix Unity 6 import ảnh tự động thành Multiple](#28c-fix-unity-6-import-ảnh-tự-động-thành-multiple)\n\n**Common gotchas:**\n1. [#29 Lỗi \"Cannot Add Component\"](#29-lỗi-cannot-add-component)\n2. [#30 Lỗi \"Service chưa được register\"](#30-lỗi-service-chưa-được-register)\n\n---\n\n## 0. Folder Structure - đặt assets vào đâu?\n\nĐây là cấu trúc folder **template recommend**. Mọi recipe khác trong Cookbook giả định cấu trúc này tồn tại.\n\n### Tree structure\n\n```\nAssets/\n├── _Project/                    ← Folder chứa MỌI assets do team tạo\n│   ├── Art/                     ← Hình ảnh, sprite, texture\n│   │   ├── UI/                  ← Icon, button, panel (Single, no mipmap)\n│   │   │   ├── Icons/\n│   │   │   ├── Buttons/\n│   │   │   └── Panels/\n│   │   ├── Sprites/             ← Gameplay sprite đơn (Single, mipmap on)\n│   │   │   ├── Characters/\n│   │   │   ├── Enemies/\n│   │   │   └── Items/\n│   │   ├── SpriteSheets/        ← Animation sheet (Multiple, có slice)\n│   │   │   ├── Player/\n│   │   │   └── Enemies/\n│   │   ├── Animations/          ← Sprite atlas animation (Multiple)\n│   │   ├── Atlases/             ← Sprite Atlas pre-packed (Multiple)\n│   │   ├── Backgrounds/         ← Background lớn (Single, no mipmap)\n│   │   └── Splash/              ← Splash screen (Single, no mipmap)\n│   │\n│   ├── Audio/                   ← Music, SFX, voice\n│   │   ├── Music/\n│   │   ├── SFX/\n│   │   │   ├── UI/              ← Button click, popup, notification\n│   │   │   └── Gameplay/        ← Hit, explosion, footstep\n│   │   └── Voice/               ← Dialogue, narration (optional)\n│   │\n│   ├── Scenes/                  ← Unity scenes\n│   │   ├── Bootstrap.unity      ← Scene 0 - init services\n│   │   ├── MainMenu.unity       ← Scene 1 - main menu\n│   │   └── Gameplay.unity       ← Scene 2 - gameplay\n│   │\n│   ├── Prefabs/                 ← Reusable GameObjects\n│   │   ├── UI/                  ← Panel, popup, HUD prefabs\n│   │   ├── Characters/          ← Player, Enemy prefabs\n│   │   ├── VFX/                 ← Particle, effect prefabs\n│   │   └── Items/               ← Pickup, equipment prefabs\n│   │\n│   ├── Settings/                ← ScriptableObject configs\n│   │   ├── Audio/               ← AudioMixerSettings\n│   │   ├── Localization/        ← LocalizationTable\n│   │   ├── Stats/               ← DefaultCharacterStats, EquipmentItem, BuffDefinition\n│   │   └── Game/                ← Game balance configs\n│   │\n│   ├── Resources/               ← Assets load qua Resources.Load (hạn chế dùng!)\n│   ├── StreamingAssets/         ← Files copy nguyên trạng vào build\n│   │\n│   └── Scripts/                 ← Code C#\n│       ├── Core/                ← Framework reusable cho mọi project\n│       │   ├── Bootstrap/\n│       │   ├── DI/\n│       │   ├── Events/\n│       │   ├── UI/\n│       │   ├── Camera/\n│       │   ├── Audio/\n│       │   ├── Save/\n│       │   ├── SceneManagement/\n│       │   ├── Pooling/\n│       │   ├── Logger/\n│       │   ├── Utils/\n│       │   ├── DevTools/\n│       │   ├── Patterns/\n│       │   │   ├── Reactive/\n│       │   │   ├── Factory/\n│       │   │   ├── MVP/\n│       │   │   ├── Singleton/\n│       │   │   ├── Async/\n│       │   │   └── Attributes/\n│       │   └── Mobile/\n│       │       ├── Ads/\n│       │       ├── IAP/\n│       │       ├── Analytics/\n│       │       ├── RemoteConfig/\n│       │       ├── Localization/\n│       │       ├── Haptic/\n│       │       └── Device/\n│       ├── Gameplay/            ← Code game-specific (project này)\n│       │   ├── Core/\n│       │   ├── Stats/\n│       │   └── UI/\n│       └── Editor/              ← Editor tools (chỉ chạy trong Editor)\n│           ├── Infrastructure/\n│           ├── QualityOfLife/\n│           ├── AssetWorkfl
